<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiphra Business Center — Gestion Fournitures</title>
<style>
  :root{
    --navy:#1E2A46;
    --navy-dark:#121B30;
    --navy-light:#33436A;
    --paper:#EEF1F6;
    --card:#FFFFFF;
    --line:#E4E8F0;
    --text:#1E2733;
    --muted:#6B7686;
    --gold:#B4832A;
    --gold-strong:#E1AB3E;
    --gold-bg:#FAF2DE;
    --ok:#0E9C5A;
    --ok-bg:#E4F5EC;
    --warn:#C24327;
    --warn-bg:#FBEAE3;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.05);
    --shadow-hover:0 8px 28px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, Arial, Helvetica, sans-serif;
    font-size:12px; background:var(--paper); color:var(--text);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .app{display:flex; height:100vh; overflow:hidden;}

  aside{
    width:238px; flex-shrink:0; height:100vh; display:flex; flex-direction:column; color:#fff;
    background:linear-gradient(180deg,#243458 0%,var(--navy) 58%,var(--navy-dark) 100%);
  }
  .brand{padding:26px 22px 20px; text-align:center; border-bottom:1px solid rgba(255,255,255,.10);
    display:flex; flex-direction:column; align-items:center;}
  .brand img{width:64px; height:64px; object-fit:contain; margin-bottom:10px;}
  .brand .school{font-size:19px; font-weight:700; letter-spacing:.5px; margin:0;
    background:linear-gradient(90deg,#E9C158,#FFF4CF,#C79433);
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .brand h1{font-size:10px; margin:6px 0 0; font-weight:600; line-height:1.4; color:#9FB0CE;
    text-transform:uppercase; letter-spacing:1.2px;}
  nav{flex:1; padding:14px 12px; overflow-y:auto;}
  nav button{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:none; border:none; color:#C4CFE2; cursor:pointer; padding:11px 14px; margin-bottom:2px;
    border-radius:10px; font-size:13px; font-family:inherit; transition:background .15s, color .15s;}
  nav button:hover{background:rgba(255,255,255,.07); color:#fff;}
  nav button.active{background:rgba(233,193,88,.14); color:#fff; font-weight:600; box-shadow:inset 3px 0 0 var(--gold-strong);}
  nav .ico{width:20px; text-align:center; font-size:15px; flex-shrink:0;}
  .foot{padding:14px 20px; font-size:10px; color:#8093B4; border-top:1px solid rgba(255,255,255,.10);}

  main{flex:1; padding:34px 42px; max-width:1200px; width:100%; height:100vh; overflow-y:auto;}
  @keyframes fadeInUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  main.fade-in{animation:fadeInUp .3s ease;}
  h2.page-title{font-size:26px; margin:0 0 6px; font-weight:700; color:var(--navy-dark); letter-spacing:-.4px;}
  p.page-sub{font-size:13px; color:var(--muted); margin:0 0 26px; max-width:760px; line-height:1.6;}

  .grid{display:grid; gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow); transition:box-shadow .2s, transform .2s;}
  .kpi:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px);}
  .kpi .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:0 0 8px; font-weight:600;}
  .kpi .val{font-size:27px; color:var(--navy-dark); margin:0; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.5px; line-height:1.1;}
  .kpi .sub{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4;}
  .kpi.kpi-warn .val{color:var(--warn);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; margin-bottom:20px; box-shadow:var(--shadow);}
  .card h3{margin:0 0 16px; font-size:16px; font-weight:700; color:var(--navy-dark); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; padding:9px 12px; border-bottom:1px solid var(--line); white-space:nowrap;}
  td{padding:11px 12px; border-bottom:1px solid #EEF1F6; color:var(--text); white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  tbody tr{transition:background .12s;}
  tbody tr:not(.row-alert):hover td{background:#F7F9FC;}
  .row-alert td{background:var(--warn-bg);}

  /* Tableaux : scroll horizontal propre sur petit écran, jamais d'écrasement illisible */
  .table-scroll{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .table-scroll table{width:auto; min-width:100%;}
  .table-scroll::-webkit-scrollbar{height:6px;}
  .table-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  /* Tableau "pro" : la page reste figée, seul le tableau défile (vertical + horizontal),
     et l'en-tête des colonnes reste collé en haut pendant le défilement. */
  .sheet-scroll{overflow:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line);
    border-radius:10px; max-height:calc(100vh - 250px); min-height:240px; background:var(--card);}
  .sheet-scroll table{width:auto; min-width:100%; border-collapse:separate; border-spacing:0;}
  .sheet-scroll thead th{position:sticky; top:0; z-index:3; background:var(--paper);
    box-shadow:inset 0 -1px 0 var(--line);}
  .sheet-scroll tbody td{border-bottom:1px solid #EEF1F6;}
  .sheet-scroll::-webkit-scrollbar{width:9px; height:9px;}
  .sheet-scroll::-webkit-scrollbar-thumb{background:#C9D2E0; border-radius:8px;}
  .sheet-scroll::-webkit-scrollbar-track{background:#F3F6FB;}
  .achat-cell{font-weight:700; color:var(--navy-dark); font-variant-numeric:tabular-nums;}
  .remise-wrap{display:inline-flex; gap:4px; align-items:center;}
  .remise-wrap select{padding:6px 4px;}
  @media (max-width:860px){
    .sheet-scroll{max-height:calc(100vh - 320px); min-height:220px;}
    .sheet-scroll table{min-width:820px;}
  }

  .tag{font-size:11px; padding:3px 10px; border-radius:20px; display:inline-block; font-weight:600;}
  .tag-ok{background:var(--ok-bg); color:var(--ok);}
  .tag-warn{background:var(--warn-bg); color:var(--warn);}
  .tag-gold{background:var(--gold-bg); color:var(--gold);}

  input, select{font-family:inherit; font-size:13px; padding:9px 11px; border:1px solid var(--line);
    border-radius:9px; background:#fff; color:var(--text); transition:border-color .15s, box-shadow .15s;}
  input:focus, select:focus{outline:none; border-color:var(--navy-light); box-shadow:0 0 0 3px rgba(51,67,106,.15);}
  label{font-size:11px; color:var(--muted); display:block; margin-bottom:5px; font-weight:600;}
  .field{margin-bottom:14px;}

  button.btn{font-family:inherit; font-size:13px; font-weight:600; padding:10px 18px; border-radius:9px; cursor:pointer;
    border:1px solid var(--navy); background:var(--navy); color:#fff; transition:background .15s, transform .1s, box-shadow .15s;}
  button.btn:hover{background:var(--navy-dark); box-shadow:0 4px 14px rgba(30,42,70,.25);}
  button.btn:active{transform:translateY(1px);}
  button.btn-ghost{background:#fff; color:var(--navy); border:1px solid var(--line);}
  button.btn-ghost:hover{background:#F1F4F9; box-shadow:none;}
  button.btn-danger{background:#fff; color:var(--warn); border:1px solid var(--warn);}
  button.btn-danger:hover{background:var(--warn-bg); box-shadow:none;}
  button.btn-sm{padding:6px 12px; font-size:12px;}

  .toolbar{display:flex; gap:12px; align-items:end; flex-wrap:wrap; margin-bottom:18px;}
  .empty{color:var(--muted); font-size:13px; padding:34px 16px; text-align:center;}
  .badge-count{background:var(--gold); color:#fff; border-radius:20px; font-size:10px; padding:1px 8px; margin-left:6px; font-weight:700;}
  .muted{color:var(--muted);}
  .toast{position:fixed; bottom:24px; right:24px; background:var(--navy-dark); color:#fff; padding:13px 20px; border-radius:10px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.22); opacity:0; transform:translateY(10px); transition:all .25s; pointer-events:none; z-index:999;}
  .toast.show{opacity:1; transform:translateY(0);}
  .compo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:6px 14px; font-size:12.5px;}
  .compo-grid div{display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dotted var(--line);}
  .compo-grid b{color:var(--navy-dark);}
  .modal-bg{position:fixed; inset:0; background:rgba(18,27,48,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
  .modal{background:#fff; border-radius:16px; padding:26px 30px; width:480px; max-width:100%; max-height:88vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal h3{margin-top:0;}
  .close-x{float:right; cursor:pointer; color:var(--muted); font-size:20px; border:none; background:none;}

  .mobile-topbar{display:none;}
  .sidebar-close{display:none;}
  .sidebar-overlay{display:none;}
  @media (max-width:860px){
    .app{flex-direction:column; min-height:100vh; height:auto; overflow:visible;}
    .mobile-topbar{display:flex; align-items:center; justify-content:space-between;
      background:var(--navy-dark); color:#fff; padding:14px 18px; position:sticky; top:0; z-index:60;}
    .mobile-topbar .mobile-title{font-size:14px; font-weight:700; letter-spacing:.3px;
      background:linear-gradient(90deg,#E9C158,#FFF4CF,#C79433); -webkit-background-clip:text; background-clip:text; color:transparent;}
    .mobile-topbar button{background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:2px 4px; line-height:1;}
    aside{position:fixed; top:0; left:0; height:100vh; z-index:80; width:270px; max-width:82%;
      transform:translateX(-100%); transition:transform .25s ease;}
    aside.open{transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,.35);}
    .sidebar-close{display:block; position:absolute; top:16px; right:18px; color:#fff; font-size:24px; z-index:2; background:none; border:none; cursor:pointer;}
    .sidebar-overlay{display:block; position:fixed; inset:0; background:rgba(10,15,28,.5); z-index:70; opacity:0; pointer-events:none; transition:opacity .2s;}
    .sidebar-overlay.show{opacity:1; pointer-events:auto;}
    main{padding:20px 16px; max-width:100%; height:auto; overflow:visible;}
    .grid-4{grid-template-columns:repeat(2,1fr);}
    .grid-3{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
    .toolbar{flex-direction:column; align-items:stretch;}
    .card{padding:18px;}
    .modal{padding:22px;}
  }
  @media (max-width:480px){
    .grid-4{grid-template-columns:1fr;}
    .kpi .val{font-size:24px;}
    h2.page-title{font-size:22px;}
    main{padding:18px 14px;}
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>

// Construit la liste des livres à partir du catalogue, en rattachant chaque livre à sa classe.
function seedLivres(niveaux){
  const out = [];
  niveaux.forEach(n=>{
    const cat = DEFAULT_LIVRES[n.nom];
    if(!cat) return;
    cat.forEach(item=>{
      out.push({
        id: uid(), niveauId: n.id, matiere: item.m, nom: item.nom,
        fournisseurId: null,
        remise: 20, remiseType: 'pct', prixAchat: 0,
        prixVente: item.v, stock: 0, seuil: 10
      });
    });
  });
  return out;
}


let DATA = null;
let currentView = 'dashboard';
let editingFournisseur = null;
let livreNiveauFilter = null;
let stockLivresSearch = '';

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function defaultData(){
  const articles = DEFAULT_ARTICLES.map(a => ({id: uid(), type:'fourniture', ...a}));
  // Lier chaque article-kit à sa clé de composition (lien stable, indépendant du nom)
  DEFAULT_COMPO_HEADERS.forEach((key, i)=>{ if(articles[i]) articles[i].compoKey = key; });
  const niveaux = DEFAULT_NIVEAUX.map(n => ({id: uid(), ...n}));
  return {
    niveaux,
    articles,
    fournisseurs: [],
    ventes: [],
    commandes: [],
    depenses: [],
    livres: seedLivres(niveaux),
    ventesLivres: []
  };
}

// Retrouve l'article lié à une clé de composition (Cahier 100 P, TP 200 P, etc.)
function articleByCompoKey(key){ return DATA.articles.find(a=>a.compoKey===key); }

async function loadData(){
  try{
    const res = await fetch('/api/data');
    const data = await res.json();
    if(data){ DATA = data; migrateData(); }
    else { DATA = defaultData(); await saveData(); }
  }catch(e){
    console.error('Erreur de chargement', e);
    // En cas de coupure réseau : on affiche des données par défaut SANS écraser la base
    DATA = defaultData();
    showToast('Connexion à la base impossible — vérifiez internet');
  }
}

async function saveData(){
  try{
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(DATA)
    });
  }catch(e){ console.error('Erreur de sauvegarde', e); }
}

function migrateData(){
  let changed = false;
  if(!DATA.depenses){ DATA.depenses = []; changed = true; }
  // Livres : catalogue vendu au détail
  if(!DATA.ventesLivres){ DATA.ventesLivres = []; changed = true; }
  if(!DATA.livres){ DATA.livres = seedLivres(DATA.niveaux); changed = true; }
  // Livres : champs remise (prix public + remise %/F -> prix d'achat auto)
  (DATA.livres||[]).forEach(l=>{
    if(l.remise===undefined){ l.remise = 20; changed = true; }
    if(l.remiseType===undefined){ l.remiseType = 'pct'; changed = true; }
    if(l.prixAchat===undefined){ l.prixAchat = 0; changed = true; }
  });
  // Pinceaux : on passe du paquet à l'unité (le kit arts utilise 2 pinceaux à l'unité)
  const oldPq = DATA.articles.find(a=>a.nom==="Pinceaux (paquet)");
  if(oldPq){ oldPq.nom = "Pinceau"; changed = true; }
  // Correction unique des prix de vente des composants Arts (Crayon 2B 150, Pinceau 250, Petit TP 600)
  if(!DATA.artsFixV2){
    const setV = (nom,v)=>{ const a=DATA.articles.find(x=>x.nom===nom); if(a) a.prixVente = v; };
    setV('Crayon 2B', 150);
    setV('Pinceau', 250);
    setV('Petit TP 100 P', 600);
    DATA.artsFixV2 = true; changed = true;
  }
  // Articles Arts plastiques / Musique ajoutés dans le stock cahier
  EXTRA_SUPPLY_ARTICLES.forEach(extra=>{
    if(!DATA.articles.some(a=>a.nom===extra.nom)){
      DATA.articles.push({id:uid(), type:'fourniture', nom:extra.nom, prixAchat:extra.prixAchat, prixVente:extra.prixVente, stock:0, seuil:extra.seuil, fournisseurId:null});
      changed = true;
    }
  });
  // Retire d'éventuels livres restants d'une ancienne version de l'appli
  if(DATA.articles.some(a=>a.type==='livre')){
    DATA.articles = DATA.articles.filter(a=>a.type!=='livre');
    changed = true;
  }
  if(DATA.livresCatalogueV1!==undefined){ delete DATA.livresCatalogueV1; changed = true; }
  // Réparer le lien kit <-> stock : clé stable par position (ordre fixe des 15 premiers articles)
  DEFAULT_COMPO_HEADERS.forEach((key, i)=>{
    if(DATA.articles[i] && DATA.articles[i].compoKey === undefined){ DATA.articles[i].compoKey = key; changed = true; }
  });
  DATA.articles.forEach(a=>{
    if(a.prixAchat===undefined){ a.prixAchat = (a.prix != null ? a.prix : 0); delete a.prix; changed = true; }
    if(a.prixVente===undefined){ a.prixVente = a.prixAchat; changed = true; }
    if(a.type===undefined){ a.type = 'fourniture'; changed = true; }
  });
  DATA.ventes.forEach(v=>{
    if(v.heure===undefined){ v.heure = ''; changed = true; }
  });
  DATA.commandes.forEach(c=>{
    c.lignes.forEach(l=>{
      if(l.prix===undefined && l.prixAchat!==undefined){ /* already fine */ }
      if(l.prixAchat===undefined){ l.prixAchat = (l.prix != null ? l.prix : 0); changed = true; }
    });
  });
  if(changed) saveData();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }

async function resetData(){
  const ok = confirm("⚠️ ATTENTION\n\nTout remettre à zéro va SUPPRIMER définitivement :\n- toutes les ventes\n- toutes les commandes\n- toutes les dépenses\net remettre TOUT le stock à 0.\n\nLes kits, les prix et les fournisseurs sont conservés.\n\nCette action est irréversible. Continuer ?");
  if(!ok) return;
  DATA.ventes = [];
  DATA.commandes = [];
  DATA.depenses = [];
  DATA.ventesLivres = [];
  DATA.articles.forEach(a=>{ a.stock = 0; });
  if(DATA.livres) DATA.livres.forEach(l=>{ l.stock = 0; });
  await saveData();
  showToast("Tout est remis à zéro — prêt à démarrer");
  render();
}

function findArticleIdx(nom){ return DATA.articles.findIndex(a=>a.nom===nom); }

// Tri "plus récent d'abord" : par date, puis par ordre de création (id basé sur l'heure)
function byRecent(a,b){
  const d = (b.date||'').localeCompare(a.date||'');
  return d!==0 ? d : (b.id||'').localeCompare(a.id||'');
}
function kitCost(niveau){
  let cost = 0;
  DEFAULT_COMPO_HEADERS.forEach(key=>{
    const art = articleByCompoKey(key);
    if(art) cost += (niveau.compo[key]||0) * art.prixAchat;
  });
  // Contenu de la trousse : chaque trousse embarque scotch, colle, bics, gomme, etc.
  const trousseQty = niveau.compo['Trousse'] || 0;
  if(trousseQty > 0){
    TROUSSE_LINKED_INDEXES.forEach(i=>{
      const art = DATA.articles[i];
      if(art) cost += trousseQty * art.prixAchat;
    });
  }
  return cost;
}

    DEFAULT_COMPO_HEADERS.forEach(key=>{
      const q = (niveau.compo[key]||0) * qty;
      if(q>0){
        const art = articleByCompoKey(key);
        if(art) art.stock -= q;
      }
    });
    // trousse-linked accessories
    const trousseQty = (niveau.compo['Trousse']||0) * qty;

      TROUSSE_LINKED_INDEXES.forEach(i=>{ DATA.articles[i].stock -= trousseQty; });

    const totalRecette = dates.reduce((s,d)=>s+groupes[d].recette,0);

  if(DATA.ventes.length===0){ hist.innerHTML = '<div class="empty">Aucune vente enregistrée pour l\'instant.</div>'; return; }

  hist.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Heure</th><th>Niveau</th><th class="num">Kits</th><th class="num">Recette</th><th class="num">Bénéfice</th><th></th></tr></thead><tbody>
    ${sorted.map(v=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      const recette = niv? niv.montant*v.qty : 0;
      const marge = niv? (niv.montant - kitCost(niv))*v.qty : 0;
      return `<tr><td>${v.date}</td><td>${v.heure||'—'}</td><td>${niv?niv.nom:'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(marge)} F</td>
      <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-del="${v.id}">Annuler</button></td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  hist.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = async ()=>{
      const vId = b.dataset.del;
      const v = DATA.ventes.find(x=>x.id===vId);
      const niveau = DATA.niveaux.find(n=>n.id===v.niveauId);
      // restore stock
      DEFAULT_COMPO_HEADERS.forEach(key=>{
        const q = (niveau.compo[key]||0) * v.qty;
        if(q>0){
          const art = articleByCompoKey(key);
          if(art) art.stock += q;
        }
      });
      const trousseQty = (niveau.compo['Trousse']||0) * v.qty;
      if(trousseQty>0){ TROUSSE_LINKED_INDEXES.forEach(i=>{ DATA.articles[i].stock += trousseQty; }); }
      DATA.ventes = DATA.ventes.filter(x=>x.id!==vId);
      await saveData();
      showToast('Vente annulée, stock restauré');
      renderVentes(main);
    };
  });

    ventesJour.forEach(v=>{ parNiveau[v.niveauId] = (parNiveau[v.niveauId]||0)+v.qty; });
    // --- Livres & Arts/Musique ---
    const detailJour = (DATA.ventesLivres||[]).filter(v=>v.date===date).sort((a,b)=> (a.heure||'').localeCompare(b.heure||''));
    const nbDetail = detailJour.reduce((s,v)=>s+v.qty,0);
    const recetteDetail = detailJour.reduce((s,v)=>s+v.prixVente*v.qty,0);
    const margeDetail = detailJour.reduce((s,v)=>s+(v.prixVente-v.prixAchat)*v.qty,0);
    // --- Totaux du jour ---
    const recetteTot = recetteKits + recetteDetail;
    const margeTot = margeKits + margeDetail;

    const content = document.getElementById('j-content');
    content.innerHTML = `
      <div class="grid grid-3" style="margin:16px 0;">
        <div class="kpi"><p class="lbl">Recette du jour (total)</p><p class="val">${fmt(recetteTot)} F</p><div class="sub">Kits ${fmt(recetteKits)} F · Livres/arts ${fmt(recetteDetail)} F</div></div>
        <div class="kpi"><p class="lbl">Bénéfice du jour (total)</p><p class="val" style="color:var(--ok);">${fmt(margeTot)} F</p><div class="sub">Kits ${fmt(margeKits)} F · Livres/arts ${fmt(margeDetail)} F</div></div>
        <div class="kpi"><p class="lbl">Vendus aujourd'hui</p><p class="val">${fmt(kits)} kit(s) · ${fmt(nbDetail)} livre(s)/art</p></div>
      </div>
      ${(ventesJour.length===0 && detailJour.length===0) ? '<div class="empty">Aucune vente ce jour-là.</div>' : `
      ${ventesJour.length===0 ? '' : `
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:10px 0 6px;">Répartition par niveau (kits)</div>
      <div class="table-scroll"><table><thead><tr><th>Niveau</th><th class="num">Kits</th><th class="num">Recette</th></tr></thead><tbody>
      ${Object.keys(parNiveau).map(nid=>{
        const n = DATA.niveaux.find(x=>x.id===nid);
        return `<tr><td>${n?n.nom:'?'}</td><td class="num">${fmt(parNiveau[nid])}</td><td class="num">${fmt((n?n.montant:0)*parNiveau[nid])} F</td></tr>`;
      }).join('')}
      </tbody></table></div>
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:18px 0 6px;">Transactions de kits</div>
      <div class="table-scroll"><table><thead><tr><th>Heure</th><th>Niveau</th><th class="num">Kits</th><th class="num">Montant</th></tr></thead><tbody>
      ${ventesJour.map(v=>{
        const n = DATA.niveaux.find(x=>x.id===v.niveauId);
        return `<tr><td>${v.heure||'—'}</td><td>${n?n.nom:'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt((n?n.montant:0)*v.qty)} F</td></tr>`;
      }).join('')}
      </tbody></table></div>`}
      ${detailJour.length===0 ? '' : `
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:18px 0 6px;">Transactions livres / arts / musique</div>
      <div class="table-scroll"><table><thead><tr><th>Heure</th><th>Type</th><th>Article</th><th class="num">Qté</th><th class="num">Montant</th></tr></thead><tbody>
      ${detailJour.map(v=>{
        const typeLbl = v.kind==='pack' ? 'Pack Arts' : (v.kind==='fourniture' ? 'Arts/Musique' : 'Livre');
        return `<tr><td>${v.heure||'—'}</td><td>${typeLbl}</td><td>${v.livreNom||'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt(v.prixVente*v.qty)} F</td></tr>`;
      }).join('')}
      </tbody></table></div>`}
      `}
    `;
  };

  dateInput.onchange = draw;
  document.getElementById('j-today').onclick = ()=>{ dateInput.value = today; draw(); };
  draw();
}

  const depensesMois = DATA.depenses.filter(d=>d.date.slice(0,7)===moisActuel).reduce((s,d)=>s+d.montant,0);
  const depensesJour = DATA.depenses.filter(d=>d.date===todayStr).reduce((s,d)=>s+d.montant,0);

  const categoriesConnues = Array.from(new Set([...DEFAULT_DEPENSE_CATEGORIES, ...DATA.depenses.map(d=>d.categorie)]));

  main.innerHTML = `

    <div class="card">

        </div>
        <div class="field" style="margin-bottom:0; flex:1; min-width:180px;">
          <label>Note (optionnel)</label>
          <input type="text" id="d-note" placeholder="Détail, référence..." style="width:100%;">

      <div class="kpi kpi-warn"><p class="lbl">Dépenses ce mois-ci</p><p class="val">${fmt(depensesMois)} F</p></div>
      <div class="kpi kpi-warn"><p class="lbl">Dépenses aujourd'hui</p><p class="val">${fmt(depensesJour)} F</p></div>
    </div>
    <div class="card">
      <h3>Totaux par catégorie</h3>
      <div id="dep-par-cat"></div>

      <h3>Historique des dépenses <span class="badge-count">${DATA.depenses.length}</span></h3>

    </div>
  `;

    const montant = parseFloat(document.getElementById('d-montant').value)||0;
    const note = document.getElementById('d-note').value.trim();
    if(!date || !categorie || montant<=0){ showToast('Vérifiez la date, la catégorie et le montant'); return; }
    DATA.depenses.push({id:uid(), date, categorie, montant, note});
    await saveData();
    showToast(`Dépense enregistrée : ${categorie} — ${fmt(montant)} F`);
    renderDepenses(main);

  if(DATA.depenses.length===0){
    parCat.innerHTML = '<div class="empty">Aucune dépense enregistrée pour l\'instant.</div>';

    </tbody></table></div>`;

  const hist = document.getElementById('dep-hist');

}

function renderStock(main, searchQuery){
  const q = (searchQuery||'').trim().toLowerCase();
  const all = DATA.articles.filter(a=>a.type==='fourniture');
  const filtered = q ? all.filter(a=>a.nom.toLowerCase().includes(q)) : all;
  main.innerHTML = `
    <h2 class="page-title">Mon stock</h2>
    <p class="page-sub">Ce qu'il te reste de chaque article, avec le prix d'achat et le prix de vente. Modifie et clique sur Enregistrer.</p>
    <div class="card">
      <h3 style="justify-content:flex-start; gap:10px;">
        <span>Fournitures</span>
        <span class="badge-count">${filtered.length}</span>
      </h3>
      <div class="toolbar" style="margin-bottom:14px;">
        <div class="field" style="margin-bottom:0; min-width:240px;">
          <label>Rechercher un article</label>
          <input type="search" id="stock-search" placeholder="Ex : cahier, colle, bic..." value="${q?q.replace(/"/g,'&quot;'):''}" style="width:100%;">
        </div>
      </div>
      ${filtered.length===0 ? '<div class="empty">Aucun article ne correspond à ta recherche.</div>' : `
      <div class="table-scroll"><table>
        <thead><tr><th>Article</th><th class="num">Stock</th><th class="num">Seuil</th><th class="num">Prix achat</th><th class="num">Prix vente</th><th class="num">Bénéfice</th><th>Fournisseur</th><th>Statut</th><th></th></tr></thead>
        <tbody id="stock-body"></tbody>
      </table></div>`}
    </div>
  `;
  const searchInp = document.getElementById('stock-search');
  let searchTimer;
  searchInp.oninput = ()=>{
    clearTimeout(searchTimer);
    const val = searchInp.value;
    const caret = searchInp.selectionStart;
    searchTimer = setTimeout(()=>{
      renderStock(main, val);
      const inp2 = document.getElementById('stock-search');
      if(inp2){ inp2.focus(); inp2.setSelectionRange(caret, caret); }
    }, 150);
  };
  if(filtered.length===0) return;
  const body = document.getElementById('stock-body');
  filtered.forEach(a=>{
    const low = a.stock <= a.seuil;
    const marge = a.prixVente - a.prixAchat;
    const tr = document.createElement('tr');
    if(low) tr.className = 'row-alert';
    tr.innerHTML = `
      <td>${a.nom}${a.niveau?` <span class="muted">(${a.niveau})</span>`:''}</td>
      <td class="num"><input type="number" value="${a.stock}" style="width:70px; text-align:right;" data-stock="${a.id}"></td>
      <td class="num"><input type="number" value="${a.seuil}" style="width:60px; text-align:right;" data-seuil="${a.id}"></td>
      <td class="num"><input type="number" value="${a.prixAchat}" style="width:75px; text-align:right;" data-achat="${a.id}"></td>
      <td class="num"><input type="number" value="${a.prixVente}" style="width:75px; text-align:right;" data-vente="${a.id}"></td>
      <td class="num" style="color:${marge>=0?'var(--ok)':'var(--warn)'};">${fmt(marge)} F</td>
      <td>
        <select data-fourn="${a.id}">
          <option value="">—</option>
          ${DATA.fournisseurs.map(f=>`<option value="${f.id}" ${f.id===a.fournisseurId?'selected':''}>${f.nom}</option>`).join('')}
        </select>
      </td>
      <td>${low?'<span class="tag tag-warn">A commander</span>':'<span class="tag tag-ok">OK</span>'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" data-save="${a.id}">Enregistrer</button>
      </td>
    `;
    body.appendChild(tr);
  });
  body.querySelectorAll('[data-save]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.save;
      const art = DATA.articles.find(a=>a.id===id);
      art.stock = parseInt(body.querySelector(`[data-stock="${id}"]`).value)||0;
      art.seuil = parseInt(body.querySelector(`[data-seuil="${id}"]`).value)||0;
      art.prixAchat = parseFloat(body.querySelector(`[data-achat="${id}"]`).value)||0;
      art.prixVente = parseFloat(body.querySelector(`[data-vente="${id}"]`).value)||0;
      art.fournisseurId = body.querySelector(`[data-fourn="${id}"]`).value || null;
      await saveData();
      showToast('Article mis à jour');
      renderStock(main, q);
    };
  });
}

function openFournisseurModal(f){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const isNew = !f;
  bg.innerHTML = `
    <div class="modal">
      <button class="close-x">&times;</button>
      <h3>${isNew?'Nouveau fournisseur':'Modifier le fournisseur'}</h3>
      <div class="field"><label>Nom</label><input id="f-nom" style="width:100%;" value="${f?f.nom:''}"></div>
      <div class="field"><label>Personne de contact</label><input id="f-contact" style="width:100%;" value="${f?(f.contact||''):''}"></div>
      <div class="field"><label>Téléphone</label><input id="f-tel" style="width:100%;" value="${f?(f.tel||''):''}"></div>
      <div class="field"><label>Email</label><input id="f-email" style="width:100%;" value="${f?(f.email||''):''}"></div>
      <button class="btn" id="f-save">Enregistrer</button>
    </div>
  `;
  document.body.appendChild(bg);
  bg.querySelector('.close-x').onclick = ()=> bg.remove();
  bg.onclick = (e)=>{ if(e.target===bg) bg.remove(); };
  bg.querySelector('#f-save').onclick = async ()=>{
    const nom = document.getElementById('f-nom').value.trim();
    if(!nom){ showToast('Le nom est requis'); return; }
    const payload = {
      nom,
      contact: document.getElementById('f-contact').value.trim(),
      tel: document.getElementById('f-tel').value.trim(),
      email: document.getElementById('f-email').value.trim(),
    };
    if(isNew){ DATA.fournisseurs.push({id:uid(), ...payload}); }
    else{ Object.assign(f, payload); }
    await saveData();
    bg.remove();
    showToast('Fournisseur enregistré');
    render();
  };
}

// ---------- RAPPORT FINANCIER (achats -> ventes) ----------
function renderRapport(main){
  const allDates = [
    ...DATA.commandes.filter(c=>c.statut==='reçue').map(c=>c.date),
    ...DATA.ventes.map(v=>v.date),
    ...(DATA.ventesLivres||[]).map(v=>v.date),
    ...DATA.depenses.map(d=>d.date)
  ].sort();
  const minDate = allDates.length ? allDates[0] : new Date().toISOString().slice(0,10);
  const maxDate = new Date().toISOString().slice(0,10);

  main.innerHTML = `
    <h2 class="page-title">Mon bilan</h2>
    <p class="page-sub">Sur une période : combien tu as gagné, combien tu as dépensé, et ce qui te reste.</p>
    <div class="card">
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Du</label>
          <input type="date" id="r-from" value="${minDate}">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Au</label>
          <input type="date" id="r-to" value="${maxDate}">
        </div>
        <button class="btn" id="r-apply">Appliquer</button>
        <button class="btn btn-ghost" id="r-reset">Depuis le début</button>
      </div>
    </div>
    <div id="r-kpis"></div>
    <div class="card">
      <h3>Totaux par jour (tous niveaux confondus)</h3>
      <div id="r-parjour"></div>
    </div>
    <div class="card">
      <h3>Historique (achats, ventes & dépenses)</h3>
      <div id="r-hist"></div>
    </div>
  `;

  const kpisDiv = document.getElementById('r-kpis');
  const parJourDiv = document.getElementById('r-parjour');
  const histDiv = document.getElementById('r-hist');
  const todayStr = new Date().toISOString().slice(0,10);

  function draw(){
    const from = document.getElementById('r-from').value || minDate;
    const to = document.getElementById('r-to').value || maxDate;

    const commandesPeriode = DATA.commandes.filter(c=>c.statut==='reçue' && c.date>=from && c.date<=to);
    const ventesPeriode = DATA.ventes.filter(v=>v.date>=from && v.date<=to);
    const ventesLivresPeriode = (DATA.ventesLivres||[]).filter(v=>v.date>=from && v.date<=to);
    const depensesPeriode = DATA.depenses.filter(d=>d.date>=from && d.date<=to);

    const totalAchats = Math.round(commandesPeriode.reduce((s,c)=> s + c.lignes.reduce((ss,l)=>ss+l.qty*l.prixAchat,0), 0));
    const ventesKits = ventesPeriode.reduce((s,v)=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      return s + (niv? niv.montant*v.qty : 0);
    },0);
    const coutKits = ventesPeriode.reduce((s,v)=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      return s + (niv? kitCost(niv)*v.qty : 0);
    },0);
    const ventesLivresTot = ventesLivresPeriode.reduce((s,v)=>s+v.prixVente*v.qty,0);
    const coutLivresTot = ventesLivresPeriode.reduce((s,v)=>s+v.prixAchat*v.qty,0);
    // On arrondit ici, une seule fois, AVANT tous les calculs qui suivent.
    // Sinon chaque carte (Argent des ventes, Coût des ventes...) s'arrondit séparément
    // pour l'affichage, et "Bénéfice avant dépenses" (calculé sur les valeurs brutes
    // non arrondies, ex: 172,5 F le cahier) tombe sur un chiffre différent d'1 F par
    // rapport à un calcul manuel "Argent des ventes affiché − Coût des ventes affiché".
    const totalVentes = Math.round(ventesKits + ventesLivresTot);   // kits + livres
    const coutVentes = Math.round(coutKits + coutLivresTot);         // coût matière kits + coût d'achat livres
    const totalDepenses = Math.round(depensesPeriode.reduce((s,d)=>s+d.montant,0));

    const margeBrute = totalVentes - coutVentes;                      // vente - coût matière
    const resultatNet = margeBrute - totalDepenses;                  // vue comptable
    const fluxTresorerie = totalVentes - totalAchats - totalDepenses; // vue caisse

    kpisDiv.innerHTML = `
      <div class="grid grid-4" style="margin-bottom:16px;">
        <div class="kpi"><p class="lbl">Argent des ventes</p><p class="val" style="color:var(--ok);">${fmt(totalVentes)} F</p></div>
        <div class="kpi"><p class="lbl">Coût des ventes (kits + livres/arts)</p><p class="val" style="color:var(--warn);">${fmt(coutVentes)} F</p></div>
        <div class="kpi"><p class="lbl">Bénéfice avant dépenses</p><p class="val">${fmt(margeBrute)} F</p></div>
        <div class="kpi kpi-warn"><p class="lbl">Dépenses</p><p class="val">${fmt(totalDepenses)} F</p></div>
      </div>
      <div class="grid grid-2" style="margin-bottom:20px;">
        <div class="kpi"><p class="lbl">Bénéfice réel</p><p class="val" style="color:${resultatNet>=0?'var(--ok)':'var(--warn)'};">${fmt(resultatNet)} F</p><div class="sub">Argent des ventes − coût des ventes − dépenses</div></div>
        <div class="kpi"><p class="lbl">Argent en caisse</p><p class="val" style="color:${fluxTresorerie>=0?'var(--ok)':'var(--warn)'};">${fmt(fluxTresorerie)} F</p><div class="sub">Ventes − achats reçus (${fmt(totalAchats)} F) − dépenses</div></div>
      </div>
    `;

    // ---- Totaux par jour, tous niveaux confondus (kits + livres/arts) ----
    const parJourMap = {};
    ventesPeriode.forEach(v=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      const recette = niv? niv.montant*v.qty : 0;
      const cout = niv? kitCost(niv)*v.qty : 0;
      if(!parJourMap[v.date]) parJourMap[v.date] = {qty:0, recette:0, cout:0};
      parJourMap[v.date].qty += v.qty;
      parJourMap[v.date].recette += recette;
      parJourMap[v.date].cout += cout;
    });
    ventesLivresPeriode.forEach(v=>{
      const recette = v.prixVente*v.qty;
      const cout = v.prixAchat*v.qty;
      if(!parJourMap[v.date]) parJourMap[v.date] = {qty:0, recette:0, cout:0};
      parJourMap[v.date].qty += v.qty;
      parJourMap[v.date].recette += recette;
      parJourMap[v.date].cout += cout;
    });
    const joursTries = Object.keys(parJourMap).sort((a,b)=> b.localeCompare(a));
    if(joursTries.length===0){
      parJourDiv.innerHTML = '<div class="empty">Aucune vente (kits ou livres/arts) sur cette période.</div>';
    } else {
      let tQty=0, tRec=0, tCout=0;
      const rows = joursTries.map(d=>{
        const j = parJourMap[d];
        const recette = Math.round(j.recette);
        const cout = Math.round(j.cout);
        const benef = recette - cout;
        tQty += j.qty; tRec += recette; tCout += cout;
        return `<tr><td>${d}${d===todayStr?' <span class="tag tag-gold">Aujourd’hui</span>':''}</td><td class="num"><b>${fmt(j.qty)}</b></td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(cout)} F</td><td class="num" style="color:${benef>=0?'var(--ok)':'var(--warn)'};">${fmt(benef)} F</td></tr>`;
      }).join('');
      const tBenef = tRec - tCout;
      parJourDiv.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th class="num">Qté vendue</th><th class="num">Recette</th><th class="num">Coût</th><th class="num">Bénéfice</th></tr></thead><tbody>
        ${rows}
        <tr style="border-top:2px solid var(--navy);"><td><b>Total général</b></td><td class="num"><b>${fmt(tQty)}</b></td><td class="num"><b>${fmt(tRec)} F</b></td><td class="num"><b>${fmt(tCout)} F</b></td><td class="num" style="color:${tBenef>=0?'var(--ok)':'var(--warn)'};"><b>${fmt(tBenef)} F</b></td></tr>
      </tbody></table></div>`;
    }

    const evenements = [
      ...commandesPeriode.map(c=>{
        const fourn = DATA.fournisseurs.find(f=>f.id===c.fournisseurId);
        const montant = c.lignes.reduce((s,l)=>s+l.qty*l.prixAchat,0);
        return {date:c.date, type:'Achat', detail:`Commande — ${fourn?fourn.nom:'Sans fournisseur'} (${c.lignes.length} article${c.lignes.length>1?'s':''})`, montant:-montant};
      }),
      ...ventesPeriode.map(v=>{
        const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
        const montant = niv? niv.montant*v.qty : 0;
        return {date:v.date, type:'Vente', detail:`${v.qty} kit(s) ${niv?niv.nom:'?'}`, montant:montant};
      }),
      ...ventesLivresPeriode.map(v=>{
        const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
        return {date:v.date, type:'Vente', detail:`${v.qty} livre(s) — ${v.livreNom||'?'}${niv?' ('+niv.nom+')':''}`, montant:v.prixVente*v.qty};
      }),
      ...depensesPeriode.map(d=>({
        date:d.date, type:'Dépense',
        detail:`${d.categorie}${d.note?' — '+d.note:''}`,
        montant:-d.montant
      }))
    ].sort((a,b)=> b.date.localeCompare(a.date));

    if(evenements.length===0){
      histDiv.innerHTML = '<div class="empty">Aucune activité (achat, vente ou dépense) sur cette période.</div>';
      return;
    }
    histDiv.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Détail</th><th class="num">Montant</th></tr></thead><tbody>
      ${evenements.map(e=>`<tr>
        <td>${e.date}</td>
        <td><span class="tag ${e.montant>=0?'tag-ok':'tag-warn'}">${e.type}</span></td>
        <td>${e.detail}</td>
        <td class="num" style="color:${e.montant>=0?'var(--ok)':'var(--warn)'};">${e.montant>=0?'+':'-'}${fmt(Math.abs(e.montant))} F</td>
      </tr>`).join('')}
    </tbody></table></div>`;
  }

  document.getElementById('r-apply').onclick = draw;
  document.getElementById('r-reset').onclick = ()=>{
    document.getElementById('r-from').value = minDate;
    document.getElementById('r-to').value = maxDate;
    draw();
  };
  draw();
}

// ---------- COMMANDES ----------
function computeSuggestions(){
  // besoin brut per article = sum over ventes of (kit qty * compo) -- based on all recorded sales
  const besoin = new Array(DATA.articles.length).fill(0);
  DATA.ventes.forEach(v=>{
    const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
    if(!niv) return;
    DEFAULT_COMPO_HEADERS.forEach(key=>{
      const art = articleByCompoKey(key);
      if(art){ const idx = DATA.articles.indexOf(art); besoin[idx] += (niv.compo[key]||0) * v.qty; }
    });
  });
  const trousseBesoin = besoin[TROUSSE_INDEX];
  TROUSSE_LINKED_INDEXES.forEach(i=>{ besoin[i] = trousseBesoin; });
  return DATA.articles.map((a,i)=>{
    const aCommander = Math.max(besoin[i] - a.stock, 0);
    return {article:a, besoin: besoin[i], aCommander};
  }).filter(x=>x.aCommander > 0);
}

    <div style="border-top:1px solid var(--line); padding:14px 0;">

}

// ---------- PREVISION DE COMMANDE ----------
// Calcule le besoin par article à partir d'un nombre de kits saisi par niveau
function computeBesoinFromKits(kitsByNiveau){
  const besoin = new Array(DATA.articles.length).fill(0);
  Object.keys(kitsByNiveau).forEach(nid=>{
    const qty = kitsByNiveau[nid] || 0;
    if(qty <= 0) return;
    const niv = DATA.niveaux.find(n=>n.id===nid);
    if(!niv) return;
    DEFAULT_COMPO_HEADERS.forEach(key=>{
      const art = articleByCompoKey(key);
      if(art){ const idx = DATA.articles.indexOf(art); besoin[idx] += (niv.compo[key]||0) * qty; }
    });
    // Contenu de la trousse (scotch, colle, bics...)
    const trousseQty = (niv.compo['Trousse']||0) * qty;
    if(trousseQty > 0){ TROUSSE_LINKED_INDEXES.forEach(i=>{ besoin[i] += trousseQty; }); }
  });
  return besoin;
}

// ---------- STOCK LIVRES (catalogue par classe, vendus au détail) ----------
// Le prix d'achat se calcule à partir du PRIX DE VENTE et de la remise (% ou FCFA).
// Ex : vente 3000, remise 20% -> achat 2400.  |  vente 3000, remise 1000 F -> achat 2000.
function livreAchat(l){
  const vente = +l.prixVente || 0;
  const rem = +l.remise || 0;
  const achat = (l.remiseType==='fcfa') ? (vente - rem) : (vente - vente*rem/100);
  return Math.max(Math.round(achat), 0);
}
function calcAchat(vente, rem, type){
  vente = +vente||0; rem = +rem||0;
  const a = (type==='fcfa') ? (vente - rem) : (vente - vente*rem/100);
  return Math.max(Math.round(a), 0);
}

  }
  if(livres.length===0){
    body.innerHTML = '<div class="empty">Aucun livre ne correspond à ta recherche dans cette classe.</div>';
    return;
  }
  body.innerHTML = `
    <div class="sheet-scroll"><table>
      <thead><tr>
        <th>Livre</th><th>Matière</th>
        <th class="num">Prix vente</th><th>Remise</th>
        <th class="num">Prix d'achat</th><th class="num">Bénéfice</th>

      </tr></thead>
      <tbody>
      ${livres.map(l=>{
        const low = l.stock <= l.seuil;
        const achat = livreAchat(l);
        const marge = (+l.prixVente||0) - achat;
        return `<tr class="${low?'row-alert':''}">
          <td><input type="text" value="${(l.nom||'').replace(/"/g,'&quot;')}" style="width:190px;" data-lnom="${l.id}"></td>

          <td class="num"><input type="number" min="0" value="${l.prixVente||0}" style="width:82px; text-align:right;" data-lvente="${l.id}"></td>
          <td>
            <span class="remise-wrap">
              <input type="number" min="0" value="${l.remise||0}" style="width:62px; text-align:right;" data-lrem="${l.id}">
              <select data-ltype="${l.id}">
                <option value="pct" ${l.remiseType!=='fcfa'?'selected':''}>%</option>
                <option value="fcfa" ${l.remiseType==='fcfa'?'selected':''}>F</option>
              </select>
            </span>
          </td>
          <td class="num achat-cell" data-lachatcell="${l.id}">${fmt(achat)} F</td>
          <td class="num" data-lmargecell="${l.id}" style="color:${marge>=0?'var(--ok)':'var(--warn)'}; font-weight:600;">${fmt(marge)} F</td>

          <td class="num"><input type="number" value="${l.seuil}" style="width:56px; text-align:right;" data-lseuil="${l.id}"></td>

            <select data-lfourn="${l.id}">
              <option value="">—</option>

          </td>
          <td>${low?'<span class="tag tag-warn">A commander</span>':'<span class="tag tag-ok">OK</span>'}</td>

            <button class="btn btn-ghost btn-sm" data-lsave="${l.id}">Enregistrer</button>

          </td>
        </tr>`;
      }).join('')}
      </tbody>

  `;

  // Recalcul en direct du prix d'achat + bénéfice pendant la saisie
  function recalc(id){
    const vente = body.querySelector(`[data-lvente="${id}"]`).value;
    const rem = body.querySelector(`[data-lrem="${id}"]`).value;
    const typ = body.querySelector(`[data-ltype="${id}"]`).value;

    b.onclick = async ()=>{

      const l = DATA.livres.find(x=>x.id===id);
      l.nom = body.querySelector(`[data-lnom="${id}"]`).value.trim() || 'Sans nom';
      l.matiere = body.querySelector(`[data-lmat="${id}"]`).value.trim();
      l.prixVente = parseFloat(body.querySelector(`[data-lvente="${id}"]`).value)||0;
      l.remise = parseFloat(body.querySelector(`[data-lrem="${id}"]`).value)||0;
      l.remiseType = body.querySelector(`[data-ltype="${id}"]`).value;
      l.prixAchat = livreAchat(l);
      l.stock = parseInt(body.querySelector(`[data-lstock="${id}"]`).value)||0;
      l.seuil = parseInt(body.querySelector(`[data-lseuil="${id}"]`).value)||0;
      l.fournisseurId = body.querySelector(`[data-lfourn="${id}"]`).value || null;
      await saveData();
      showToast('Livre mis à jour');
      drawStockLivres();
    };
  });
  body.querySelectorAll('[data-ldel]').forEach(b=>{
    b.onclick = async ()=>{
      const l = DATA.livres.find(x=>x.id===b.dataset.ldel);
      if(!confirm(`Supprimer « ${l?l.nom:''} » de cette classe ?`)) return;
      DATA.livres = DATA.livres.filter(x=>x.id!==b.dataset.ldel);
      await saveData();
      showToast('Livre supprimé');
      drawStockLivres();
    };
  });
}


// ---------- VENTE AU DÉTAIL (livres + Arts plastiques & Musique) ----------
// Les fournitures Arts/Musique vivent dans le STOCK CAHIER : leur vente déduit ce stock-là.
const ARTS_NOMS = ["Canson","Gouache","Feutre","Crayon 2B","Pinceau","Petit TP 100 P"];
const MUSIQUE_NOMS = ["Flûte"];
function artsArticles(){ return DATA.articles.filter(a=>ARTS_NOMS.includes(a.nom)); }
function musiqueArticles(){ return DATA.articles.filter(a=>MUSIQUE_NOMS.includes(a.nom)); }
// Pack Arts Plastiques : vendu en un clic, déduit tous ses composants du stock cahier.
const PACK_ARTS = { id:'arts', nom:'Pack Arts Plastiques (complet)', components:[
  {nom:'Canson', q:1}, {nom:'Gouache', q:1}, {nom:'Feutre', q:1},
  {nom:'Crayon 2B', q:2}, {nom:'Pinceau', q:2}, {nom:'Petit TP 100 P', q:1}
]};
function packInfo(){
  let vente=0, achat=0, missing=[], minStock=Infinity;
  PACK_ARTS.components.forEach(c=>{
    const a = DATA.articles.find(x=>x.nom===c.nom);
    if(!a){ missing.push(c.nom); return; }
    vente += (a.prixVente||0)*c.q;
    achat += (a.prixAchat||0)*c.q;
    minStock = Math.min(minStock, Math.floor((a.stock||0)/c.q));
  });
  return {vente, achat, missing, dispo: (minStock===Infinity?0:minStock)};
}

function renderVentesLivres(main){
  const todayStr = new Date().toISOString().slice(0,10);
  if(!livreNiveauFilter || !DATA.niveaux.some(n=>n.id===livreNiveauFilter)){
    livreNiveauFilter = DATA.niveaux.length ? DATA.niveaux[0].id : null;
  }
  const totalVendus = DATA.ventesLivres.reduce((s,v)=>s+v.qty,0);
  const vendusJour = DATA.ventesLivres.filter(v=>v.date===todayStr).reduce((s,v)=>s+v.qty,0);
  main.innerHTML = `
    <h2 class="page-title">Vendre un livre / une fourniture</h2>
    <p class="page-sub">Vends à l'unité : un livre (baisse le stock livres) ou un article Arts plastiques / Musique (baisse le stock cahiers). Choisis la classe pour les livres ; les articles Arts & Musique sont les mêmes pour toutes les classes.</p>
    <div class="card">
      <h3>Nouvelle vente</h3>
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Classe (pour les livres)</label>
          <select id="vl-niveau">${DATA.niveaux.map(n=>`<option value="${n.id}" ${n.id===livreNiveauFilter?'selected':''}>${n.nom}</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0; flex:1; min-width:240px;">
          <label>Article à vendre</label>
          <select id="vl-livre" style="width:100%;"></select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Quantité</label>
          <input type="number" id="vl-qty" min="1" value="1" style="width:90px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Date</label>
          <input type="date" id="vl-date" value="${todayStr}">
        </div>
        <button class="btn" id="vl-submit">Enregistrer la vente</button>
      </div>
      <div id="vl-info" class="muted" style="font-size:12px; margin-top:4px;"></div>
    </div>
    <div class="grid grid-2" style="margin-bottom:20px;">
      <div class="kpi"><p class="lbl">Total vendu au détail (depuis le début)</p><p class="val">${fmt(totalVendus)}</p></div>
      <div class="kpi"><p class="lbl">Vendu aujourd'hui</p><p class="val">${fmt(vendusJour)}</p></div>
    </div>
    <div class="card">
      <h3>Totaux par jour (tous niveaux confondus)</h3>
      <div id="vl-parjour"></div>
    </div>
    <div class="card">
      <h3>Historique des ventes au détail <span class="badge-count">${DATA.ventesLivres.length}</span></h3>
      <div id="vl-hist"></div>
    </div>
  `;

  const nivSel = document.getElementById('vl-niveau');
  const itemSel = document.getElementById('vl-livre');
  const info = document.getElementById('vl-info');

  function currentItem(){
    const val = itemSel.value || '';
    if(val==='pack:arts') return {kind:'pack', ref:PACK_ARTS};
    if(val.startsWith('livre:')) return {kind:'livre', ref:DATA.livres.find(x=>x.id===val.slice(6))};
    if(val.startsWith('art:'))   return {kind:'fourniture', ref:DATA.articles.find(x=>x.id===val.slice(4))};
    return {kind:null, ref:null};
  }
  function fillItems(){
    const livres = DATA.livres.filter(l=>l.niveauId===livreNiveauFilter);
    const arts = artsArticles();
    const musique = musiqueArticles();
    let html = '';
    if(livres.length){
      html += `<optgroup label="Livres — ${(DATA.niveaux.find(n=>n.id===livreNiveauFilter)||{}).nom||''}">`
        + livres.map(l=>`<option value="livre:${l.id}">${l.nom} — ${fmt(l.prixVente)} F (stock ${fmt(l.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(arts.length){
      const pk = packInfo();
      html += `<optgroup label="Arts Plastiques (stock cahiers)">`;
      if(pk.missing.length===0){
        html += `<option value="pack:arts">&#127912; Pack Arts Plastiques (complet) — ${fmt(pk.vente)} F (dispo ${fmt(pk.dispo)})</option>`;
      }
      html += arts.map(a=>`<option value="art:${a.id}">${a.nom} — ${fmt(a.prixVente)} F (stock ${fmt(a.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(musique.length){
      html += `<optgroup label="Musique (stock cahiers)">`
        + musique.map(a=>`<option value="art:${a.id}">${a.nom} — ${fmt(a.prixVente)} F (stock ${fmt(a.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(!html) html = '<option value="">Aucun article disponible</option>';
    itemSel.innerHTML = html;
    updateInfo();
  }
  function updateInfo(){
    const {kind, ref} = currentItem();
    if(!ref){ info.textContent=''; return; }
    if(kind==='pack'){
      const pk = packInfo();
      const compo = PACK_ARTS.components.map(c=>`${c.q}× ${c.nom}`).join(', ');
      info.textContent = `Pack (déduit du stock cahiers) · Vente ${fmt(pk.vente)} F · Bénéfice ${fmt(pk.vente-pk.achat)} F · Packs possibles avec le stock actuel : ${fmt(pk.dispo)} · Contenu : ${compo}`;
    } else if(kind==='livre'){
      info.textContent = `Livre · Vente ${fmt(ref.prixVente)} F · Bénéfice ${fmt(ref.prixVente-livreAchat(ref))} F · Stock restant ${fmt(ref.stock)}`;
    } else {
      info.textContent = `Fourniture (stock cahiers) · Vente ${fmt(ref.prixVente)} F · Bénéfice ${fmt(ref.prixVente-ref.prixAchat)} F · Stock restant ${fmt(ref.stock)}`;
    }
  }
  nivSel.onchange = ()=>{ livreNiveauFilter = nivSel.value; fillItems(); };
  itemSel.onchange = updateInfo;
  fillItems();

  document.getElementById('vl-submit').onclick = async ()=>{
    const {kind, ref} = currentItem();
    const qty = parseInt(document.getElementById('vl-qty').value)||0;
    const date = document.getElementById('vl-date').value;
    if(!ref){ showToast('Choisis un article'); return; }
    if(qty<=0){ showToast('Vérifie la quantité'); return; }
    const heure = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    if(kind==='pack'){
      const pk = packInfo();
      if(pk.missing.length){ showToast('Article manquant : '+pk.missing.join(', ')); return; }
      PACK_ARTS.components.forEach(c=>{
        const a = DATA.articles.find(x=>x.nom===c.nom);
        if(a) a.stock -= c.q*qty;
      });
      DATA.ventesLivres.push({id:uid(), kind:'pack', livreNom:PACK_ARTS.nom, niveauId:livreNiveauFilter, qty, prixVente:pk.vente, prixAchat:pk.achat, components:PACK_ARTS.components, date, heure});
    } else if(kind==='livre'){
      ref.stock -= qty;
      DATA.ventesLivres.push({id:uid(), kind:'livre', livreId:ref.id, livreNom:ref.nom, niveauId:ref.niveauId, qty, prixVente:ref.prixVente, prixAchat:livreAchat(ref), date, heure});
    } else {
      ref.stock -= qty;
      DATA.ventesLivres.push({id:uid(), kind:'fourniture', articleId:ref.id, livreNom:ref.nom, niveauId:livreNiveauFilter, qty, prixVente:ref.prixVente, prixAchat:ref.prixAchat, date, heure});
    }
    await saveData();
    showToast(`Vente enregistrée : ${qty} × ${ref.nom}`);
    renderVentesLivres(main);
  };

  const parJour = document.getElementById('vl-parjour');
  if(DATA.ventesLivres.length===0){
    parJour.innerHTML = '<div class="empty">Aucune vente au détail pour l\'instant.</div>';
  } else {
    const g = {};
    DATA.ventesLivres.forEach(v=>{
      if(!g[v.date]) g[v.date] = {qty:0, recette:0, marge:0};
      g[v.date].qty += v.qty;
      g[v.date].recette += v.prixVente*v.qty;
      g[v.date].marge += (v.prixVente - v.prixAchat)*v.qty;
    });
    const dates = Object.keys(g).sort((a,b)=> b.localeCompare(a));
    const tQty = dates.reduce((s,d)=>s+g[d].qty,0);
    const tRec = dates.reduce((s,d)=>s+g[d].recette,0);
    const tMar = dates.reduce((s,d)=>s+g[d].marge,0);
    parJour.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th class="num">Articles vendus</th><th class="num">Recette</th><th class="num">Bénéfice</th></tr></thead><tbody>
      ${dates.map(d=>`<tr><td>${d}${d===todayStr?' <span class="tag tag-gold">Aujourd’hui</span>':''}</td><td class="num"><b>${fmt(g[d].qty)}</b></td><td class="num">${fmt(g[d].recette)} F</td><td class="num">${fmt(g[d].marge)} F</td></tr>`).join('')}
      <tr style="border-top:2px solid var(--navy);"><td><b>Total général</b></td><td class="num"><b>${fmt(tQty)}</b></td><td class="num"><b>${fmt(tRec)} F</b></td><td class="num"><b>${fmt(tMar)} F</b></td></tr>
    </tbody></table></div>`;
  }

  const hist = document.getElementById('vl-hist');
  if(DATA.ventesLivres.length===0){ hist.innerHTML = '<div class="empty">Aucune vente au détail pour l\'instant.</div>'; return; }
  const sorted = [...DATA.ventesLivres].sort(byRecent);
  hist.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Heure</th><th>Type</th><th>Article</th><th class="num">Qté</th><th class="num">Recette</th><th class="num">Bénéfice</th><th></th></tr></thead><tbody>
    ${sorted.map(v=>{
      const recette = v.prixVente*v.qty;
      const marge = (v.prixVente-v.prixAchat)*v.qty;
      const typeLbl = v.kind==='pack' ? 'Pack Arts' : (v.kind==='fourniture' ? 'Arts/Musique' : 'Livre');
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      const article = v.kind==='fourniture' ? (v.livreNom||'?') : `${v.livreNom||'?'}${niv?' ('+niv.nom+')':''}`;
      return `<tr><td>${v.date}</td><td>${v.heure||'—'}</td><td>${typeLbl}</td><td>${article}</td><td class="num">${fmt(v.qty)}</td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(marge)} F</td>
      <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-vldel="${v.id}">Annuler</button></td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  hist.querySelectorAll('[data-vldel]').forEach(b=>{
    b.onclick = async ()=>{
      const v = DATA.ventesLivres.find(x=>x.id===b.dataset.vldel);
      if(v){
        if(v.kind==='pack'){
          (v.components||PACK_ARTS.components).forEach(c=>{
            const a = DATA.articles.find(x=>x.nom===c.nom);
            if(a) a.stock += c.q*v.qty; // on remet chaque composant
          });
        } else if(v.kind==='fourniture'){
          const a = DATA.articles.find(x=>x.id===v.articleId);
          if(a) a.stock += v.qty; // on remet le stock cahier
        } else {
          const l = DATA.livres.find(x=>x.id===v.livreId);
          if(l) l.stock += v.qty; // on remet le stock livre
        }
      }
      DATA.ventesLivres = DATA.ventesLivres.filter(x=>x.id!==b.dataset.vldel);
      await saveData();
      showToast('Vente annulée, stock restauré');
      renderVentesLivres(main);
    };
  });
}


(async function init(){
  initMobileNav();
  // 1) Affiche l'appli TOUT DE SUITE (menu + tableau de bord), même si le serveur dort encore
  DATA = defaultData();
  try{ render(); }catch(e){ console.error('Init: échec 1er affichage', e); }
  // 2) Récupère les vraies données depuis la base (peut prendre du temps si le serveur se réveille)
  try{
    await loadData();
  }catch(e){
    console.error('Init: échec chargement', e);
    if(!DATA) DATA = defaultData();
  }
  // 3) Ré-affiche avec les vraies données
  try{
    render();
  }catch(e){
    console.error('Init: échec affichage', e);
    const mainEl = document.getElementById('main');
    if(mainEl) mainEl.innerHTML = '<div style="padding:40px 20px; text-align:center; color:var(--warn);">Une erreur est survenue. Rechargez la page (Ctrl+F5).</div>';
  }
})();
</script>
