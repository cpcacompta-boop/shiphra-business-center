      <div class="kpi"><p class="lbl">Paiements aujourd'hui</p><p class="val" id="tx-kpi-nb">0</p><div class="sub">Nombre de transactions encaissées</div></div>
    </div>
    <div class="card"><h3>Détail <span class="badge-count" id="tx-count">0</span></h3><div id="tx-list"></div></div>
  `;
  const todayStr=new Date().toISOString().slice(0,10);

  function draw(){

    <h3>Remplir par kits</h3>
    <p class="muted" style="font-size:12.5px;">Choisis une classe et un nombre de kits : les quantités des composants (cahiers, trousse...) se remplissent automatiquement, dans la limite du grand stock disponible.</p>
    <div class="field"><label>Classe</label><select id="bk-niveau" style="width:100%;">${DATA.niveaux.map(n=>`<option value="${n.id}">${n.nom}</option>`).join('')}</select></div>
    <div class="field"><label>Nombre de kits</label><input type="number" id="bk-qte" min="1" value="10" style="width:100%;"></div>
    <button class="btn" id="bk-ok">Remplir</button>
  </div>`;
  document.body.appendChild(bg);
  bg.querySelector('.close-x').onclick=()=>bg.remove();
  bg.onclick=(e)=>{ if(e.target===bg) bg.remove(); };
  bg.querySelector('#bk-ok').onclick=()=>{
    const niveauId=document.getElementById('bk-niveau').value;
    const nb=Math.max(1, parseInt(document.getElementById('bk-qte').value,10)||0);
    const besoins=besoinsCommande([{type:'kit', niveauId, qte:nb}]); // {ref:qte}
    let plafonne=false;
    Object.keys(besoins).forEach(ref=>{
      const it=parseItemRef(ref); const dispo=it?it.stock:0;
      let v=(qtys[ref]||0)+besoins[ref];
      if(v>dispo){ v=dispo; plafonne=true; }
      qtys[ref]=v;
    });
    bg.remove();
    if(plafonne) showToast('Rempli — certaines quantités ont été plafonnées au grand stock disponible');
    else showToast('Quantités remplies pour '+nb+' kits');
    redraw();
  };
}

async function validerTransfertGrid(main, qtys){
  const locSel=document.getElementById('tr-loc');
  const locId=locSel.value;
  const locNom=locSel.options[locSel.selectedIndex]?locSel.options[locSel.selectedIndex].text:'';
  const lignes=[];
  Object.keys(qtys).forEach(ref=>{
    const q=qtys[ref]; if(!q||q<=0) return;
    const it=parseItemRef(ref); if(!it) return;
    lignes.push({ kind:it.kind, id:it.id, nom:it.nom, qte:q });
  });
  if(lignes.length===0){ showToast('Mets au moins une quantité à envoyer'); return; }
  const btn=document.getElementById('tr-valider');
  if(btn){ btn.disabled=true; btn.textContent='Envoi...'; }
  try{
    const res = await fetch('/api/tx/transfert', {
      method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
      body: JSON.stringify({ localiteId:locId, localiteNom:locNom, lignes })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){ showToast(data.error||'Transfert impossible'); if(btn){btn.disabled=false;btn.textContent='Valider le transfert';} await loadData(); renderTransfert(main); return; }
    await loadData();
    showToast('Transfert validé vers '+locNom+' ('+data.transfert.num+')');
    renderTransfert(main);
    printTransfert(data.transfert.id);
  }catch(e){
    showToast('Impossible de contacter le serveur');
    if(btn){ btn.disabled=false; btn.textContent='Valider le transfert'; }
  }
}

let retourTab = 'boutique'; // 'boutique' | 'fournisseur'

async function renderRetours(main){

  const maLoc = (CURRENT_USER.role==='vente'||CURRENT_USER.role==='caisse') ? CURRENT_USER.localiteId : null;

  main.innerHTML = `
    <h2 class="page-title">Bons de retour</h2>
    <p class="page-sub">Marchandise invendue, abîmée ou livrée par erreur : enregistre-la ici. Le stock est corrigé automatiquement et un bon numéroté est généré pour les deux parties.</p>

    <div class="tabs" style="margin-bottom:16px;">
      <button class="tab-btn ${retourTab==='boutique'?'active':''}" id="rt-tab-boutique">&#8617; Boutique &rarr; Grand stock</button>
      <button class="tab-btn ${retourTab==='fournisseur'?'active':''}" id="rt-tab-four">&#8617; Grand stock &rarr; Fournisseur</button>

// --- Retour d'une boutique vers le grand stock ---
function drawRetourBoutique(content, main, localites, maLoc, estGerant){
  if(estGerant && localites.length===0){ content.innerHTML='<div class="card"><div class="empty">Aucune localité active.</div></div>'; return; }
  if(!estGerant && !maLoc){ content.innerHTML='<div class="card"><div class="empty">Ton compte n\'est rattaché à aucune boutique.</div></div>'; return; }
  content.innerHTML = `
    <div class="card">
      <h3>Retourner de la marchandise au Gérant</h3>
      <div class="toolbar">
        ${estGerant ? `<div class="field" style="margin-bottom:0;"><label>Boutique</label>
          <select id="rt-loc" style="min-width:170px;">${localites.map(l=>`<option value="${l.id}">${l.nom}</option>`).join('')}</select></div>`
          : `<div class="muted" style="margin-bottom:4px;">Boutique : <b>${CURRENT_USER.localiteNom||''}</b></div>`}
        <div class="field" style="margin-bottom:0; flex:1; min-width:180px;"><label>Motif du retour</label>
          <select id="rt-motif" style="width:100%;">
            <option value="Invendu (fin de saison)">Invendu (fin de saison)</option>
            <option value="Article abîmé / défectueux">Article abîmé / défectueux</option>
            <option value="Erreur de transfert">Erreur de transfert</option>
            <option value="Surplus de stock">Surplus de stock</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:8px; margin-bottom:0;"><label>Rechercher un article</label>
        <input type="search" id="rt-search" placeholder="Filtrer..." style="width:100%; max-width:320px;"></div>
      <div id="rt-grid" style="margin-top:10px;"></div>
      <div style="margin-top:12px; text-align:right;">
        <span class="muted" id="rt-summary"></span>
        <button class="btn" id="rt-valider" style="margin-left:14px;">Valider le retour</button>
      </div>
    </div>`;

  const qtys = {};
  const locNow = ()=> estGerant ? document.getElementById('rt-loc').value : maLoc;
  function items(){
    const st = (DATA.stockLoc && DATA.stockLoc[locNow()]) || {};
    return Object.keys(st).filter(r=>(st[r]||0)>0).map(ref=>{
      const it = parseItemRef(ref);
      return it ? { ref, kind:it.kind, id:it.id, nom:it.nom, dispo:st[ref] } : null;
    }).filter(Boolean).sort((a,b)=>a.nom.localeCompare(b.nom));
  }
  function summary(){
    const refs=Object.keys(qtys).filter(r=>qtys[r]>0);
    const el=document.getElementById('rt-summary');
    el.textContent = refs.length ? `${refs.length} article(s) · ${fmt(refs.reduce((s,r)=>s+qtys[r],0))} unité(s) à retourner` : 'Rien à retourner';
  }
  function draw(){
    const q=(document.getElementById('rt-search').value||'').toLowerCase();
    let list=items();
    const tous=list.length;
    if(q) list=list.filter(it=>it.nom.toLowerCase().includes(q));
    const grid=document.getElementById('rt-grid');
    if(tous===0){ grid.innerHTML='<div class="empty">Cette boutique n\'a aucun stock à retourner.</div>'; summary(); return; }
    if(list.length===0){ grid.innerHTML='<div class="empty">Aucun article ne correspond.</div>'; summary(); return; }
    grid.innerHTML=`<div class="table-scroll"><table><thead><tr><th>Article</th><th style="text-align:right;">En boutique</th><th style="text-align:right;">Qté à retourner</th></tr></thead><tbody>
      ${list.map(it=>`<tr><td>${it.nom}</td><td style="text-align:right;">${fmt(it.dispo)}</td>
        <td style="text-align:right;"><input type="number" min="0" max="${it.dispo}" value="${qtys[it.ref]||0}" data-r="${it.ref}" data-d="${it.dispo}" style="width:90px; text-align:right;"></td></tr>`).join('')}
    </tbody></table></div>`;
    grid.querySelectorAll('[data-r]').forEach(inp=>{
      inp.oninput=()=>{ let v=parseInt(inp.value,10)||0; const d=parseInt(inp.dataset.d,10); if(v<0)v=0; if(v>d){v=d; inp.value=d;} qtys[inp.dataset.r]=v; summary(); };
    });
    summary();
  }
  document.getElementById('rt-search').oninput=draw;
  const locSel=document.getElementById('rt-loc');
  if(locSel) locSel.onchange=()=>{ Object.keys(qtys).forEach(k=>delete qtys[k]); draw(); };
  document.getElementById('rt-valider').onclick=async ()=>{
    const lignes=[];
    items().forEach(it=>{ const q=qtys[it.ref]; if(q>0) lignes.push({kind:it.kind, id:it.id, nom:it.nom, qte:q}); });
    if(lignes.length===0){ showToast('Mets au moins une quantité'); return; }
    const btn=document.getElementById('rt-valider'); btn.disabled=true; btn.textContent='Envoi...';
    try{
      const locNom = estGerant ? (locSel.options[locSel.selectedIndex].text) : (CURRENT_USER.localiteNom||'');
      const res=await fetch('/api/tx/retour-boutique',{ method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ localiteId:locNow(), localiteNom:locNom, lignes, motif:document.getElementById('rt-motif').value }) });
      const data=await res.json();
      if(!res.ok||!data.ok){ showToast(data.error||'Retour impossible'); btn.disabled=false; btn.textContent='Valider le retour'; await loadData(); renderRetours(main); return; }
      await loadData();
      showToast('Retour validé ('+data.retour.num+')');
      renderRetours(main);
      printRetour(data.retour.id);
    }catch(e){ showToast('Impossible de contacter le serveur'); btn.disabled=false; btn.textContent='Valider le retour'; }
  };
  draw();
}

    </tbody></table></div>`;
    grid.querySelectorAll('[data-r]').forEach(inp=>{

    });
    summary();
  }
  document.getElementById('rf-search').oninput=draw;
  document.getElementById('rf-valider').onclick=async ()=>{
    const lignes=[];
    items().forEach(it=>{ const q=qtys[it.ref]; if(q>0) lignes.push({kind:it.kind, id:it.id, nom:it.nom, qte:q, prixAchat:it.prixAchat||0}); });

      </div>
    </div>
    <div class="card">
      <h3>Mes localités <span class="badge-count" id="loc-count">0</span></h3>
      <div id="loc-list"></div>
    </div>

    <div class="card" style="border:1px solid var(--ok);">
      <h3>&#128190; Sauvegarde de mes données</h3>
      <p class="muted" style="font-size:12.5px; margin:-4px 0 12px;">
        Une sauvegarde complète (ventes, stock, kits, transactions, comptes) est envoyée <b>automatiquement chaque jour</b> par email.
        Tu peux aussi l'envoyer ou la télécharger maintenant.
      </p>
      <div class="toolbar">
        <button class="btn" id="bk-send">&#128231; Envoyer la sauvegarde maintenant</button>
        <button class="btn btn-ghost" id="bk-dl">&#11015; Télécharger le fichier</button>
        <button class="btn btn-ghost" id="bk-restore-btn">&#128260; Restaurer depuis un fichier</button>
        <input type="file" id="bk-file" accept=".json,application/json" style="display:none;">
      </div>
      <div class="muted" id="bk-status" style="margin-top:10px;"></div>
    </div>
  `;

  // --- Restauration (utile pour déménager de base de données) ---
  document.getElementById('bk-restore-btn').onclick = ()=> document.getElementById('bk-file').click();
  document.getElementById('bk-file').onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const st = document.getElementById('bk-status');
    let contenu;
    try{
      contenu = JSON.parse(await file.text());
    }catch(err){ st.innerHTML = '<span style="color:var(--warn);">⚠️ Ce fichier n\'est pas une sauvegarde lisible.</span>'; e.target.value=''; return; }
    const d = contenu.donnees;
    if(!d){ st.innerHTML = '<span style="color:var(--warn);">⚠️ Fichier de sauvegarde invalide.</span>'; e.target.value=''; return; }
    const ok = await askConfirm({
      title:'Restaurer ces données ?',
      message: `Sauvegarde du <b>${(contenu.genereLe||'').slice(0,10)}</b> :<br>
        • ${fmt((d.ventes||[]).length)} vente(s) de kits<br>
        • ${fmt((d.ventesLivres||[]).length)} vente(s) de livres/arts<br>
        • ${fmt((d.commandesVente||[]).length)} transaction(s)<br>
        • ${fmt((d.niveaux||[]).length)} kit(s), ${fmt((d.articles||[]).length)} article(s), ${fmt((d.livres||[]).length)} livre(s)<br>
        • ${fmt((contenu.localites||[]).length)} localité(s)<br><br>
        <b>Attention :</b> les données actuelles de cette base seront remplacées.`,
      okLabel:'Oui, restaurer'
    });
    e.target.value='';
    if(!ok) return;
    st.textContent = 'Restauration en cours...';
    try{
      const res = await fetch('/api/backup/restore', {
        method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
        body: JSON.stringify({ donnees:d, localites: contenu.localites||[], confirmer:'RESTAURER' })
      });
      const data = await res.json();
      if(!res.ok || !data.ok){ st.innerHTML = '<span style="color:var(--warn);">⚠️ ' + (data.error||'Restauration impossible') + '</span>'; return; }
      st.innerHTML = '<span style="color:var(--ok);">✅ Restauration réussie ! Rechargement...</span>';
      showToast('Données restaurées');
      setTimeout(()=> window.location.reload(), 1200);
    }catch(err){ st.innerHTML = '<span style="color:var(--warn);">⚠️ Impossible de contacter le serveur</span>'; }
  };

  document.getElementById('bk-send').onclick = async ()=>{
    const btn = document.getElementById('bk-send');
    const st = document.getElementById('bk-status');
    btn.disabled = true; btn.textContent = 'Envoi en cours...';
    st.textContent = '';
    try{
      const res = await fetch('/api/backup/now', { method:'POST', headers: authHeaders() });
      const data = await res.json();
      if(!res.ok || !data.ok){
        st.innerHTML = '<span style="color:var(--warn);">⚠️ ' + (data.error||'Envoi impossible') + '</span>';
      } else {
        st.innerHTML = '<span style="color:var(--ok);">✅ Sauvegarde envoyée à ' + data.email + '</span>';
        showToast('Sauvegarde envoyée par email');
      }
    }catch(e){ st.innerHTML = '<span style="color:var(--warn);">⚠️ Impossible de contacter le serveur</span>'; }
    btn.disabled = false; btn.innerHTML = '&#128231; Envoyer la sauvegarde maintenant';
  };
  document.getElementById('bk-dl').onclick = async ()=>{
    try{
      const res = await fetch('/api/backup/download', { headers: authHeaders() });
      if(!res.ok){ showToast('Téléchargement impossible'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'shiphra-sauvegarde-' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast('Fichier téléchargé — garde-le en lieu sûr');
    }catch(e){ showToast('Téléchargement impossible'); }
  };

  document.getElementById('loc-add').onclick = async ()=>{
    const nom = document.getElementById('loc-nom').value.trim();
    if(!nom){ showToast('Donne un nom à la localité'); return; }
    try{
      const res = await fetch('/api/localites', { method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify({ nom }) });
      const data = await res.json();
      if(!res.ok || !data.ok){ showToast(data.error || 'Création impossible'); return; }
      showToast('Localité créée : ' + nom);
      document.getElementById('loc-nom').value = '';
      renderLocalites(main);
    }catch(e){ showToast('Impossible de contacter le serveur'); }
  };

  const list = document.getElementById('loc-list');
  const count = document.getElementById('loc-count');
  try{
    const res = await fetch('/api/localites', { headers: authHeaders() });
    const locs = await res.json();
    count.textContent = locs.length;
    if(locs.length===0){ list.innerHTML = '<div class="empty">Aucune localité pour l\'instant. Crée ta première boutique ci-dessus.</div>'; return; }
    list.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Localité</th><th>Statut</th><th></th></tr></thead><tbody>
      ${locs.map(l=>`<tr>
        <td><b>${l.nom}</b></td>
        <td>${l.active ? '<span class="tag tag-ok">Active</span>' : '<span class="tag tag-warn">Désactivée</span>'}</td>
        <td style="text-align:right; white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" data-ren="${l.id}" data-nom="${(l.nom||'').replace(/"/g,'&quot;')}">Renommer</button>
          <button class="btn btn-ghost btn-sm" data-tog="${l.id}" data-active="${l.active}">${l.active?'Désactiver':'Activer'}</button>
          <button class="btn btn-ghost btn-sm" data-del="${l.id}" data-nom="${(l.nom||'').replace(/"/g,'&quot;')}">Supprimer</button>
        </td>
      </tr>`).join('')}
    </tbody></table></div>`;

    list.querySelectorAll('[data-ren]').forEach(b=>{
      b.onclick = ()=> openRenameLocalite(b.dataset.ren, b.dataset.nom, main);
    });
    list.querySelectorAll('[data-tog]').forEach(b=>{
      b.onclick = async ()=>{
        const next = b.dataset.active !== 'true';
        const res = await fetch('/api/localites/'+encodeURIComponent(b.dataset.tog), { method:'PATCH', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify({ active: next }) });
        const data = await res.json();
        if(!res.ok || !data.ok){ showToast(data.error || 'Action impossible'); return; }
        renderLocalites(main);
      };
    });
    list.querySelectorAll('[data-del]').forEach(b=>{
      b.onclick = async ()=>{
        const ok = await askConfirm({ title:'Supprimer cette localité ?', message:`Tu vas supprimer <b>${b.dataset.nom}</b>. Les vendeurs affectés à cette localité seront détachés et devront être ré-affectés. Cette action est définitive.`, okLabel:'Oui, supprimer' });
        if(!ok) return;
        const res = await fetch('/api/localites/'+encodeURIComponent(b.dataset.del), { method:'DELETE', headers: authHeaders() });
        const data = await res.json();
        if(!res.ok || !data.ok){ showToast(data.error || 'Suppression impossible'); return; }
        showToast('Localité supprimée');
        renderLocalites(main);
      };
    });
  }catch(e){
    list.innerHTML = '<div class="empty">Impossible de charger les localités. Vérifie ta connexion.</div>';
  }
}

function openRenameLocalite(id, currentNom, main){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <button class="close-x">&times;</button>
      <h3>Renommer la localité</h3>
      <div class="field"><label>Nouveau nom</label><input id="ren-nom" style="width:100%;" value="${(currentNom||'').replace(/"/g,'&quot;')}"></div>
      <button class="btn" id="ren-save">Enregistrer</button>
    </div>
  `;
  document.body.appendChild(bg);
  bg.querySelector('.close-x').onclick = ()=> bg.remove();
  bg.onclick = (e)=>{ if(e.target===bg) bg.remove(); };
  bg.querySelector('#ren-save').onclick = async ()=>{
    const nom = document.getElementById('ren-nom').value.trim();
    if(!nom){ showToast('Le nom est requis'); return; }
    const res = await fetch('/api/localites/'+encodeURIComponent(id), { method:'PATCH', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify({ nom }) });
    const data = await res.json();
    if(!res.ok || !data.ok){ showToast(data.error || 'Renommage impossible'); return; }
    bg.remove();
    showToast('Localité renommée');
    renderLocalites(main);
  };
}

// ---------- COMPTES ÉQUIPE (réservé au Gérant) ----------
async function renderComptes(main){
  let localites = [];
  try{
    const rl = await fetch('/api/localites', { headers: authHeaders() });
    if(rl.ok) localites = await rl.json();
  }catch(_){}
  const locOptions = localites.map(l=>`<option value="${l.id}">${l.nom}${l.active?'':' (désactivée)'}</option>`).join('');
  main.innerHTML = `
    <h2 class="page-title">Comptes équipe</h2>
    <p class="page-sub">Crée et gère les accès de tes agents. Chaque nouveau compte démarre avec le mot de passe temporaire <b>0000</b> — la personne devra le changer dès sa première connexion.</p>
    <div class="card">
      <h3>Ajouter un compte</h3>
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Nom complet</label>
          <input type="text" id="c-nom" placeholder="Ex : Aïcha Koné" style="width:220px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Identifiant</label>
          <input type="text" id="c-user" placeholder="Ex : aicha" style="width:160px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Rôle</label>
          <select id="c-role" style="width:150px;">
            <option value="vente">Vente</option>
            <option value="caisse">Caisse</option>
            <option value="superviseur">Superviseur</option>
            <option value="gerant">Gérant</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0;" id="c-loc-field">
          <label>Localité (vendeur / caissier)</label>
          <select id="c-loc" style="width:190px;">
            ${localites.length ? locOptions : '<option value="">— crée d\'abord une localité —</option>'}
          </select>
        </div>
        <button class="btn" id="c-submit">Créer le compte</button>
      </div>
    </div>
    <div class="card">
      <h3>Comptes existants <span class="badge-count" id="c-count">0</span></h3>
      <div id="c-list"></div>
    </div>
  `;

  const roleSel = document.getElementById('c-role');
  const locField = document.getElementById('c-loc-field');
  const syncLocField = ()=>{ locField.style.display = (roleSel.value==='vente'||roleSel.value==='caisse') ? '' : 'none'; };
  roleSel.onchange = syncLocField; syncLocField();

  document.getElementById('c-submit').onclick = async ()=>{
    const nomComplet = document.getElementById('c-nom').value.trim();
    const username = document.getElementById('c-user').value.trim().toLowerCase();
    const role = roleSel.value;
    const localiteId = document.getElementById('c-loc').value || null;
    if(!nomComplet || !username){ showToast('Renseigne le nom et l\'identifiant'); return; }
    if((role==='vente'||role==='caisse') && !localiteId){ showToast('Choisis la localité de ce compte (ou crée-en une dans « Localités »)'); return; }
    try{
      const res = await fetch('/api/users', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', ...authHeaders() },
        body: JSON.stringify({ nomComplet, username, role, localiteId })
      });
      const data = await res.json();
      if(!res.ok || !data.ok){ showToast(data.error || 'Erreur lors de la création'); return; }
      showToast(`Compte créé : ${username} — mot de passe temporaire 0000`);
      document.getElementById('c-nom').value = '';
      document.getElementById('c-user').value = '';
      renderComptes(main);
    }catch(e){ showToast('Impossible de contacter le serveur'); }
  };

  const list = document.getElementById('c-list');
  const count = document.getElementById('c-count');
  try{
    const res = await fetch('/api/users', { headers: authHeaders() });
    const users = await res.json();
    count.textContent = users.length;
    if(users.length===0){ list.innerHTML = '<div class="empty">Aucun compte pour l\'instant.</div>'; return; }
    list.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Localité</th><th>Statut</th><th></th></tr></thead><tbody>
      ${users.map(u=>`<tr>
        <td>${u.nomComplet}</td>
        <td class="muted">${u.username}</td>
        <td>${roleLabel(u.role)}</td>
        <td>${(u.role==='vente'||u.role==='caisse') ? (u.localiteNom || '<span class="tag tag-warn">non affecté</span>') : '<span class="muted">—</span>'}</td>
        <td>${u.active ? '<span class="tag tag-ok">Actif</span>' : '<span class="tag tag-warn">Désactivé</span>'}${u.mustChangePassword?' <span class="muted" style="font-size:11px;">(1ère connexion en attente)</span>':''}</td>
        <td style="text-align:right; white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" data-reset="${u.username}">Réinitialiser mdp</button>
          <button class="btn btn-ghost btn-sm" data-toggle="${u.username}" data-active="${u.active}">${u.active?'Désactiver':'Activer'}</button>
          ${u.username===CURRENT_USER.username?'':'<button class="btn btn-ghost btn-sm" data-del="'+u.username+'">Supprimer</button>'}
        </td>
      </tr>`).join('')}
    </tbody></table></div>`;

    list.querySelectorAll('[data-reset]').forEach(b=>{
      b.onclick = async ()=>{
        const ok = await askConfirm({ title:'Réinitialiser le mot de passe ?', message:`Le compte <b>${b.dataset.reset}</b> devra se reconnecter avec le mot de passe temporaire <b>0000</b> et en choisir un nouveau.`, okLabel:'Oui, réinitialiser' });
        if(!ok) return;
        await fetch('/api/users/'+encodeURIComponent(b.dataset.reset), { method:'PATCH', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify({ resetPassword:true }) });
        showToast('Mot de passe réinitialisé à 0000');
        renderComptes(main);
      };
    });
    list.querySelectorAll('[data-toggle]').forEach(b=>{
      b.onclick = async ()=>{
        const nextActive = b.dataset.active !== 'true';
        const res = await fetch('/api/users/'+encodeURIComponent(b.dataset.toggle), { method:'PATCH', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify({ active: nextActive }) });
        const data = await res.json();
        if(!res.ok || !data.ok){ showToast(data.error || 'Action impossible'); return; }
        renderComptes(main);
      };
    });
    list.querySelectorAll('[data-del]').forEach(b=>{
      b.onclick = async ()=>{
        const ok = await askConfirm({ title:'Supprimer ce compte ?', message:`Le compte <b>${b.dataset.del}</b> sera supprimé définitivement.`, okLabel:'Oui, supprimer' });
        if(!ok) return;
        await fetch('/api/users/'+encodeURIComponent(b.dataset.del), { method:'DELETE', headers: authHeaders() });
        showToast('Compte supprimé');
        renderComptes(main);
      };
    });
  }catch(e){
    list.innerHTML = '<div class="empty">Impossible de charger les comptes.</div>';
  }
}

// ---------- FOURNISSEURS ----------
function renderFournisseurs(main){
  main.innerHTML = `
    <h2 class="page-title">Fournisseurs</h2>
    <p class="page-sub">Les personnes chez qui tu achètes tes fournitures.</p>
    <div class="card">
      <h3>Liste des fournisseurs <span class="badge-count">${DATA.fournisseurs.length}</span>
        <button class="btn btn-sm" id="add-fourn">+ Ajouter un fournisseur</button>
      </h3>
      ${DATA.fournisseurs.length===0 ? '<div class="empty">Aucun fournisseur enregistré pour l\'instant.</div>' :
      `<div class="table-scroll"><table><thead><tr><th>Nom</th><th>Contact</th><th>Téléphone</th><th>Email</th><th class="num">Articles fournis</th><th></th></tr></thead><tbody>
      ${DATA.fournisseurs.map(f=>{
        const nbArt = DATA.articles.filter(a=>a.fournisseurId===f.id).length;
        return `<tr><td>${f.nom}</td><td>${f.contact||'—'}</td><td>${f.tel||'—'}</td><td>${f.email||'—'}</td><td class="num">${nbArt}</td>
        <td style="text-align:right;">
          <button class="btn btn-ghost btn-sm" data-edit="${f.id}">Modifier</button>
          <button class="btn btn-danger btn-sm" data-del="${f.id}">Supprimer</button>
        </td></tr>`;
      }).join('')}
      </tbody></table></div>`}
    </div>
  `;
  document.getElementById('add-fourn').onclick = ()=> openFournisseurModal(null);
  main.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick = ()=> openFournisseurModal(DATA.fournisseurs.find(f=>f.id===b.dataset.edit));
  });
  main.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = async ()=>{
      DATA.fournisseurs = DATA.fournisseurs.filter(f=>f.id!==b.dataset.del);
      DATA.articles.forEach(a=>{ if(a.fournisseurId===b.dataset.del) a.fournisseurId=null; });
      await saveData();
      showToast('Fournisseur supprimé');
      renderFournisseurs(main);
    };
  });
}

function openFournisseurModal(f){
  const bg = document.createElement('div');

  bg.innerHTML = `
    <div class="modal">
      <button class="close-x">&times;</button>
      <h3>${isNew?'Nouveau fournisseur':'Modifier le fournisseur'}</h3>
      <div class="field"><label>Nom</label><input id="f-nom" style="width:100%;" value="${f?f.nom:''}"></div>
      <div class="field"><label>Personne de contact</label><input id="f-contact" style="width:100%;" value="${f?(f.contact||''):''}"></div>
      <div class="field"><label>Téléphone</label><input id="f-tel" style="width:100%;" value="${f?(f.tel||''):''}"></div>
      <div class="field"><label>Email</label><input id="f-email" style="width:100%;" value="${f?(f.email||''):''}"></div>
      <button class="btn" id="f-save">Enregistrer</button>
    </div>
  `;
  document.body.appendChild(bg);
  bg.querySelector('.close-x').onclick = ()=> bg.remove();
  bg.onclick = (e)=>{ if(e.target===bg) bg.remove(); };
  bg.querySelector('#f-save').onclick = async ()=>{
    const nom = document.getElementById('f-nom').value.trim();
    if(!nom){ showToast('Le nom est requis'); return; }
    const payload = {
      nom,
      contact: document.getElementById('f-contact').value.trim(),
      tel: document.getElementById('f-tel').value.trim(),
      email: document.getElementById('f-email').value.trim(),
    };
    if(isNew){ DATA.fournisseurs.push({id:uid(), ...payload}); }
    else{ Object.assign(f, payload); }
    await saveData();
    bg.remove();
    showToast('Fournisseur enregistré');
    render();
  };
}

// ---------- REÇU CLIENT & IMPRESSION DU BILAN ----------
// Génère et imprime un petit reçu client pour une vente de kit.
function printRecuKit(vId){
  const v = DATA.ventes.find(x=>x.id===vId);
  if(!v){ showToast('Vente introuvable'); return; }
  const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
  const pu = (v.prixVente != null) ? v.prixVente : (niv ? niv.montant : 0); // prix unitaire figé
  const total = pu * v.qty;
  let area = document.getElementById('recu-area');
  if(!area){ area = document.createElement('div'); area.id='recu-area'; document.body.appendChild(area); }
  area.innerHTML = `
    <div class="r-ticket">
      <div class="r-top">
        <img src="${LOGO_SRC}" alt="" class="r-logo"><div class="r-name">SHIPHRA</div>
        <div class="r-tag">Trade Center — Reçu de vente</div>
      </div>
      <div class="r-line"><span>Date</span><span>${v.date} ${v.heure||''}</span></div>
      <div class="r-line"><span>Article</span><span>Kit scolaire ${niv?niv.nom:''}</span></div>
      <div class="r-line"><span>Prix unitaire</span><span>${fmt(pu)} F</span></div>
      <div class="r-line"><span>Quantité</span><span>${v.qty}</span></div>
      <div class="r-tot"><span>TOTAL</span><span>${fmt(total)} F</span></div>
      <div class="r-foot">Merci de votre confiance 🙏<br>Shiphra Trade Center</div>
    </div>
  `;
  document.body.classList.add('printing-recu'); // affiche le reçu et cache le bilan à l'impression
  // On attend la FIN de l'impression avant de re-cacher le reçu.
  // (sur téléphone, window.print() ne bloque pas : cacher tout de suite = ticket vide)
  const finRecu = ()=>{ document.body.classList.remove('printing-recu'); window.removeEventListener('afterprint', finRecu); };
  window.addEventListener('afterprint', finRecu);
  window.print();
  setTimeout(finRecu, 4000); // filet de securite si afterprint ne se declenche pas
}
function printRapport(){
  const from = (document.getElementById('r-from')||{}).value || '';
  const to   = (document.getElementById('r-to')||{}).value || '';
  const kpis    = (document.getElementById('r-kpis')||{}).innerHTML || '';
  const parjour = (document.getElementById('r-parjour')||{}).innerHTML || '';
  const hist    = (document.getElementById('r-hist')||{}).innerHTML || '';
  let area = document.getElementById('print-area');
  if(!area){ area = document.createElement('div'); area.id = 'print-area'; document.body.appendChild(area); }
  const edite = new Date().toLocaleString('fr-FR');
  area.innerHTML = `
    <div class="p-head">
      <img src="${LOGO_SRC}" alt="" class="p-logo"><h1>SHIPHRA Trade Center</h1>
      <div class="p-sub">Bilan financier — période du ${from||'début'} au ${to||"aujourd'hui"}</div>
      <div class="p-sub">Édité le ${edite}</div>
    </div>
    ${kpis}
    <div class="p-sec-title">Totaux par jour</div>
    ${parjour}
    <div class="p-sec-title">Historique (achats, ventes & dépenses)</div>
    ${hist}
  `;
  window.print();
}

// ---------- RAPPORT FINANCIER (Mon bilan) ----------
function renderRapport(main){
  // Génère une version imprimable / PDF de "Mon bilan", en réutilisant exactement
  // ce qui est affiché à l'écran (mêmes chiffres, aucune divergence possible).
  const allDates = [
    ...DATA.commandes.filter(c=>c.statut==='reçue').map(c=>c.date),
    ...DATA.ventes.map(v=>v.date),
    ...(DATA.ventesLivres||[]).map(v=>v.date),
    ...DATA.depenses.map(d=>d.date)
  ].sort();
  const minDate = allDates.length ? allDates[0] : new Date().toISOString().slice(0,10);
  const maxDate = new Date().toISOString().slice(0,10);

  main.innerHTML = `
    <h2 class="page-title">Mon bilan</h2>
    <p class="page-sub">Sur une période : combien tu as gagné, combien tu as dépensé, et ce qui te reste.</p>
    <div class="card">
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Du</label>
          <input type="date" id="r-from" value="${minDate}">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Au</label>
          <input type="date" id="r-to" value="${maxDate}">
        </div>
        <button class="btn" id="r-apply">Appliquer</button>
        <button class="btn btn-ghost" id="r-reset">Depuis le début</button>
        <button class="btn btn-ghost" id="r-print">&#128424;&#65039; Imprimer / PDF</button>
      </div>
    </div>
    <div id="r-kpis"></div>
    <div class="card">
      <h3>Totaux par jour (tous niveaux confondus)</h3>
      <div id="r-parjour"></div>
    </div>
    <div class="card">
      <h3>Historique (achats, ventes & dépenses)</h3>
      <div id="r-hist"></div>
    </div>
  `;

  const kpisDiv = document.getElementById('r-kpis');
  const parJourDiv = document.getElementById('r-parjour');
  const histDiv = document.getElementById('r-hist');
  const todayStr = new Date().toISOString().slice(0,10);

  function draw(){
    const from = document.getElementById('r-from').value || minDate;
    const to = document.getElementById('r-to').value || maxDate;

    const commandesPeriode = DATA.commandes.filter(c=>c.statut==='reçue' && c.date>=from && c.date<=to);
    const ventesPeriode = DATA.ventes.filter(v=>v.date>=from && v.date<=to);
    const ventesLivresPeriode = (DATA.ventesLivres||[]).filter(v=>v.date>=from && v.date<=to);
    const depensesPeriode = DATA.depenses.filter(d=>d.date>=from && d.date<=to);

    const totalAchats = Math.round(commandesPeriode.reduce((s,c)=> s + c.lignes.reduce((ss,l)=>ss+l.qty*l.prixAchat,0), 0));
    const ventesKits = ventesPeriode.reduce((s,v)=> s + venteKitRecette(v), 0);
    const coutKits = ventesPeriode.reduce((s,v)=> s + venteKitCout(v), 0);
    const ventesLivresTot = ventesLivresPeriode.reduce((s,v)=>s+v.prixVente*v.qty,0);
    const coutLivresTot = ventesLivresPeriode.reduce((s,v)=>s+v.prixAchat*v.qty,0);
    // On arrondit ici, une seule fois, AVANT tous les calculs qui suivent.
    // Sinon chaque carte (Argent des ventes, Coût des ventes...) s'arrondit séparément
    // pour l'affichage, et "Bénéfice avant dépenses" (calculé sur les valeurs brutes
    // non arrondies, ex: 172,5 F le cahier) tombe sur un chiffre différent d'1 F par
    // rapport à un calcul manuel "Argent des ventes affiché − Coût des ventes affiché".
    const totalVentes = Math.round(ventesKits + ventesLivresTot);   // kits + livres
    const coutVentes = Math.round(coutKits + coutLivresTot);         // coût matière kits + coût d'achat livres
    const totalDepenses = Math.round(depensesPeriode.reduce((s,d)=>s+d.montant,0));

    const margeBrute = totalVentes - coutVentes;                      // vente - coût matière
    const resultatNet = margeBrute - totalDepenses;                  // vue comptable
    const fluxTresorerie = totalVentes - totalAchats - totalDepenses; // vue caisse

    kpisDiv.innerHTML = `
      <div class="grid grid-4" style="margin-bottom:16px;">
        <div class="kpi"><p class="lbl">Argent des ventes</p><p class="val" style="color:var(--ok);">${fmt(totalVentes)} F</p></div>
        <div class="kpi"><p class="lbl">Coût des ventes (kits + livres/arts)</p><p class="val" style="color:var(--warn);">${fmt(coutVentes)} F</p></div>
        <div class="kpi"><p class="lbl">Bénéfice avant dépenses</p><p class="val">${fmt(margeBrute)} F</p></div>
        <div class="kpi kpi-warn"><p class="lbl">Dépenses</p><p class="val">${fmt(totalDepenses)} F</p></div>
      </div>
      <div class="grid grid-2" style="margin-bottom:20px;">
        <div class="kpi"><p class="lbl">Bénéfice réel</p><p class="val" style="color:${resultatNet>=0?'var(--ok)':'var(--warn)'};">${fmt(resultatNet)} F</p><div class="sub">Argent des ventes − coût des ventes − dépenses</div></div>
        <div class="kpi"><p class="lbl">Argent en caisse</p><p class="val" style="color:${fluxTresorerie>=0?'var(--ok)':'var(--warn)'};">${fmt(fluxTresorerie)} F</p><div class="sub">Ventes − achats reçus (${fmt(totalAchats)} F) − dépenses</div></div>
      </div>
    `;

    // ---- Totaux par jour, tous niveaux confondus (kits + livres/arts) ----
    const parJourMap = {};
    ventesPeriode.forEach(v=>{
      const recette = venteKitRecette(v);
      const cout = venteKitCout(v);
      if(!parJourMap[v.date]) parJourMap[v.date] = {qty:0, recette:0, cout:0};
      parJourMap[v.date].qty += v.qty;
      parJourMap[v.date].recette += recette;
      parJourMap[v.date].cout += cout;
    });
    ventesLivresPeriode.forEach(v=>{
      const recette = v.prixVente*v.qty;
      const cout = v.prixAchat*v.qty;
      if(!parJourMap[v.date]) parJourMap[v.date] = {qty:0, recette:0, cout:0};
      parJourMap[v.date].qty += v.qty;
      parJourMap[v.date].recette += recette;
      parJourMap[v.date].cout += cout;
    });
    const joursTries = Object.keys(parJourMap).sort((a,b)=> b.localeCompare(a));
    if(joursTries.length===0){
      parJourDiv.innerHTML = '<div class="empty">Aucune vente (kits ou livres/arts) sur cette période.</div>';
    } else {
      let tQty=0, tRec=0, tCout=0;
      const rows = joursTries.map(d=>{
        const j = parJourMap[d];
        const recette = Math.round(j.recette);
        const cout = Math.round(j.cout);
        const benef = recette - cout;
        tQty += j.qty; tRec += recette; tCout += cout;
        return `<tr><td>${d}${d===todayStr?' <span class="tag tag-gold">Aujourd’hui</span>':''}</td><td class="num"><b>${fmt(j.qty)}</b></td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(cout)} F</td><td class="num" style="color:${benef>=0?'var(--ok)':'var(--warn)'};">${fmt(benef)} F</td></tr>`;
      }).join('');
      const tBenef = tRec - tCout;
      parJourDiv.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th class="num">Qté vendue</th><th class="num">Recette</th><th class="num">Coût</th><th class="num">Bénéfice</th></tr></thead><tbody>
        ${rows}
        <tr style="border-top:2px solid var(--navy);"><td><b>Total général</b></td><td class="num"><b>${fmt(tQty)}</b></td><td class="num"><b>${fmt(tRec)} F</b></td><td class="num"><b>${fmt(tCout)} F</b></td><td class="num" style="color:${tBenef>=0?'var(--ok)':'var(--warn)'};"><b>${fmt(tBenef)} F</b></td></tr>
      </tbody></table></div>`;
    }

    const evenements = [
      ...commandesPeriode.map(c=>{
        const fourn = DATA.fournisseurs.find(f=>f.id===c.fournisseurId);
        const montant = c.lignes.reduce((s,l)=>s+l.qty*l.prixAchat,0);
        return {date:c.date, type:'Achat', detail:`Commande — ${fourn?fourn.nom:'Sans fournisseur'} (${c.lignes.length} article${c.lignes.length>1?'s':''})`, montant:-montant};
      }),
      ...ventesPeriode.map(v=>{
        const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
        return {date:v.date, type:'Vente', detail:`${v.qty} kit(s) ${niv?niv.nom:'?'}`, montant: venteKitRecette(v)};
      }),
      ...ventesLivresPeriode.map(v=>{
        const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
        return {date:v.date, type:'Vente', detail:`${v.qty} livre(s) — ${v.livreNom||'?'}${niv?' ('+niv.nom+')':''}`, montant:v.prixVente*v.qty};
      }),
      ...depensesPeriode.map(d=>({
        date:d.date, type:'Dépense',
        detail:`${d.categorie}${d.note?' — '+d.note:''}`,
        montant:-d.montant
      }))
    ].sort((a,b)=> b.date.localeCompare(a.date));

    if(evenements.length===0){
      histDiv.innerHTML = '<div class="empty">Aucune activité (achat, vente ou dépense) sur cette période.</div>';
      return;
    }
    histDiv.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Détail</th><th class="num">Montant</th></tr></thead><tbody>
      ${evenements.map(e=>`<tr>
        <td>${e.date}</td>
        <td><span class="tag ${e.montant>=0?'tag-ok':'tag-warn'}">${e.type}</span></td>
        <td>${e.detail}</td>
        <td class="num" style="color:${e.montant>=0?'var(--ok)':'var(--warn)'};">${e.montant>=0?'+':'-'}${fmt(Math.abs(e.montant))} F</td>
      </tr>`).join('')}
    </tbody></table></div>`;
  }

  document.getElementById('r-apply').onclick = draw;
  document.getElementById('r-reset').onclick = ()=>{
    document.getElementById('r-from').value = minDate;
    document.getElementById('r-to').value = maxDate;
   draw();
  };
  document.getElementById('r-print').onclick = printRapport;
  draw();
}

// ---------- COMMANDES ----------
// Suggestion de commande basée sur le SEUIL d'alerte de chaque article.
// Dès qu'un article est tombé à son seuil (ou en dessous), on propose de le recommander
// pour repasser confortablement au-dessus (objectif = 2 × seuil).
// C'est la MÊME règle que le tag rouge "À commander" affiché dans Mon stock → cohérent partout.
function computeSuggestions(){
  return DATA.articles
    .filter(a => a.stock <= a.seuil)                 // uniquement ce qui est bas
    .map(a => {
      const objectif = Math.max(a.seuil * 2, a.seuil + 1); // niveau cible après réappro
      const aCommander = Math.max(objectif - a.stock, 0);
      return { article: a, seuil: a.seuil, aCommander };
    })
    .filter(x => x.aCommander > 0);
}

  const suggestions = computeSuggestions();

      ${suggestions.length===0 ? '<div class="empty">Aucun article sous son seuil d\'alerte pour le moment — tout est bien approvisionné. 👍</div>' : ''}

      ${suggestions.length>0 ? '<button class="btn" id="create-cmd" style="margin-top:14px;">Créer les commandes suggérées</button>' : ''}
    </div>

  `;

  if(suggestions.length>0){
    const groups = {};
    suggestions.forEach(s=>{
      const fid = s.article.fournisseurId || '_none';
      if(!groups[fid]) groups[fid] = [];
      groups[fid].push(s);
    });
    const sb = document.getElementById('suggest-body');
    Object.keys(groups).forEach(fid=>{
      const fourn = DATA.fournisseurs.find(f=>f.id===fid);
      const label = fourn ? fourn.nom : 'Sans fournisseur assigné';

      const block = document.createElement('div');
      block.style.marginBottom = '18px';
      block.innerHTML = `
        <div style="font-family:'Segoe UI', system-ui, -apple-system, Arial, Helvetica, sans-serif; font-weight:bold; color:var(--navy-dark); font-size:12px; margin-bottom:6px;">${label} <span class="muted" style="font-weight:normal;">— ${fmt(total)} F</span></div>
        <div class="table-scroll"><table><thead><tr><th>Article</th><th class="num">Seuil</th><th class="num">Stock</th><th class="num">A commander</th><th class="num">Montant</th></tr></thead><tbody>
        ${groups[fid].map(s=>`<tr><td>${s.article.nom}</td><td class="num">${fmt(s.seuil)}</td><td class="num">${fmt(s.article.stock)}</td><td class="num"><b>${fmt(s.aCommander)}</b></td><td class="num">${fmt(s.aCommander*s.article.prixAchat)} F</td></tr>`).join('')}
        </tbody></table></div>
      `;
      sb.appendChild(block);
    });
    document.getElementById('create-cmd').onclick = async ()=>{
      const date = new Date().toISOString().slice(0,10);
      Object.keys(groups).forEach(fid=>{
        DATA.commandes.push({
          id: uid(), date, statut:'en attente',
          fournisseurId: fid==='_none'?null:fid,
          lignes: groups[fid].map(s=>({articleId:s.article.id, articleNom:s.article.nom, qty:s.aCommander, prixAchat:s.article.prixAchat}))
        });
      });
      await saveData();
      showToast('Commande(s) créée(s)');
      renderCommandes(main);
    };
  }

  const hist = document.getElementById('cmd-hist');
  if(DATA.commandes.length===0){ hist.innerHTML = '<div class="empty">Aucune commande passée pour l\'instant.</div>'; return; }
  const sorted = [...DATA.commandes].sort(byRecent);
  hist.innerHTML = sorted.map(c=>{
    const fourn = DATA.fournisseurs.find(f=>f.id===c.fournisseurId);
    const total = c.lignes.reduce((s,l)=>s+l.qty*l.prixAchat,0);
    const received = c.statut === 'reçue';
    return `
    <div style="border-top:1px solid var(--line); padding:14px 0;">
      <div style="display:flex; justify-content:space-between; align-items:center; font-family:'Segoe UI', system-ui, -apple-system, Arial, Helvetica, sans-serif; font-size:12px; margin-bottom:8px;">
        <div><b>${fourn?fourn.nom:'Sans fournisseur'}</b> <span class="muted">— ${c.date} — ${fmt(total)} F</span></div>
        <div>
          <span class="tag ${received?'tag-ok':'tag-gold'}">${received?'Reçue':'En attente'}</span>
          ${!received?`<button class="btn btn-sm" data-recv="${c.id}" style="margin-left:8px;">Marquer reçue</button>`:''}
        </div>
      </div>
      <div class="table-scroll"><table><thead><tr><th>Article</th><th class="num">Quantité</th><th class="num">Montant</th></tr></thead><tbody>
      ${c.lignes.map(l=>`<tr><td>${l.articleNom}</td><td class="num">${fmt(l.qty)}</td><td class="num">${fmt(l.qty*l.prixAchat)} F</td></tr>`).join('')}
      </tbody></table></div>

  }).join('');
  hist.querySelectorAll('[data-recv]').forEach(b=>{

      c.statut = 'reçue';
      c.lignes.forEach(l=>{
        const art = DATA.articles.find(a=>a.id===l.articleId);
        if(art) art.stock += l.qty;
      });
      await saveData();
      showToast('Commande reçue, stock mis à jour');
      renderCommandes(main);
    };
  });
}

// ---------- PREVISION DE COMMANDE ----------
// Calcule le besoin par article à partir d'un nombre de kits saisi par niveau
function computeBesoinFromKits(kitsByNiveau){
  const besoin = new Array(DATA.articles.length).fill(0);
  Object.keys(kitsByNiveau).forEach(nid=>{
    const qty = kitsByNiveau[nid] || 0;
    if(qty <= 0) return;
    const niv = DATA.niveaux.find(n=>n.id===nid);
    if(!niv) return;
    DEFAULT_COMPO_HEADERS.forEach(key=>{
      const art = articleByCompoKey(key);
      if(art){ const idx = DATA.articles.indexOf(art); besoin[idx] += (niv.compo[key]||0) * qty; }
    });
    // Contenu de la trousse (scotch, colle, bics...)
    const trousseQty = (niv.compo['Trousse']||0) * qty;
    if(trousseQty > 0){ TROUSSE_LINKED_INDEXES.forEach(i=>{ besoin[i] += trousseQty; }); }
  });
  return besoin;
}

  };
  renderPrevisionHist('fournitures','prev-hist');
}

      <p class="page-sub" style="margin:0;">${baseRetour ? 'À commander = Besoin − quantités du bon de retour de l\'an dernier. Tu saisis, livre par livre, ce qui est revenu.' : 'À commander = Besoin − stock actuel.'}</p>
    </div>
    <div class="card">
      <h3>Nombre d'élèves (ou de kits) par classe</h3>
      <div class="table-scroll"><table><thead><tr><th>Classe</th><th class="num">Nombre d'élèves</th></tr></thead><tbody>
        ${DATA.niveaux.map(n=>`<tr><td>${n.nom}</td><td class="num"><input type="number" min="0" value="0" style="width:90px; text-align:right;" data-prevl="${n.id}"></td></tr>`).join('')}
      </tbody></table></div>
      <button class="btn" id="prevl-calc" style="margin-top:14px;">Calculer la commande</button>
    </div>
    <div id="prevl-result"></div>
    <div class="card">
      <h3>Commandes livres enregistrées <span class="badge-count">${nbHist}</span></h3>
      <div id="prevl-hist"></div>
    </div>
  `;
  document.getElementById('pl-base-stock').onclick = ()=>{ previsionLivreBase='stock'; renderPrevision(document.getElementById('main')); };
  document.getElementById('pl-base-retour').onclick = ()=>{ previsionLivreBase='retour'; renderPrevision(document.getElementById('main')); };

  let lastCalc = null;
  document.getElementById('prevl-calc').onclick = ()=>{
    const elevesByNiveau = {}; let totalEleves=0;
    main.querySelectorAll('input[data-prevl]').forEach(inp=>{ const q=parseInt(inp.value)||0; elevesByNiveau[inp.dataset.prevl]=q; totalEleves+=q; });
    const result=document.getElementById('prevl-result');
    if(totalEleves===0){ lastCalc=null; result.innerHTML='<div class="card"><div class="empty">Entrez au moins un nombre d\'élèves, puis cliquez sur « Calculer la commande ».</div></div>'; return; }
    const baseRows = livres.map(l=>({ livre:l, besoin:(elevesByNiveau[l.niveauId]||0) })).filter(x=>x.besoin>0);
    const groups={};
    baseRows.forEach(r=>{ const nid=r.livre.niveauId||'_none'; (groups[nid]=groups[nid]||[]).push(r); });

    // lit la base (stock, ou retour saisi) pour un livre
    const readBase = (livre)=>{
      if(!baseRetour) return livre.stock||0;
      const inp = result.querySelector('input[data-retour="'+livre.id+'"]');
      return inp ? Math.max(parseInt(inp.value)||0,0) : 0;
    };
    const rebuildCalc = ()=>{
      const rows = baseRows.map(r=>{ const base=readBase(r.livre); return { livre:r.livre, besoin:r.besoin, base, aCommander:Math.max(r.besoin-base,0) }; });
      const totalCmd = rows.reduce((s,r)=>s + r.aCommander*livreAchat(r.livre), 0);
      lastCalc = { elevesByNiveau, rows, totalCmd, baseLabel: baseRetour ? 'Bon de retour (an dernier)' : 'Stock actuel' };
      return { rows, totalCmd };
    };

    const baseHeader = baseRetour ? 'Retour an dernier' : 'Stock';
    let html='<div class="card"><h3>Détail par classe — combien de livres commander</h3>';
    DATA.niveaux.forEach(n=>{
      const g=groups[n.id]; if(!g) return;
      html+=`<div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:14px 0 6px;">${n.nom}</div>`;
      html+=`<div class="table-scroll"><table><thead><tr><th>Livre</th><th>Matière</th><th class="num">Besoin</th><th class="num">${baseHeader}</th><th class="num">À commander</th><th class="num">Prix achat</th><th class="num">Montant</th></tr></thead><tbody>`;
      g.forEach(r=>{
        const l=r.livre; const pa=livreAchat(l);
        const base0 = baseRetour ? 0 : (l.stock||0);
        const aCmd0 = Math.max(r.besoin-base0,0);
        const baseCell = baseRetour
          ? `<input type="number" min="0" value="0" style="width:80px; text-align:right;" data-retour="${l.id}">`
          : `${fmt(l.stock)}`;
        html+=`<tr data-livre="${l.id}"><td>${l.nom}</td><td>${l.matiere||''}</td><td class="num">${fmt(r.besoin)}</td><td class="num">${baseCell}</td><td class="num" data-cell="acmd"><b>${fmt(aCmd0)}</b></td><td class="num">${fmt(pa)} F</td><td class="num" data-cell="mt">${fmt(aCmd0*pa)} F</td></tr>`;
      });
      html+='</tbody></table></div>';
    });
    const totalInit = baseRows.reduce((s,r)=>{ const base0=baseRetour?0:(r.livre.stock||0); return s + Math.max(r.besoin-base0,0)*livreAchat(r.livre); },0);
    html+=`<div style="text-align:right; margin-top:14px; font-weight:bold; font-size:15px; color:var(--navy-dark);">Total à commander (à payer au fournisseur) : <span id="prevl-total">${fmt(totalInit)}</span> F</div>`;
    if(baseRetour){ html+=`<p class="page-sub" style="margin-top:6px;">Saisis les quantités revenues l'an dernier ci-dessus : le « À commander » et le total se recalculent tout seuls.</p>`; }
    html+=`<div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;"><button class="btn" id="prevl-save">&#128190; Enregistrer la commande</button><button class="btn btn-ghost" id="prevl-print">&#128424;&#65039; Imprimer</button></div>`;
    html+='</div>';
    result.innerHTML=html;

    const recompute = ()=>{
      const { rows, totalCmd } = rebuildCalc();
      const byId={}; rows.forEach(r=>byId[r.livre.id]=r);
      result.querySelectorAll('tr[data-livre]').forEach(tr=>{
        const r=byId[tr.dataset.livre]; if(!r) return;
        const pa=livreAchat(r.livre);
        tr.querySelector('[data-cell="acmd"]').innerHTML='<b>'+fmt(r.aCommander)+'</b>';
        tr.querySelector('[data-cell="mt"]').textContent=fmt(r.aCommander*pa)+' F';
      });
      const tot=result.querySelector('#prevl-total'); if(tot) tot.textContent=fmt(totalCmd);
    };
    if(baseRetour){ result.querySelectorAll('input[data-retour]').forEach(inp=>{ inp.addEventListener('input', recompute); }); }
    rebuildCalc(); // initialise lastCalc

    const sb=document.getElementById('prevl-save'); if(sb){ sb.onclick=()=>{ rebuildCalc(); savePrevision(buildPrevisionRecordLivres(lastCalc), sb); }; }
    const pb=document.getElementById('prevl-print'); if(pb){ pb.onclick=()=>{ rebuildCalc(); if(lastCalc) imprimerPrevision(buildPrevisionRecordLivres(lastCalc)); }; }
  };
  renderPrevisionHist('livres','prevl-hist');
}

// Photo figée d'une commande FOURNITURES
function buildPrevisionRecordFournitures(calc){
  const now=new Date();
  const kits = DATA.niveaux.filter(n=>(calc.kitsByNiveau[n.id]||0)>0).map(n=>({niveauId:n.id, nom:n.nom, nbKits:calc.kitsByNiveau[n.id]}));
  const lignes = calc.rows.map(r=>{ const f=DATA.fournisseurs.find(x=>x.id===r.article.fournisseurId); return { articleId:r.article.id, nom:r.article.nom, fournisseurId:r.article.fournisseurId||null, fournisseurNom:f?f.nom:'Sans fournisseur assigné', besoin:r.besoin, stock:r.article.stock, aCommander:r.aCommander, prixAchat:r.article.prixAchat, montant:r.aCommander*r.article.prixAchat }; });
  return { id:uid(), type:'fournitures', dateISO:now.toISOString(), date:now.toLocaleDateString('fr-FR'), heure:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}), auteur:(CURRENT_USER&&(CURRENT_USER.nomComplet||CURRENT_USER.username))||'—', kits, lignes, totalCmd:calc.totalCmd };
}

// Photo figée d'une commande LIVRES
function buildPrevisionRecordLivres(calc){
  const now=new Date();
  const kits = DATA.niveaux.filter(n=>(calc.elevesByNiveau[n.id]||0)>0).map(n=>({niveauId:n.id, nom:n.nom, nbKits:calc.elevesByNiveau[n.id]}));
  const lignes = calc.rows.map(r=>{ const niv=DATA.niveaux.find(n=>n.id===r.livre.niveauId); const pa=livreAchat(r.livre); return { livreId:r.livre.id, nom:r.livre.nom, matiere:r.livre.matiere||'', niveauId:r.livre.niveauId||null, classe:niv?niv.nom:'', besoin:r.besoin, base:r.base, stock:r.base, aCommander:r.aCommander, prixAchat:pa, montant:r.aCommander*pa }; });
  return { id:uid(), type:'livres', baseLabel:calc.baseLabel||'Stock actuel', dateISO:now.toISOString(), date:now.toLocaleDateString('fr-FR'), heure:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}), auteur:(CURRENT_USER&&(CURRENT_USER.nomComplet||CURRENT_USER.username))||'—', kits, lignes, totalCmd:calc.totalCmd };
}

// Enregistre une commande (fournitures OU livres) DANS LA BASE
async function savePrevision(rec, btn){
  DATA.previsions = DATA.previsions || [];
  DATA.previsions.unshift(rec);
  if(btn){ btn.disabled=true; btn.textContent='Enregistrement…'; }
  const ok = await saveData();
  if(ok){ showToast('Commande enregistrée dans la base ✅'); render(); }
  else { DATA.previsions.shift(); if(btn){ btn.disabled=false; btn.textContent='💾 Enregistrer la commande'; } }
}

// Historique filtré par type (rouvrir / imprimer / supprimer)
function renderPrevisionHist(type, containerId){
  const box=document.getElementById(containerId); if(!box) return;
  const list=(DATA.previsions||[]).filter(p=>(p.type||'fournitures')===type);

  const sorted=[...list].sort((a,b)=>(b.dateISO||'').localeCompare(a.dateISO||''));
  const motKit = type==='livres' ? 'élève(s)' : 'kit(s)';

  box.innerHTML=sorted.map(rec=>{
    const nbArticles=(rec.lignes||[]).length;

        </div>

          <button class="btn btn-sm btn-ghost" data-prev-print="${rec.id}">&#128424;&#65039; Voir / Imprimer</button>
          <button class="btn btn-sm btn-danger" data-prev-del="${rec.id}">Supprimer</button>
        </div>
      </div>
    </div>`;
  }).join('');

  box.querySelectorAll('[data-prev-del]').forEach(b=>{ b.onclick=async ()=>{ if(!confirm('Supprimer définitivement cette commande enregistrée ?')) return; const i=(DATA.previsions||[]).findIndex(x=>x.id===b.dataset.prevDel); if(i<0) return; const backup=DATA.previsions[i]; DATA.previsions.splice(i,1); const ok=await saveData(); if(ok){ showToast('Commande supprimée'); render(); } else { DATA.previsions.splice(i,0,backup); } }; });
}

// ---------- STOCK LIVRES (catalogue par classe, vendus au détail) ----------
// Le prix d'achat se calcule à partir du PRIX DE VENTE et de la remise (% ou FCFA).
// Ex : vente 3000, remise 20% -> achat 2400.  |  vente 3000, remise 1000 F -> achat 2000.
function livreAchat(l){
  const vente = +l.prixVente || 0;
  const rem = +l.remise || 0;
  const achat = (l.remiseType==='fcfa') ? (vente - rem) : (vente - vente*rem/100);
  return Math.max(Math.round(achat), 0);
}
function calcAchat(vente, rem, type){
  vente = +vente||0; rem = +rem||0;
  const a = (type==='fcfa') ? (vente - rem) : (vente - vente*rem/100);
  return Math.max(Math.round(a), 0);
}

function renderStockLivres(main){
  if(!livreNiveauFilter || !DATA.niveaux.some(n=>n.id===livreNiveauFilter)){
    livreNiveauFilter = DATA.niveaux.length ? DATA.niveaux[0].id : null;
  }
  main.innerHTML = `
    <p class="page-sub" style="margin-top:0;">Les livres sont vendus à l'unité. Mets le prix de vente et la remise du fournisseur (en % ou en F) : le prix d'achat et le bénéfice se calculent tout seuls.</p>
    <div class="card">
      <h3 style="justify-content:flex-start; gap:10px;">
        <span>Livres</span>
        <span class="badge-count" id="lv-count">0</span>
      </h3>
      <div class="toolbar" style="margin-bottom:14px;">
        <div class="field" style="margin-bottom:0;">
          <label>Classe</label>
          <select id="lv-niveau">${DATA.niveaux.map(n=>`<option value="${n.id}" ${n.id===livreNiveauFilter?'selected':''}>${n.nom}</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0; min-width:220px;">
          <label>Rechercher un livre</label>
          <input type="search" id="lv-search" placeholder="Ex : maths, anglais..." value="${stockLivresSearch.replace(/"/g,'&quot;')}">
        </div>
        <button class="btn btn-sm" id="lv-add" style="align-self:flex-end;">+ Ajouter un livre</button>
      </div>
      <div id="lv-body"></div>
    </div>
  `;
  document.getElementById('lv-niveau').onchange = (e)=>{ livreNiveauFilter = e.target.value; drawStockLivres(); };
  const lvSearchInp = document.getElementById('lv-search');
  let lvSearchTimer;
  lvSearchInp.oninput = ()=>{
    clearTimeout(lvSearchTimer);
    const val = lvSearchInp.value;
    const caret = lvSearchInp.selectionStart;
    lvSearchTimer = setTimeout(()=>{
      stockLivresSearch = val;
      drawStockLivres();

      if(inp2){ inp2.focus(); inp2.setSelectionRange(caret, caret); }
    }, 150);
  };
  document.getElementById('lv-add').onclick = async ()=>{
    DATA.livres.push({id:uid(), niveauId:livreNiveauFilter, matiere:'', nom:'Nouveau livre', fournisseurId:null, remise:20, remiseType:'pct', prixAchat:0, prixVente:0, stock:0, seuil:10});
    await saveData();
    drawStockLivres();
  };
  drawStockLivres();
}
