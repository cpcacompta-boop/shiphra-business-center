<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiphra Trade Center — Gestion Fournitures</title>
<style>
  :root{
    --navy:#1E2A46;
    --navy-dark:#121B30;
    --navy-light:#33436A;
    --paper:#EEF1F6;
    --card:#FFFFFF;
    --line:#E4E8F0;
    --text:#1E2733;
    --muted:#6B7686;
    --gold:#B4832A;
    --gold-strong:#E1AB3E;
    --gold-bg:#FAF2DE;
    --ok:#0E9C5A;
    --ok-bg:#E4F5EC;
    --warn:#C24327;
    --warn-bg:#FBEAE3;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.05);
    --shadow-hover:0 8px 28px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, Arial, Helvetica, sans-serif;
    font-size:12px; background:var(--paper); color:var(--text);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .app{display:flex; height:100vh; overflow:hidden;}

  aside{
    width:238px; flex-shrink:0; height:100vh; display:flex; flex-direction:column; color:#fff;
    background:linear-gradient(180deg,#243458 0%,var(--navy) 58%,var(--navy-dark) 100%);
  }
  .brand{padding:26px 22px 20px; text-align:center; border-bottom:1px solid rgba(255,255,255,.10);
    display:flex; flex-direction:column; align-items:center;}
  .brand img{width:64px; height:64px; object-fit:contain; margin-bottom:10px;}
  .brand .school{font-size:19px; font-weight:700; letter-spacing:.5px; margin:0;
    background:linear-gradient(90deg,#E9C158,#FFF4CF,#C79433);
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .brand h1{font-size:10px; margin:6px 0 0; font-weight:600; line-height:1.4; color:#9FB0CE;
    text-transform:uppercase; letter-spacing:1.2px;}
  nav{flex:1; padding:14px 12px; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none;}
  nav::-webkit-scrollbar{display:none;}
  nav button{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:none; border:none; color:#C4CFE2; cursor:pointer; padding:11px 14px; margin-bottom:2px;
    border-radius:10px; font-size:13px; font-family:inherit; transition:background .15s, color .15s;}
  nav button:hover{background:rgba(255,255,255,.07); color:#fff;}
  nav button.active{background:rgba(233,193,88,.14); color:#fff; font-weight:600; box-shadow:inset 3px 0 0 var(--gold-strong);}
  nav .ico{width:20px; text-align:center; font-size:15px; flex-shrink:0;}
  .whoami-name{ font-size:12.5px; font-weight:700; color:#fff; }
  .whoami-role{ font-size:10.5px; color:#C4A24A; text-transform:uppercase; letter-spacing:.8px; font-weight:700; margin-top:2px; }
  .foot{padding:14px 20px; font-size:10px; color:#8093B4; border-top:1px solid rgba(255,255,255,.10);}

  main{flex:1; padding:34px 42px; max-width:1200px; width:100%; height:100vh; overflow-y:auto;}
  @keyframes fadeInUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  main.fade-in{animation:fadeInUp .3s ease;}
  h2.page-title{font-size:26px; margin:0 0 6px; font-weight:700; color:var(--navy-dark); letter-spacing:-.4px;}
  p.page-sub{font-size:13px; color:var(--muted); margin:0 0 26px; max-width:760px; line-height:1.6;}

  .grid{display:grid; gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow); transition:box-shadow .2s, transform .2s;}
  .kpi:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px);}
  .kpi .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:0 0 8px; font-weight:600;}
  .kpi .val{font-size:27px; color:var(--navy-dark); margin:0; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.5px; line-height:1.1;}
  .kpi .sub{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4;}
  .kpi.kpi-warn .val{color:var(--warn);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; margin-bottom:20px; box-shadow:var(--shadow);}
  .card h3{margin:0 0 16px; font-size:16px; font-weight:700; color:var(--navy-dark); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; padding:9px 12px; border-bottom:1px solid var(--line); white-space:nowrap;}
  td{padding:11px 12px; border-bottom:1px solid #EEF1F6; color:var(--text); white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  tbody tr{transition:background .12s;}
  tbody tr:not(.row-alert):hover td{background:#F7F9FC;}
  .row-alert td{background:var(--warn-bg);}

  /* Tableaux : scroll horizontal propre sur petit écran, jamais d'écrasement illisible */
  .table-scroll{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .table-scroll table{width:auto; min-width:100%;}
  .table-scroll::-webkit-scrollbar{height:6px;}
  .table-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  /* Tableau "pro" : la page reste figée, seul le tableau défile (vertical + horizontal),
     et l'en-tête des colonnes reste collé en haut pendant le défilement. */
  .sheet-scroll{overflow:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line);
    border-radius:10px; max-height:calc(100vh - 250px); min-height:240px; background:var(--card);}
  .sheet-scroll table{width:auto; min-width:100%; border-collapse:separate; border-spacing:0;}
  .sheet-scroll thead th{position:sticky; top:0; z-index:3; background:var(--paper);
    box-shadow:inset 0 -1px 0 var(--line);}
  .sheet-scroll tbody td{border-bottom:1px solid #EEF1F6;}
  .sheet-scroll::-webkit-scrollbar{width:9px; height:9px;}
  .sheet-scroll::-webkit-scrollbar-thumb{background:#C9D2E0; border-radius:8px;}
  .sheet-scroll::-webkit-scrollbar-track{background:#F3F6FB;}
  .achat-cell{font-weight:700; color:var(--navy-dark); font-variant-numeric:tabular-nums;}
  .remise-wrap{display:inline-flex; gap:4px; align-items:center;}
  .remise-wrap select{padding:6px 4px;}
  @media (max-width:860px){
    .sheet-scroll{max-height:calc(100vh - 320px); min-height:220px;}
    .sheet-scroll table{min-width:820px;}
  }

  .tag{font-size:11px; padding:3px 10px; border-radius:20px; display:inline-block; font-weight:600;}
  .tag-ok{background:var(--ok-bg); color:var(--ok);}
  .tag-warn{background:var(--warn-bg); color:var(--warn);}
  .tag-gold{background:var(--gold-bg); color:var(--gold);}

  input, select{font-family:inherit; font-size:13px; padding:9px 11px; border:1px solid var(--line);
    border-radius:9px; background:#fff; color:var(--text); transition:border-color .15s, box-shadow .15s;}
  input:focus, select:focus{outline:none; border-color:var(--navy-light); box-shadow:0 0 0 3px rgba(51,67,106,.15);}
  label{font-size:11px; color:var(--muted); display:block; margin-bottom:5px; font-weight:600;}
  .field{margin-bottom:14px;}

  button.btn{font-family:inherit; font-size:13px; font-weight:600; padding:10px 18px; border-radius:9px; cursor:pointer;
    border:1px solid var(--navy); background:var(--navy); color:#fff; transition:background .15s, transform .1s, box-shadow .15s;}
  button.btn:hover{background:var(--navy-dark); box-shadow:0 4px 14px rgba(30,42,70,.25);}
  button.btn:active{transform:translateY(1px);}
  button.btn-ghost{background:#fff; color:var(--navy); border:1px solid var(--line);}
  button.btn-ghost:hover{background:#F1F4F9; box-shadow:none;}
  button.btn-danger{background:#fff; color:var(--warn); border:1px solid var(--warn);}
  button.btn-danger:hover{background:var(--warn-bg); box-shadow:none;}
  button.btn-sm{padding:6px 12px; font-size:12px;}

  .toolbar{display:flex; gap:12px; align-items:end; flex-wrap:wrap; margin-bottom:18px;}
  .tabs{display:flex; gap:6px; margin-bottom:20px; border-bottom:1px solid var(--line);}
  .tab-btn{font-family:inherit; font-size:13.5px; font-weight:600; padding:11px 18px; border:none; background:none;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s, border-color .15s;}
  .tab-btn:hover{color:var(--navy-dark);}
  .tab-btn.active{color:var(--navy-dark); border-bottom-color:var(--gold-strong);}
  .empty{color:var(--muted); font-size:13px; padding:34px 16px; text-align:center;}
  .badge-count{background:var(--gold); color:#fff; border-radius:20px; font-size:10px; padding:1px 8px; margin-left:6px; font-weight:700;}
  .muted{color:var(--muted);}
  .toast{position:fixed; bottom:24px; right:24px; background:var(--navy-dark); color:#fff; padding:13px 20px; border-radius:10px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.22); opacity:0; transform:translateY(10px); transition:all .25s; pointer-events:none; z-index:999;}
  .toast.show{opacity:1; transform:translateY(0);}
  .compo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:6px 14px; font-size:12.5px;}
  .compo-grid div{display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dotted var(--line);}
  .compo-grid b{color:var(--navy-dark);}
  .modal-bg{position:fixed; inset:0; background:rgba(18,27,48,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
  .modal{background:#fff; border-radius:16px; padding:26px 30px; width:480px; max-width:100%; max-height:88vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal h3{margin-top:0;}
  .close-x{float:right; cursor:pointer; color:var(--muted); font-size:20px; border:none; background:none;}

  .mobile-topbar{display:none;}
  .sidebar-close{display:none;}
  .sidebar-overlay{display:none;}
  @media (max-width:860px){
    .app{flex-direction:column; min-height:100vh; height:auto; overflow:visible;}
    .mobile-topbar{display:flex; align-items:center; justify-content:space-between;
      background:var(--navy-dark); color:#fff; padding:14px 18px; position:sticky; top:0; z-index:60;}
    .mobile-topbar .mobile-title{font-size:14px; font-weight:700; letter-spacing:.3px;
      background:linear-gradient(90deg,#E9C158,#FFF4CF,#C79433); -webkit-background-clip:text; background-clip:text; color:transparent;}
    .mobile-topbar button{background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:2px 4px; line-height:1;}
    aside{position:fixed; top:0; left:0; height:100vh; z-index:80; width:270px; max-width:82%;
      transform:translateX(-100%); transition:transform .25s ease;}
    aside.open{transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,.35);}
    .sidebar-close{display:block; position:absolute; top:16px; right:18px; color:#fff; font-size:24px; z-index:2; background:none; border:none; cursor:pointer;}
    .sidebar-overlay{display:block; position:fixed; inset:0; background:rgba(10,15,28,.5); z-index:70; opacity:0; pointer-events:none; transition:opacity .2s;}
    .sidebar-overlay.show{opacity:1; pointer-events:auto;}
    main{padding:20px 16px; max-width:100%; height:auto; overflow:visible;}
    .grid-4{grid-template-columns:repeat(2,1fr);}
    .grid-3{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
    .toolbar{flex-direction:column; align-items:stretch;}
    .card{padding:18px;}
    .modal{padding:22px;}
  }
  @media (max-width:480px){
    .grid-4{grid-template-columns:1fr;}
    .kpi .val{font-size:24px;}
    h2.page-title{font-size:22px;}
    main{padding:18px 14px;}
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  /* ---- Reçu / ticket ---- */
  #recu-area{ display:none; }
  #recu-area .r-ticket{ max-width:340px; margin:0 auto; font-family:'Segoe UI', system-ui, Arial, sans-serif; color:#000; }
  #recu-area .r-top{ text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px; }
  #recu-area .r-top .r-name{ font-size:17px; font-weight:700; letter-spacing:.5px; }
  #recu-area .r-top .r-tag{ font-size:11px; }
  #recu-area .r-line{ display:flex; justify-content:space-between; font-size:12px; margin:5px 0; }
  #recu-area .r-tot{ border-top:1px dashed #000; margin-top:10px; padding-top:10px; display:flex; justify-content:space-between; font-size:15px; font-weight:700; }
  #recu-area .r-foot{ text-align:center; font-size:11px; margin-top:14px; border-top:1px dashed #000; padding-top:10px; }

  /* ---- Impression / PDF ---- */
  #print-area{ display:none; }
  #print-area .p-head{ border-bottom:2px solid var(--navy); padding-bottom:14px; margin-bottom:18px; }
  #print-area .p-head h1{ font-size:20px; margin:0; color:var(--navy-dark); }
  #print-area .p-head .p-sub{ font-size:12px; color:var(--muted); margin-top:3px; }
  #print-area .p-sec-title{ font-size:14px; font-weight:700; color:var(--navy-dark); margin:20px 0 8px; }
  #print-area th, #print-area td{ border:1px solid #bbb; }
  #print-area .p-logo{ height:64px; width:auto; display:block; margin-bottom:10px; }
  #recu-area .r-logo{ height:52px; width:auto; display:block; margin:0 auto 8px; }
  @media print{
    .app, .mobile-topbar, .sidebar-overlay, .toast, #save-error-banner, #print-area, #recu-area{ display:none !important; }
    body.printing-recu #recu-area{ display:block !important; }
    body:not(.printing-recu) #print-area{ display:block !important; }
    body{ background:#fff; }
    @page{ margin:14mm; }
  }
</style>
</head>

<script>
// ================= AUTHENTIFICATION (Gérant / Superviseur / Vente) =================
// La session (token + rôle) vient du serveur, obtenue via login.html.
// Si personne n'est connecté, on renvoie vers la page de connexion AVANT tout affichage.
let CURRENT_USER = null;
(function(){
  try{
    const raw = sessionStorage.getItem('shiphra_session') || localStorage.getItem('shiphra_session');
    if(!raw){ window.location.replace('/'); return; }
    CURRENT_USER = JSON.parse(raw);
    if(!CURRENT_USER || !CURRENT_USER.token || !CURRENT_USER.role){ window.location.replace('/'); }
  }catch(e){ window.location.replace('/'); }
})();

function authHeaders(){
  return CURRENT_USER && CURRENT_USER.token ? { 'Authorization': 'Bearer ' + CURRENT_USER.token } : {};
}

// Libellé lisible d'un rôle (utilisé un peu partout dans l'interface)
function roleLabel(role){
  if(role==='gerant') return 'Gérant';
  if(role==='superviseur') return 'Superviseur';
  if(role==='vente') return 'Vente';
  if(role==='caisse') return 'Caisse';
  return role || '';
}

// Vérifie auprès du serveur que la session est toujours valide (token non expiré / compte
// toujours actif). Si ce n'est plus le cas, on renvoie proprement vers la connexion.
async function verifySession(){
  try{
    const res = await fetch('/api/auth/me', { headers: authHeaders() });
    if(!res.ok) throw new Error('session invalide');
    const data = await res.json();
    CURRENT_USER.role = data.role;
    CURRENT_USER.nomComplet = data.nomComplet;
    CURRENT_USER.localiteId = data.localiteId || null;
    // Pour un vendeur, on récupère le nom de sa localité (affiché dans le menu)
    if((CURRENT_USER.role==='vente'||CURRENT_USER.role==='caisse') && CURRENT_USER.localiteId){
      try{
        const rl = await fetch('/api/localites', { headers: authHeaders() });
        if(rl.ok){
          const locs = await rl.json();
          const mine = locs.find(l=>l.id===CURRENT_USER.localiteId);
          CURRENT_USER.localiteNom = mine ? mine.nom : null;
        }
      }catch(_){}
    }
  }catch(e){
    logout();
  }
}

function logout(raison){
  fetch('/api/auth/logout', { method:'POST', headers: authHeaders() }).catch(()=>{});
  try{ sessionStorage.removeItem('shiphra_session'); localStorage.removeItem('shiphra_session'); }catch(e){}
  // On explique pourquoi la personne a été déconnectée (au lieu de la laisser perplexe)
  try{ if(raison) sessionStorage.setItem('shiphra_logout_msg', raison); }catch(e){}
  window.location.replace('/');
}

let DATA = null;
let currentView = 'dashboard';
let receptionDraft = []; // lignes en cours de saisie d'une réception fournisseur
let transfertDraft = []; // lignes en cours de saisie d'un transfert vers une localité
let commandeDraft = [];  // lignes de la commande en cours de prise (côté Vente)
let caisseOrder = null;  // commande trouvée par code (côté Caisse)
let venteTab = 'kit';
let stockTab = 'cahiers';
let editingFournisseur = null;
let livreNiveauFilter = null;
let stockLivresSearch = '';
let previsionTab = 'fournitures';
let previsionLivreBase = 'stock'; // 'stock' | 'retour' (base de calcul des livres)

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function defaultData(){
  const articles = DEFAULT_ARTICLES.map(a => ({id: uid(), type:'fourniture', ...a}));
  // Lier chaque article-kit à sa clé de composition (lien stable, indépendant du nom)
  DEFAULT_COMPO_HEADERS.forEach((key, i)=>{ if(articles[i]) articles[i].compoKey = key; });
  const niveaux = DEFAULT_NIVEAUX.map(n => ({id: uid(), ...n}));
  return {
    niveaux,
    articles,
    fournisseurs: [],
    ventes: [],
    commandes: [],
    depenses: [],
    livres: seedLivres(niveaux),
    ventesLivres: [],
    previsions: []
  };
}

// Retrouve l'article lié à une clé de composition (Cahier 100 P, TP 200 P, etc.)
function articleByCompoKey(key){ return DATA.articles.find(a=>a.compoKey===key); }

let lastDataAt = null; // date de la dernière version de données connue (pour le temps réel)

async function loadData(){
  try{
    const res = await fetch('/api/data', { headers: authHeaders() });
    if(res.status===401 || res.status===403){ logout(); return; }
    const data = await res.json();
    if(data){ DATA = data; migrateData(); }
    else { DATA = defaultData(); migrateData(); await saveData(); }
    // On note la version courante des données (pour ne pas se rafraîchir inutilement)
    try{
      const m = await fetch('/api/data/meta', { headers: authHeaders() });
      if(m.ok){ const j = await m.json(); lastDataAt = j.updatedAt || null; }
    }catch(_){}
  }catch(e){
    console.error('Erreur de chargement', e);
    // En cas de coupure réseau : on affiche des données par défaut SANS écraser la base
    DATA = defaultData();
    showToast('Connexion à la base impossible — vérifiez internet');
  }
}

async function saveData(){
  try{
    const res = await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify(DATA)
    });
    if(res.status===401 || res.status===403){ logout(); return false; }
    // Le serveur a répondu mais avec une erreur (ex: 500, 400...) : ce n'est PAS sauvé.
    if(!res.ok){ throw new Error('Réponse serveur : ' + res.status); }
    try{ const j = await res.json(); if(j && j.updatedAt){ lastDataAt = j.updatedAt; } }catch(_){}
    return true; // sauvegarde réellement réussie
  }catch(e){
    console.error('Erreur de sauvegarde', e);
    saveError(); // on prévient clairement l'utilisateur
    return false; // sauvegarde échouée
  }
}

// Alerte visible et insistante quand une sauvegarde échoue.
// Reste affichée jusqu'à ce que l'utilisateur la ferme (pas comme un toast qui disparaît).
function saveError(){
  // On évite d'empiler plusieurs bannières identiques
  if(document.getElementById('save-error-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'save-error-banner';
  bar.style.cssText = 'position:fixed; top:0; left:0; right:0; z-index:2000; background:var(--warn); color:#fff; padding:14px 18px; font-size:13px; font-weight:600; box-shadow:0 4px 16px rgba(0,0,0,.25); display:flex; align-items:center; justify-content:space-between; gap:12px; font-family:inherit;';
  bar.innerHTML = `
    <span>&#9888;&#65039; Échec de l'enregistrement — vérifie ta connexion internet. Ta dernière action n'a peut-être PAS été sauvegardée. Réessaie avant de fermer l'appli.</span>
    <button style="background:#fff; color:var(--warn); border:none; border-radius:8px; padding:8px 14px; font-weight:700; cursor:pointer; font-family:inherit; flex-shrink:0;">Fermer</button>
  `;
  bar.querySelector('button').onclick = ()=> bar.remove();
  document.body.appendChild(bar);
}

function migrateData(){
  let changed = false;
  if(!DATA.depenses){ DATA.depenses = []; changed = true; }
  if(!DATA.previsions){ DATA.previsions = []; changed = true; }
  // Livres : catalogue vendu au détail
  if(!DATA.ventesLivres){ DATA.ventesLivres = []; changed = true; }
  if(!DATA.livres){ DATA.livres = seedLivres(DATA.niveaux); changed = true; }
  // Livres : champs remise (prix public + remise %/F -> prix d'achat auto)
  (DATA.livres||[]).forEach(l=>{
    if(l.remise===undefined){ l.remise = 20; changed = true; }
    if(l.remiseType===undefined){ l.remiseType = 'pct'; changed = true; }
    if(l.prixAchat===undefined){ l.prixAchat = 0; changed = true; }
  });
  // Pinceaux : on passe du paquet à l'unité (le kit arts utilise 2 pinceaux à l'unité)
  const oldPq = DATA.articles.find(a=>a.nom==="Pinceaux (paquet)");
  if(oldPq){ oldPq.nom = "Pinceau"; changed = true; }
  // Correction unique des prix de vente des composants Arts (Crayon 2B 150, Pinceau 250, Petit TP 600)
  if(!DATA.artsFixV2){
    const setV = (nom,v)=>{ const a=DATA.articles.find(x=>x.nom===nom); if(a) a.prixVente = v; };
    setV('Crayon 2B', 150);
    setV('Pinceau', 250);
    setV('Petit TP 100 P', 600);
    DATA.artsFixV2 = true; changed = true;
  }
  // Articles Arts plastiques / Musique ajoutés dans le stock cahier
  EXTRA_SUPPLY_ARTICLES.forEach(extra=>{
    if(!DATA.articles.some(a=>a.nom===extra.nom)){
      DATA.articles.push({id:uid(), type:'fourniture', nom:extra.nom, prixAchat:extra.prixAchat, prixVente:extra.prixVente, stock:0, seuil:extra.seuil, fournisseurId:null});
      changed = true;
    }
  });
  // Retire d'éventuels livres restants d'une ancienne version de l'appli
  if(DATA.articles.some(a=>a.type==='livre')){
    DATA.articles = DATA.articles.filter(a=>a.type!=='livre');
    changed = true;
  }
  if(DATA.livresCatalogueV1!==undefined){ delete DATA.livresCatalogueV1; changed = true; }
  // Réparer le lien kit <-> stock : clé stable par position (ordre fixe des 15 premiers articles)
  DEFAULT_COMPO_HEADERS.forEach((key, i)=>{
    if(DATA.articles[i] && DATA.articles[i].compoKey === undefined){ DATA.articles[i].compoKey = key; changed = true; }
  });
  DATA.articles.forEach(a=>{
    if(a.prixAchat===undefined){ a.prixAchat = (a.prix != null ? a.prix : 0); delete a.prix; changed = true; }
    if(a.prixVente===undefined){ a.prixVente = a.prixAchat; changed = true; }
    if(a.type===undefined){ a.type = 'fourniture'; changed = true; }
  });
  DATA.ventes.forEach(v=>{
    if(v.heure===undefined){ v.heure = ''; changed = true; }
    // On "photographie" une seule fois les anciennes ventes avec les valeurs actuelles,
    // pour qu'à partir de maintenant elles ne bougent plus quand on change un prix.
    if(v.prixVente===undefined || v.prixAchat===undefined){
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      if(niv){
        if(v.prixVente===undefined){ v.prixVente = niv.montant; changed = true; }
        if(v.prixAchat===undefined){ v.prixAchat = kitCost(niv); changed = true; }
      }
    }
  });
  DATA.commandes.forEach(c=>{
    c.lignes.forEach(l=>{
      if(l.prix===undefined && l.prixAchat!==undefined){ /* already fine */ }
      if(l.prixAchat===undefined){ l.prixAchat = (l.prix != null ? l.prix : 0); changed = true; }
    });
  });

  // Réceptions fournisseur (bons de réception numérotés)
  if(!DATA.receptions){ DATA.receptions = []; changed = true; }
  if(DATA.receptionSeq===undefined){ DATA.receptionSeq = 0; changed = true; }
  // Stock propre à chaque localité + historique des transferts
  if(!DATA.stockLoc){ DATA.stockLoc = {}; changed = true; }
  if(!DATA.transferts){ DATA.transferts = []; changed = true; }
  // Bons de retour (boutique -> grand stock, et grand stock -> fournisseur)
  if(!DATA.retours){ DATA.retours = []; changed = true; }
  if(DATA.retourSeq===undefined){ DATA.retourSeq = 0; changed = true; }
  if(DATA.transfertSeq===undefined){ DATA.transfertSeq = 0; changed = true; }
  // Commandes prises en vente, en attente de paiement à la caisse (circuit à 2 étapes)
  if(!DATA.commandesVente){ DATA.commandesVente = []; changed = true; }
  if(DATA.commandeSeq===undefined){ DATA.commandeSeq = 0; changed = true; }
  // Marqueur de version (le nettoyage v6 a déjà été fait une fois ; on ne le refait JAMAIS,
  // sinon un rechargement effacerait le stock reçu).
  if(!DATA.resetV6){ DATA.resetV6 = true; changed = true; }

  if(changed) saveData();
}

// Fenêtre de confirmation avant une action irréversible (suppression, annulation...).
// Renvoie true si l'utilisateur confirme, false sinon.
function askConfirm({title='Confirmer', message='', okLabel='Confirmer', danger=true}={}){
  return new Promise(resolve=>{
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `
      <div class="modal" style="width:400px;">
        <h3 style="margin-bottom:10px;">${title}</h3>
        <p style="font-size:13px; color:var(--muted); line-height:1.6; margin:0 0 20px;">${message}</p>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button class="btn btn-ghost" data-cancel>Annuler</button>
          <button class="btn ${danger?'btn-danger':''}" data-ok>${okLabel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(bg);
    const close = (val)=>{ bg.remove(); resolve(val); };
    bg.querySelector('[data-cancel]').onclick = ()=> close(false);
    bg.querySelector('[data-ok]').onclick = ()=> close(true);
    bg.onclick = (e)=>{ if(e.target===bg) close(false); }; // clic à côté = annuler
  });
}

function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }

function findArticleIdx(nom){ return DATA.articles.findIndex(a=>a.nom===nom); }

// Tri "plus récent d'abord" : par date, puis par ordre de création (id basé sur l'heure)
function byRecent(a,b){
  const d = (b.date||'').localeCompare(a.date||'');
  return d!==0 ? d : (b.id||'').localeCompare(a.id||'');
}

// Recette et coût d'une vente de KIT.
// Si la vente a été "photographiée" (prixVente/prixAchat enregistrés au moment de la vente),
// on utilise la photo → le passé ne change plus jamais.
// Sinon (très vieille vente non photographiée), on recalcule à partir du kit actuel.
function venteKitRecette(v){
  if(v.prixVente != null) return v.prixVente * v.qty;
  const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
  return niv ? niv.montant * v.qty : 0;
}
function venteKitCout(v){
  if(v.prixAchat != null) return v.prixAchat * v.qty;
  const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
  return niv ? kitCost(niv) * v.qty : 0;
}

function kitCost(niveau){
  let cost = 0;
  DEFAULT_COMPO_HEADERS.forEach(key=>{
    const art = articleByCompoKey(key);
    if(art) cost += (niveau.compo[key]||0) * art.prixAchat;
  });
  // Contenu de la trousse : chaque trousse embarque scotch, colle, bics, gomme, etc.
  const trousseQty = niveau.compo['Trousse'] || 0;
  if(trousseQty > 0){
    TROUSSE_LINKED_INDEXES.forEach(i=>{
      const art = DATA.articles[i];
      if(art) cost += trousseQty * art.prixAchat;
    });
  }
  return cost;
}

function readOnlyBanner(el){
  if(!el || el.querySelector('.ro-banner')) return;
  const banner = document.createElement('div');
  banner.className = 'ro-banner';
  banner.style.cssText = 'display:flex; align-items:center; gap:10px; background:var(--gold-bg); color:var(--gold); border:1px solid #EBD9AE; border-radius:11px; padding:10px 14px; margin-bottom:16px; font-size:12.5px; font-weight:600;';
  banner.innerHTML = '&#128274; Mode lecture seule — en tant que Superviseur, tu peux consulter cette page mais pas la modifier.';

}
function disableInputs(el){
  if(!el) return;
  const filtres = ['lv-niveau','j-date','r-from','r-to']; // filtres de consultation : on les laisse
  el.querySelectorAll('input, select, textarea').forEach(x=>{
    if(x.type === 'search') return; // recherche : on laisse
    if(filtres.includes(x.id)) return; // filtres d'affichage : on laisse
    x.disabled = true;
  });
  el.querySelectorAll('button').forEach(btn=>{
    if(btn.classList.contains('tab-btn')) return; // on laisse changer d'onglet
    if(btn.id === 'j-today') return;
    btn.disabled = true;
    btn.style.opacity = '.5';
    btn.style.cursor = 'not-allowed';
  });
}
function applyReadOnlyLock(main){
  readOnlyBanner(main);
  disableInputs(main);
}

    const marge = n.montant - cost;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'border-top:1px solid var(--line); padding:14px 0;';
    wrap.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-family:'Segoe UI', system-ui, -apple-system, Arial, Helvetica, sans-serif; flex-wrap:wrap; gap:10px;">
        <b style="color:var(--navy-dark); font-size:12px;">${n.nom}</b>
        <div style="display:flex; align-items:center; gap:14px; font-size:12px;">
          <span class="muted">Prix de vente:</span>
          <input type="number" min="0" value="${n.montant}" style="width:80px;" data-montant="${n.id}">
          <span class="muted">Coût matière: <b>${fmt(cost)} F</b></span>
          <span class="tag ${marge>=0?'tag-ok':'tag-warn'}">Bénéfice: ${fmt(marge)} F</span>
        </div>
      </div>
      <div class="compo-grid" id="compo-${n.id}"></div>
    `;
    list.appendChild(wrap);
    const grid = wrap.querySelector(`#compo-${n.id}`);
    DEFAULT_COMPO_HEADERS.forEach(key=>{
      const artForKey = articleByCompoKey(key);
      const keyLabel = artForKey ? artForKey.nom : (DEFAULT_COMPO_LABELS[key]||key);
      const row = document.createElement('div');
      row.innerHTML = `<span>${keyLabel}</span> <b><input type="number" min="0" value="${n.compo[key]||0}" style="width:44px; padding:2px 4px;" data-niv="${n.id}" data-key="${key}"></b>`;
      grid.appendChild(row);
    });
  });
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn';
  saveBtn.textContent = 'Enregistrer les compositions et prix';
  saveBtn.style.marginTop = '14px';
  saveBtn.onclick = async ()=>{
    list.querySelectorAll('input[data-niv]').forEach(inp=>{
      const niv = DATA.niveaux.find(x=>x.id===inp.dataset.niv);
      niv.compo[inp.dataset.key] = parseInt(inp.value)||0;
    });
    list.querySelectorAll('input[data-montant]').forEach(inp=>{
      const niv = DATA.niveaux.find(x=>x.id===inp.dataset.montant);
      niv.montant = parseFloat(inp.value)||0;
    });
    await saveData();
    showToast('Compositions enregistrées');
  };
  document.querySelector('.card').appendChild(saveBtn);
}

    <div class="tabs">
      <button class="tab-btn ${venteTab==='kit'?'active':''}" id="tab-kit">&#128722; Kit scolaire</button>

function renderVentes(main){
  const todayStr = new Date().toISOString().slice(0,10);
  main.innerHTML = `
    <div class="card">
      <h3>Nouvelle vente — Kit scolaire</h3>
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Niveau</label>
          <select id="v-niveau">${DATA.niveaux.map(n=>`<option value="${n.id}">${n.nom}</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Quantité de kits</label>
          <input type="number" id="v-qty" min="1" value="1" style="width:100px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Date</label>
          <input type="date" id="v-date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <button class="btn" id="v-submit">Enregistrer la vente</button>
      </div>
    </div>
    <div class="grid grid-2" style="margin-bottom:20px;">
      <div class="kpi">
        <p class="lbl">Total kits vendus (depuis le début)</p>
        <p class="val">${fmt(DATA.ventes.reduce((s,v)=>s+v.qty,0))}</p>
        <div class="sub">Tous niveaux confondus, jusqu'à aujourd'hui</div>
      </div>
      <div class="kpi">
        <p class="lbl">Kits vendus aujourd'hui</p>
        <p class="val">${fmt(DATA.ventes.filter(v=>v.date===todayStr).reduce((s,v)=>s+v.qty,0))}</p>
        <div class="sub">Tous niveaux confondus</div>
      </div>
    </div>
    <div class="card">
      <h3>Totaux par jour (tous niveaux confondus)</h3>
      <div id="ventes-par-jour"></div>
    </div>
    <div class="card">
      <h3>Historique des ventes <span class="badge-count">${DATA.ventes.length}</span></h3>
      <div id="ventes-hist"></div>
    </div>
  `;
  document.getElementById('v-submit').onclick = async ()=>{
    const niveauId = document.getElementById('v-niveau').value;
    const qty = parseInt(document.getElementById('v-qty').value)||0;
    const date = document.getElementById('v-date').value;
    if(!niveauId || qty<=0){ showToast('Vérifiez le niveau et la quantité'); return; }
    const niveau = DATA.niveaux.find(n=>n.id===niveauId);

    // 1) On calcule TOUT ce que cette vente va retirer du stock, article par article
    //    (composants du kit + contenu de la trousse), regroupé par article.
    const besoins = new Map(); // id article -> quantité nécessaire
    const addBesoin = (art, q)=>{
      if(!art || q<=0) return;
      besoins.set(art.id, (besoins.get(art.id)||0) + q);
    };
    DEFAULT_COMPO_HEADERS.forEach(key=>{
      addBesoin(articleByCompoKey(key), (niveau.compo[key]||0) * qty);
    });
    const trousseQty = (niveau.compo['Trousse']||0) * qty;
    if(trousseQty>0){
      TROUSSE_LINKED_INDEXES.forEach(i=>{ addBesoin(DATA.articles[i], trousseQty); });
    }

    // 2) On vérifie qu'il y a assez de stock PARTOUT avant de valider.
    const manquants = [];
    besoins.forEach((q, artId)=>{
      const art = DATA.articles.find(a=>a.id===artId);
      if(art && art.stock < q){
        manquants.push(`${art.nom} (besoin ${fmt(q)}, en stock ${fmt(art.stock)})`);
      }
    });
    if(manquants.length){
      const apercu = manquants.slice(0,3).join(' · ');
      const reste = manquants.length>3 ? ` (+${manquants.length-3} autre(s))` : '';
      showToast('Stock insuffisant : ' + apercu + reste);
      return; // on n'enregistre RIEN, le stock ne bouge pas
    }

    // 3) Tout est bon : on retire réellement du stock, puis on enregistre la vente.
    besoins.forEach((q, artId)=>{
      const art = DATA.articles.find(a=>a.id===artId);
      if(art) art.stock -= q;
    });
    DATA.ventes.push({
      id:uid(), niveauId, qty, date,
      heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      prixVente: niveau.montant,   // prix de vente du kit "photographié" au moment de la vente
      prixAchat: kitCost(niveau)   // coût matière "photographié" au moment de la vente
    });
    await saveData();
    showToast(`Vente enregistrée : ${qty} kit(s) ${niveau.nom}`);
    renderVentes(main);
  };
  const parJour = document.getElementById('ventes-par-jour');
  if(DATA.ventes.length===0){
    parJour.innerHTML = '<div class="empty">Aucune vente enregistrée pour l\'instant.</div>';
  } else {
    const groupes = {};
    DATA.ventes.forEach(v=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      if(!groupes[v.date]) groupes[v.date] = {kits:0, recette:0, marge:0};
      groupes[v.date].kits += v.qty;
      groupes[v.date].recette += venteKitRecette(v);
      groupes[v.date].marge += venteKitRecette(v) - venteKitCout(v);
    });
    const dates = Object.keys(groupes).sort((a,b)=> b.localeCompare(a));
    const totalKits = dates.reduce((s,d)=>s+groupes[d].kits,0);
    const totalRecette = dates.reduce((s,d)=>s+groupes[d].recette,0);
    const totalMarge = dates.reduce((s,d)=>s+groupes[d].marge,0);
    parJour.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th class="num">Kits vendus</th><th class="num">Recette</th><th class="num">Bénéfice</th></tr></thead><tbody>
      ${dates.map(d=>`<tr><td>${d}${d===todayStr?' <span class="tag tag-gold">Aujourd’hui</span>':''}</td><td class="num"><b>${fmt(groupes[d].kits)}</b></td><td class="num">${fmt(groupes[d].recette)} F</td><td class="num">${fmt(groupes[d].marge)} F</td></tr>`).join('')}
      <tr style="border-top:2px solid var(--navy);"><td><b>Total général</b></td><td class="num"><b>${fmt(totalKits)}</b></td><td class="num"><b>${fmt(totalRecette)} F</b></td><td class="num"><b>${fmt(totalMarge)} F</b></td></tr>
    </tbody></table></div>`;
  }

  const hist = document.getElementById('ventes-hist');
  if(DATA.ventes.length===0){ hist.innerHTML = '<div class="empty">Aucune vente enregistrée pour l\'instant.</div>'; return; }
  const sorted = [...DATA.ventes].sort(byRecent);
  hist.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Heure</th><th>Niveau</th><th class="num">Kits</th><th class="num">Recette</th><th class="num">Bénéfice</th><th></th></tr></thead><tbody>
    ${sorted.map(v=>{
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      const recette = venteKitRecette(v);
      const marge = venteKitRecette(v) - venteKitCout(v);
      return `<tr><td>${v.date}</td><td>${v.heure||'—'}</td><td>${niv?niv.nom:'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(marge)} F</td>
      <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-recu="${v.id}">&#129534; Reçu</button> <button class="btn btn-ghost btn-sm" data-del="${v.id}">Annuler</button></td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  hist.querySelectorAll('[data-recu]').forEach(b=>{
    b.onclick = ()=> printRecuKit(b.dataset.recu);
  });

  hist.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = async ()=>{
      const vId = b.dataset.del;
      const v = DATA.ventes.find(x=>x.id===vId);
      const niveau = DATA.niveaux.find(n=>n.id===v.niveauId);
      const ok = await askConfirm({
        title:'Annuler cette vente ?',
        message:`Tu vas annuler la vente de <b>${v.qty} kit(s) ${niveau?niveau.nom:''}</b> du ${v.date}. Le stock sera remis. Cette action est définitive.`,
        okLabel:'Oui, annuler la vente'
      });
      if(!ok) return;
      
      
      // restore stock
      DEFAULT_COMPO_HEADERS.forEach(key=>{
        const q = (niveau.compo[key]||0) * v.qty;
        if(q>0){
          const art = articleByCompoKey(key);
          if(art) art.stock += q;
        }
      });
      const trousseQty = (niveau.compo['Trousse']||0) * v.qty;
      if(trousseQty>0){ TROUSSE_LINKED_INDEXES.forEach(i=>{ DATA.articles[i].stock += trousseQty; }); }
      DATA.ventes = DATA.ventes.filter(x=>x.id!==vId);
      await saveData();
      showToast('Vente annulée, stock restauré');
      renderVentes(main);
    };
  });
}

// ---------- JOURNAL DU JOUR (rapport de caisse) ----------
function renderJournal(main){
  const today = new Date().toISOString().slice(0,10);
  main.innerHTML = `
    <h2 class="page-title">Recette du jour${scopeLocId() ? ' — '+(CURRENT_USER.localiteNom||'ma boutique') : ''}</h2>
    <p class="page-sub">Choisis une date pour voir tous les kits vendus ce jour-là, l'argent gagné et le bénéfice.</p>
    <div class="card">
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Date</label>
          <input type="date" id="j-date" value="${today}">
        </div>
        <button class="btn btn-ghost" id="j-today">Aujourd'hui</button>
      </div>
      <div id="j-content"></div>
    </div>
  `;
  const dateInput = document.getElementById('j-date');
  const draw = ()=>{
    const date = dateInput.value;
    const _loc = scopeLocId(); // null = Gérant/Superviseur : voient toutes les boutiques
    const inScope = (v)=> !_loc || v.localiteId===_loc;
    // --- Kits ---
    const ventesJour = DATA.ventes.filter(v=>v.date===date && inScope(v)).sort((a,b)=> (a.heure||'').localeCompare(b.heure||''));
    const kits = ventesJour.reduce((s,v)=>s+v.qty,0);
    const recetteKits = ventesJour.reduce((s,v)=> s + venteKitRecette(v), 0);
    const margeKits = ventesJour.reduce((s,v)=> s + (venteKitRecette(v) - venteKitCout(v)), 0);
    const parNiveau = {};
    ventesJour.forEach(v=>{ parNiveau[v.niveauId] = (parNiveau[v.niveauId]||0)+v.qty; });
    // --- Livres & Arts/Musique ---
    const detailJour = (DATA.ventesLivres||[]).filter(v=>v.date===date && inScope(v)).sort((a,b)=> (a.heure||'').localeCompare(b.heure||''));
    const nbDetail = detailJour.reduce((s,v)=>s+v.qty,0);
    const recetteDetail = detailJour.reduce((s,v)=>s+v.prixVente*v.qty,0);
    const margeDetail = detailJour.reduce((s,v)=>s+(v.prixVente-v.prixAchat)*v.qty,0);
    // --- Totaux du jour ---
    const recetteTot = recetteKits + recetteDetail;
    const margeTot = margeKits + margeDetail;

    const content = document.getElementById('j-content');
    content.innerHTML = `
      <div class="grid grid-3" style="margin:16px 0;">
        <div class="kpi"><p class="lbl">Recette du jour (total)</p><p class="val">${fmt(recetteTot)} F</p><div class="sub">Kits ${fmt(recetteKits)} F · Livres/arts ${fmt(recetteDetail)} F</div></div>
        <div class="kpi"><p class="lbl">Bénéfice du jour (total)</p><p class="val" style="color:var(--ok);">${fmt(margeTot)} F</p><div class="sub">Kits ${fmt(margeKits)} F · Livres/arts ${fmt(margeDetail)} F</div></div>
        <div class="kpi"><p class="lbl">Vendus aujourd'hui</p><p class="val">${fmt(kits)} kit(s) · ${fmt(nbDetail)} livre(s)/art</p></div>
      </div>
      ${(ventesJour.length===0 && detailJour.length===0) ? '<div class="empty">Aucune vente ce jour-là.</div>' : `
      ${ventesJour.length===0 ? '' : `
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:10px 0 6px;">Répartition par niveau (kits)</div>
      <div class="table-scroll"><table><thead><tr><th>Niveau</th><th class="num">Kits</th><th class="num">Recette</th></tr></thead><tbody>
      ${Object.keys(parNiveau).map(nid=>{
        const n = DATA.niveaux.find(x=>x.id===nid);
        const recetteNiv = ventesJour
          .filter(v=>v.niveauId===nid)
          .reduce((s,v)=> s + venteKitRecette(v), 0);
        return `<tr><td>${n?n.nom:'?'}</td><td class="num">${fmt(parNiveau[nid])}</td><td class="num">${fmt(recetteNiv)} F</td></tr>`;
      }).join('')}
      </tbody></table></div>
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:18px 0 6px;">Transactions de kits</div>
      <div class="table-scroll"><table><thead><tr><th>Heure</th><th>Niveau</th><th class="num">Kits</th><th class="num">Montant</th></tr></thead><tbody>
      ${ventesJour.map(v=>{
       const n = DATA.niveaux.find(x=>x.id===v.niveauId);
        return `<tr><td>${v.heure||'—'}</td><td>${n?n.nom:'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt(venteKitRecette(v))} F</td></tr>`;
      }).join('')}
      </tbody></table></div>`}
      ${detailJour.length===0 ? '' : `
      <div style="font-weight:bold; color:var(--navy-dark); font-size:12px; margin:18px 0 6px;">Transactions livres / arts / musique</div>
      <div class="table-scroll"><table><thead><tr><th>Heure</th><th>Type</th><th>Article</th><th class="num">Qté</th><th class="num">Montant</th></tr></thead><tbody>
      ${detailJour.map(v=>{
        const typeLbl = v.kind==='pack' ? 'Pack Arts' : (v.kind==='fourniture' ? 'Arts/Musique' : 'Livre');
        return `<tr><td>${v.heure||'—'}</td><td>${typeLbl}</td><td>${v.livreNom||'?'}</td><td class="num">${v.qty}</td><td class="num">${fmt(v.prixVente*v.qty)} F</td></tr>`;
      }).join('')}
      </tbody></table></div>`}
      `}
    `;
  };

  dateInput.onchange = draw;
  document.getElementById('j-today').onclick = ()=>{ dateInput.value = today; draw(); };
  draw();
}

function renderStock(main, searchQuery){
  const q = (searchQuery||'').trim().toLowerCase();

  const filtered = q ? all.filter(a=>a.nom.toLowerCase().includes(q)) : all;

          <label>Rechercher un article</label>
          <input type="search" id="stock-search" placeholder="Ex : cahier, colle, bic..." value="${q?q.replace(/"/g,'&quot;'):''}" style="width:100%;">
        </div>
      </div>
      ${filtered.length===0 ? '<div class="empty">Aucun article ne correspond à ta recherche.</div>' : `
      <div class="table-scroll"><table>
        <thead><tr><th>Article</th><th class="num">Stock</th><th class="num">Seuil</th><th class="num">Prix achat</th><th class="num">Prix vente</th><th class="num">Bénéfice</th><th>Fournisseur</th><th>Statut</th></tr></thead>
        <tbody id="stock-body"></tbody>
      </table></div>
      <div style="margin-top:16px; text-align:right;">
        <button class="btn" id="stock-save-all">Enregistrer</button>
      </div>`}
    </div>
  `;
  const searchInp = document.getElementById('stock-search');
  let searchTimer;
  searchInp.oninput = ()=>{
    clearTimeout(searchTimer);
    const val = searchInp.value;
    const caret = searchInp.selectionStart;
    searchTimer = setTimeout(()=>{
      renderStock(main, val);
      const inp2 = document.getElementById('stock-search');
      if(inp2){ inp2.focus(); inp2.setSelectionRange(caret, caret); }
    }, 150);
  };
  if(filtered.length===0) return;
  const body = document.getElementById('stock-body');
  filtered.forEach(a=>{
    const low = a.stock <= a.seuil;
    const marge = a.prixVente - a.prixAchat;
    const tr = document.createElement('tr');
    if(low) tr.className = 'row-alert';
    tr.innerHTML = `
      <td>${a.nom}${a.niveau?` <span class="muted">(${a.niveau})</span>`:''}</td>
      <td class="num"><input type="number" value="${a.stock}" style="width:70px; text-align:right;" data-stock="${a.id}"></td>
      <td class="num"><input type="number" value="${a.seuil}" style="width:60px; text-align:right;" data-seuil="${a.id}"></td>
      <td class="num"><input type="number" value="${a.prixAchat}" style="width:75px; text-align:right;" data-achat="${a.id}"></td>
      <td class="num"><input type="number" value="${a.prixVente}" style="width:75px; text-align:right;" data-vente="${a.id}"></td>
      <td class="num" style="color:${marge>=0?'var(--ok)':'var(--warn)'};">${fmt(marge)} F</td>
      <td>
        <select data-fourn="${a.id}">
          <option value="">—</option>
          ${DATA.fournisseurs.map(f=>`<option value="${f.id}" ${f.id===a.fournisseurId?'selected':''}>${f.nom}</option>`).join('')}
        </select>
      </td>
      <td>${low?'<span class="tag tag-warn">A commander</span>':'<span class="tag tag-ok">OK</span>'}</td>
    `;
    body.appendChild(tr);
  });
  document.getElementById('stock-save-all').onclick = async ()=>{
    filtered.forEach(a=>{
      a.stock = parseInt(body.querySelector(`[data-stock="${a.id}"]`).value)||0;
      a.seuil = parseInt(body.querySelector(`[data-seuil="${a.id}"]`).value)||0;
      a.prixAchat = parseFloat(body.querySelector(`[data-achat="${a.id}"]`).value)||0;
      a.prixVente = parseFloat(body.querySelector(`[data-vente="${a.id}"]`).value)||0;
      a.fournisseurId = body.querySelector(`[data-fourn="${a.id}"]`).value || null;
    });
    await saveData();
    showToast('Stock mis à jour');
    renderStock(main, q);

}

function parseItemRef(ref){
  if(!ref) return null;
  const idx = ref.indexOf(':');
  const kind = ref.slice(0, idx), id = ref.slice(idx+1);
  if(kind==='art'){ const a=(DATA.articles||[]).find(x=>x.id===id); return a? {kind:'art', id:a.id, nom:a.nom, prixAchat:a.prixAchat, stock:a.stock} : null; }
  if(kind==='livre'){ const l=(DATA.livres||[]).find(x=>x.id===id); return l? {kind:'livre', id:l.id, nom:l.nom, prixAchat:l.prixAchat, stock:l.stock} : null; }
  return null;
}

async function validerReception(main){
  if(receptionDraft.length===0){ showToast('Ajoute au moins un article reçu'); return; }
  const fId = document.getElementById('rc-four').value || null;
  const f = fId ? (DATA.fournisseurs||[]).find(x=>x.id===fId) : null;
  const dateInput = document.getElementById('rc-date').value || new Date().toISOString().slice(0,10);
  const btn = document.getElementById('rc-valider');
  if(btn){ btn.disabled=true; btn.textContent='Enregistrement...'; }
  try{
    const res = await fetch('/api/tx/reception', {
      method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
      body: JSON.stringify({ lignes: receptionDraft.map(l=>({kind:l.kind, id:l.id, nom:l.nom, qte:l.qte, prixAchat:l.prixAchat})),
        fournisseurId:fId, fournisseurNom: f? f.nom : '', dateISO: dateInput })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){ showToast(data.error||'Enregistrement impossible'); if(btn){btn.disabled=false;btn.textContent='Valider la réception';} return; }
    await loadData();
    receptionDraft = [];
    showToast('Réception validée — grand stock mis à jour (' + data.reception.num + ')');
    renderReception(main);
    printReception(data.reception.id);
  }catch(e){
    showToast('Impossible de contacter le serveur');
    if(btn){ btn.disabled=false; btn.textContent='Valider la réception'; }
  }
}

// ================= CIRCUIT CAISSE À 2 ÉTAPES : Vente (commande+code) -> Caisse (paiement+monnaie) =================

// Stock d'une localité
function locStockGet(locId, ref){ return (DATA.stockLoc && DATA.stockLoc[locId] && DATA.stockLoc[locId][ref]) || 0; }
function locStockAdd(locId, ref, delta){ DATA.stockLoc[locId]=DATA.stockLoc[locId]||{}; DATA.stockLoc[locId][ref]=(DATA.stockLoc[locId][ref]||0)+delta; }

// Besoins d'une commande (kits) exprimés en refs de stock : { 'art:ID': qte }
function besoinsCommande(lignes){
  const besoins = {};
  const add = (ref, q)=>{ if(ref && q>0) besoins[ref] = (besoins[ref]||0)+q; };
  lignes.forEach(l=>{
    if(l.type==='kit'){
      const niveau = DATA.niveaux.find(n=>n.id===l.niveauId);
      if(!niveau) return;
      DEFAULT_COMPO_HEADERS.forEach(key=>{
        const art = articleByCompoKey(key);
        if(art) add('art:'+art.id, (niveau.compo[key]||0)*l.qte);
      });
      const trousseQty = (niveau.compo['Trousse']||0)*l.qte;
      if(trousseQty>0){ TROUSSE_LINKED_INDEXES.forEach(i=>{ const a=DATA.articles[i]; if(a) add('art:'+a.id, trousseQty); }); }
    }
    else if(l.type==='detail'){
      // Livre ou fourniture Arts/Musique vendu à l'unité : il sort du stock de la boutique
      add(l.ref, l.qte);
    }
  });
  return besoins;
}
// Code court unique parmi les commandes en attente
function genCommandeCode(){
  const enAttente = (DATA.commandesVente||[]).filter(c=>c.statut==='en_attente').map(c=>c.code);
  let code;
  do { code = String(Math.floor(1000 + Math.random()*9000)); } while(enAttente.includes(code));
  return code;
}

  return CURRENT_USER.localiteId || null;

// Livres et fournitures Arts/Musique vendables à l'unité (avec prix de vente)
function detailItemOptions(){
  const livres = (DATA.livres||[]).filter(l=>l.prixVente>0);
  const arts = DATA.articles.filter(a=> (ARTS_NOMS.includes(a.nom) || MUSIQUE_NOMS.includes(a.nom)) && a.prixVente>0);
  let html = '';
  if(livres.length){
    html += `<optgroup label="Livres">` + livres.map(l=>{
      const niv = DATA.niveaux.find(n=>n.id===l.niveauId);
      return `<option value="livre:${l.id}">${l.nom}${niv?' — '+niv.nom:''} — ${fmt(l.prixVente)} F</option>`;
    }).join('') + `</optgroup>`;
  }
  if(arts.length){
    html += `<optgroup label="Arts plastiques & Musique">` + arts.map(a=>`<option value="art:${a.id}">${a.nom} — ${fmt(a.prixVente)} F</option>`).join('') + `</optgroup>`;
  }
  return html;
}
// Infos d'un article vendu à l'unité, à partir de sa référence
function detailItemInfo(ref){
  const it = parseItemRef(ref);
  if(!it) return null;
  if(it.kind==='livre'){
    const l = DATA.livres.find(x=>x.id===it.id);
    return l ? { ref, kind:'livre', id:l.id, nom:l.nom, niveauId:l.niveauId, prixUnit:l.prixVente, prixAchat:livreAchat(l) } : null;
  }
  const a = DATA.articles.find(x=>x.id===it.id);
  return a ? { ref, kind:'fourniture', id:a.id, nom:a.nom, niveauId:null, prixUnit:a.prixVente, prixAchat:a.prixAchat } : null;
}

// ---------- PAGE VENTE : prise de commande + génération du code ----------
async function renderCommande(main){
  let localites = [];
  if(CURRENT_USER.role==='gerant'){
    try{ const rl=await fetch('/api/localites',{headers:authHeaders()}); if(rl.ok) localites=(await rl.json()).filter(l=>l.active); }catch(_){}

  const gerantSansLoc = CURRENT_USER.role==='gerant' && localites.length===0;
  const venteSansLoc = CURRENT_USER.role==='vente' && !CURRENT_USER.localiteId;
  main.innerHTML = `
    <h2 class="page-title">Prendre une commande</h2>
    <p class="page-sub">Compose la commande du parent depuis le stock de la boutique. À la fin, un <b>code</b> et un <b>montant total</b> sont donnés au parent — il paie ensuite à la <b>Caisse</b> avec ce code.</p>
    ${gerantSansLoc ? '<div class="card"><div class="empty">Aucune localité active. Crée-en une dans « Localités » et transfère-lui du stock.</div></div>' :

    <div class="card">
      <h3>Client (parent)</h3>
      <div class="toolbar">
        <div class="field" style="margin-bottom:0; flex:1; min-width:170px;"><label>Nom du parent (facultatif)</label>

        <div class="field" style="margin-bottom:0; flex:1; min-width:150px;"><label>Téléphone (recommandé)</label>
          <input type="tel" id="cmd-cli-tel" placeholder="Ex : 07 00 00 00 00" style="width:100%;"></div>
      </div>
    </div>

    <div class="card">
      <h3>Ajouter des kits</h3>
      ${CURRENT_USER.role==='gerant' ? `
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;"><label>Boutique</label>
          <select id="cmd-loc" style="min-width:170px;">${localites.map(l=>`<option value="${l.id}">${l.nom}</option>`).join('')}</select>
        </div>
      </div>` : `<div class="muted" style="margin-bottom:10px;">Boutique : <b>${CURRENT_USER.localiteNom||'ta boutique'}</b></div>`}
      <div class="toolbar" style="align-items:flex-end;">
        <div class="field" style="margin-bottom:0;"><label>Kit (niveau)</label>
          <select id="cmd-niveau">${DATA.niveaux.map(n=>`<option value="${n.id}">${n.nom} — ${fmt(n.montant)} F</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0;"><label>Nombre de kits</label>
          <input type="number" id="cmd-qte" min="1" value="1" style="width:110px;">
        </div>
        <button class="btn" id="cmd-add">Ajouter au panier</button>
      </div>
    </div>

    <div class="card">
      <h3>Ajouter des livres / arts (à l'unité)</h3>
      <p class="muted" style="font-size:12.5px; margin:-4px 0 10px;">Ouvre la liste, coche ce que le parent veut, puis ajoute tout d'un coup.</p>

      <div id="cmd-dd-wrap" style="position:relative;">
        <button type="button" id="cmd-dd-btn" style="width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 16px; border:1.5px solid var(--line); border-radius:12px; background:#fff; cursor:pointer; font-size:14.5px; font-weight:400; color:var(--navy-dark); text-align:left;">
          <span id="cmd-dd-label">&#128218; Choisir des livres / fournitures…</span>
          <span id="cmd-dd-arrow" style="color:var(--muted); font-size:12px;">&#9660;</span>
        </button>

        <div id="cmd-dd-panel" style="display:none; position:absolute; z-index:60; left:0; right:0; top:calc(100% + 6px); background:#fff; border:1.5px solid var(--line); border-radius:12px; box-shadow:0 14px 40px rgba(11,31,58,.18); overflow:hidden;">
          <div style="padding:10px; border-bottom:1px solid var(--line); display:flex; gap:8px; flex-wrap:wrap;">
            <select id="cmd-fclasse" style="flex:0 0 auto; min-width:130px; padding:8px 10px; border:1px solid var(--line); border-radius:9px;">
              <option value="">Toutes les classes</option>
              ${DATA.niveaux.map(n=>`<option value="${n.id}">${n.nom}</option>`).join('')}
            </select>
            <input type="search" id="cmd-fsearch" placeholder="Rechercher un livre..." style="flex:1; min-width:140px; padding:8px 10px; border:1px solid var(--line); border-radius:9px;">

          <div id="cmd-ilist" style="max-height:320px; overflow-y:auto;"></div>
          <div style="padding:10px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px; background:var(--bg-soft);">
            <span class="muted" id="cmd-isummary" style="font-size:12.5px;"></span>
            <div style="flex:1;"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="cmd-iclear">Tout décocher</button>
            <button type="button" class="btn btn-sm" id="cmd-iadd">Ajouter au panier</button>

      </div>
    </div>

    <div class="card">
      <h3>Panier <span class="badge-count" id="cmd-count">0</span></h3>
      <div id="cmd-lines"></div>
      <div id="cmd-total" style="margin-top:10px; font-size:16px;"></div>
      <div style="margin-top:12px; text-align:right;">
        <button class="btn btn-ghost" id="cmd-clear">Vider</button>
        <button class="btn" id="cmd-finish">Terminer la commande &amp; donner le code</button>
      </div>

    <div id="cmd-codebox"></div>

      <div id="cmd-attente"></div>
    </div>`}
  `;
  if(gerantSansLoc || venteSansLoc) return;

  document.getElementById('cmd-add').onclick = ()=>{
    const niveauId = document.getElementById('cmd-niveau').value;
    const qte = Math.max(1, parseInt(document.getElementById('cmd-qte').value,10)||0);
    const niveau = DATA.niveaux.find(n=>n.id===niveauId);
    if(!niveau) return;
    const ex = commandeDraft.find(l=>l.type==='kit' && l.niveauId===niveauId);
    if(ex){ ex.qte += qte; } else commandeDraft.push({ type:'kit', niveauId, nom:'Kit '+niveau.nom, qte, prixUnit:niveau.montant });
    document.getElementById('cmd-qte').value = 1;
    refreshCmd();
  };
  document.getElementById('cmd-clear').onclick = ()=>{ commandeDraft=[]; refreshCmd(); };
  document.getElementById('cmd-finish').onclick = ()=> finaliserCommande(main);

  // --- Livres / arts à l'unité : liste à cocher (plusieurs d'un coup) ---
  const coches = {}; // ref -> quantité voulue (survit à la recherche/filtre)
  const locNow = ()=> pageLocaliteId('cmd-loc');

  // Articles vendables à l'unité, présents dans le stock de CETTE boutique
  function detailDispo(){
    const st = (DATA.stockLoc && DATA.stockLoc[locNow()]) || {};
    const out = [];
    (DATA.livres||[]).forEach(l=>{
      const ref='livre:'+l.id, q=st[ref]||0;
      if(q>0 && l.prixVente>0){ const niv=DATA.niveaux.find(n=>n.id===l.niveauId);
        out.push({ ref, kind:'livre', id:l.id, nom:l.nom, classe:niv?niv.nom:'', niveauId:l.niveauId, prixUnit:l.prixVente, prixAchat:livreAchat(l), dispo:q }); }
    });
    DATA.articles.forEach(a=>{
      if(!(ARTS_NOMS.includes(a.nom)||MUSIQUE_NOMS.includes(a.nom)) || !(a.prixVente>0)) return;
      const ref='art:'+a.id, q=st[ref]||0;
      if(q>0) out.push({ ref, kind:'fourniture', id:a.id, nom:a.nom, classe:'Arts / Musique', niveauId:null, prixUnit:a.prixVente, prixAchat:a.prixAchat, dispo:q });
    });
    return out;
  }
  function updateISummary(){
    const refs = Object.keys(coches).filter(r=>coches[r]>0);
    const el = document.getElementById('cmd-isummary');
    const lbl = document.getElementById('cmd-dd-label');
    const all = detailDispo();
    const tot = refs.reduce((s,r)=>{ const it=all.find(x=>x.ref===r); return s + (it? it.prixUnit*coches[r] : 0); },0);
    const nbUnites = refs.reduce((s,r)=>s+coches[r],0);
    // Résumé lisible directement sur le bouton, même liste fermée
    if(lbl){
      lbl.innerHTML = refs.length
        ? `&#128218; <b>${refs.length}</b> article(s) coché(s) · ${fmt(tot)} F`
        : '&#128218; Choisir des livres / fournitures…';
    }
    if(el){
      el.innerHTML = refs.length ? `<b>${fmt(nbUnites)}</b> unité(s) · ${fmt(tot)} F` : 'Aucun article coché';
    }
  }
  function drawIList(){
    const box = document.getElementById('cmd-ilist');
    if(!box) return;
    const q = (document.getElementById('cmd-fsearch').value||'').toLowerCase();
    const cl = document.getElementById('cmd-fclasse').value;
    let items = detailDispo();
    if(cl) items = items.filter(it=> it.niveauId===cl);
    if(q) items = items.filter(it=> it.nom.toLowerCase().includes(q));
    if(detailDispo().length===0){ box.innerHTML='<div class="empty">Aucun livre ni fourniture en stock dans ta boutique. Demande un transfert au Gérant.</div>'; updateISummary(); return; }
    if(items.length===0){ box.innerHTML='<div class="empty">Aucun article ne correspond à ta recherche.</div>'; updateISummary(); return; }
    box.innerHTML = items.map(it=>{
      const on = (coches[it.ref]||0)>0;
      return `<label style="display:flex; align-items:center; gap:10px; padding:9px 12px; border-bottom:1px solid var(--line); cursor:pointer; ${on?'background:var(--gold-bg);':''}">
        <input type="checkbox" data-chk="${it.ref}" ${on?'checked':''} style="width:17px; height:17px; flex:0 0 auto;">
        <span style="flex:1; min-width:0;">
          <span style="display:block; font-size:13.5px; font-weight:600; color:var(--navy-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${it.nom}</span>
          <span style="display:block; font-size:11.5px; color:var(--muted);">${it.classe||'—'} · ${fmt(it.prixUnit)} F · reste ${fmt(it.dispo)}</span>
        </span>
        <input type="number" min="1" max="${it.dispo}" value="${coches[it.ref]||1}" data-qte="${it.ref}" data-dispo="${it.dispo}"
          style="width:64px; text-align:right; padding:5px 6px; border:1px solid var(--line); border-radius:7px; flex:0 0 auto;" ${on?'':'disabled'}>
      </label>`;
    }).join('');

    box.querySelectorAll('[data-chk]').forEach(chk=>{
      chk.onchange = ()=>{
        const ref = chk.dataset.chk;
        const qteInput = box.querySelector(`[data-qte="${ref}"]`);
        if(chk.checked){ coches[ref] = parseInt(qteInput.value,10)||1; qteInput.disabled=false; }
        else { delete coches[ref]; qteInput.disabled=true; }
        updateISummary();
      };
    });
    box.querySelectorAll('[data-qte]').forEach(inp=>{
      inp.oninput = ()=>{
        let v = parseInt(inp.value,10)||0;
        const d = parseInt(inp.dataset.dispo,10);
        if(v<1) v=1;
        if(v>d){ v=d; inp.value=d; showToast('Il ne reste que '+fmt(d)+' en boutique'); }
        coches[inp.dataset.qte] = v;
        updateISummary();
      };
    });
    updateISummary();
  }

  // --- Ouverture / fermeture de la liste déroulante ---
  const ddBtn = document.getElementById('cmd-dd-btn');
  const ddPanel = document.getElementById('cmd-dd-panel');
  const ddArrow = document.getElementById('cmd-dd-arrow');
  function ouvrirDD(ouvrir){
    ddPanel.style.display = ouvrir ? 'block' : 'none';
    ddArrow.innerHTML = ouvrir ? '&#9650;' : '&#9660;';
    ddBtn.style.borderColor = ouvrir ? 'var(--navy-dark)' : 'var(--line)';
    if(ouvrir){ drawIList(); setTimeout(()=>{ const s=document.getElementById('cmd-fsearch'); if(s) s.focus(); }, 30); }
  }
  ddBtn.onclick = (e)=>{ e.stopPropagation(); ouvrirDD(ddPanel.style.display === 'none'); };
  // Un clic en dehors referme la liste (comportement attendu partout)
  document.addEventListener('click', (e)=>{
    const wrap = document.getElementById('cmd-dd-wrap');
    if(wrap && !wrap.contains(e.target) && ddPanel.style.display === 'block') ouvrirDD(false);
  });
  ddPanel.onclick = (e)=> e.stopPropagation();

  document.getElementById('cmd-fsearch').oninput = drawIList;
  document.getElementById('cmd-fclasse').onchange = drawIList;
  const locSelCmd = document.getElementById('cmd-loc');
  if(locSelCmd) locSelCmd.onchange = ()=>{ Object.keys(coches).forEach(k=>delete coches[k]); drawIList(); drawAttente(main); };
  document.getElementById('cmd-iclear').onclick = ()=>{ Object.keys(coches).forEach(k=>delete coches[k]); drawIList(); };
  document.getElementById('cmd-iadd').onclick = ()=>{
    const refs = Object.keys(coches).filter(r=>coches[r]>0);
    if(refs.length===0){ showToast('Coche au moins un article'); return; }
    const all = detailDispo();
    let ajoutes = 0;
    refs.forEach(ref=>{
      const it = all.find(x=>x.ref===ref); if(!it) return;
      const qte = coches[ref];
      const dejaPanier = commandeDraft.filter(l=>l.type==='detail' && l.ref===ref).reduce((s,l)=>s+l.qte,0);
      if(qte + dejaPanier > it.dispo){ showToast(`${it.nom} : il ne reste que ${fmt(it.dispo - dejaPanier)} en boutique`); return; }
      const ex = commandeDraft.find(l=>l.type==='detail' && l.ref===ref);
      if(ex) ex.qte += qte;
      else commandeDraft.push({ type:'detail', kind:it.kind, ref, id:it.id, nom:it.nom, niveauId:it.niveauId, qte, prixUnit:it.prixUnit, prixAchat:it.prixAchat });
      ajoutes++;
    });
    if(ajoutes>0){
      Object.keys(coches).forEach(k=>delete coches[k]);
      const s = document.getElementById('cmd-fsearch'); if(s) s.value = '';
      drawIList();
      ouvrirDD(false); // la liste se referme : l'écran reste léger
      refreshCmd();
      showToast(ajoutes+' article(s) ajouté(s) au panier');
    }
  };
  drawIList();

  function refreshCmd(){
    const box = document.getElementById('cmd-lines');
    const tot = document.getElementById('cmd-total');
    document.getElementById('cmd-count').textContent = commandeDraft.length;
    if(commandeDraft.length===0){ box.innerHTML='<div class="empty">Panier vide. Ajoute des kits.</div>'; tot.innerHTML=''; return; }
    box.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Article</th><th style="text-align:right;">Qté</th><th style="text-align:right;">Prix unit.</th><th style="text-align:right;">Sous-total</th><th></th></tr></thead><tbody>
      ${commandeDraft.map((l,i)=>`<tr><td>${l.nom}</td><td style="text-align:right;">${fmt(l.qte)}</td><td style="text-align:right;">${fmt(l.prixUnit)} F</td><td style="text-align:right;">${fmt(l.qte*l.prixUnit)} F</td>
        <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-rm="${i}">Retirer</button></td></tr>`).join('')}
    </tbody></table></div>`;
    const total = commandeDraft.reduce((s,l)=>s+l.qte*l.prixUnit,0);
    tot.innerHTML = `Total à payer : <b>${fmt(total)} F</b>`;
    box.querySelectorAll('[data-rm]').forEach(b=> b.onclick=()=>{ commandeDraft.splice(parseInt(b.dataset.rm,10),1); refreshCmd(); });
  }
  refreshCmd();
  drawAttente(main);
}

async function finaliserCommande(main){
  if(commandeDraft.length===0){ showToast('Le panier est vide'); return; }
  const locId = pageLocaliteId('cmd-loc');
  if(!locId){ showToast('Choisis la boutique'); return; }
  const btn = document.getElementById('cmd-finish');
  if(btn){ btn.disabled = true; btn.textContent = 'Enregistrement...'; } // évite le double-clic
  const besoins = besoinsCommande(commandeDraft);
  const total = commandeDraft.reduce((s,l)=>s+l.qte*l.prixUnit,0);
  const locNom = CURRENT_USER.role==='gerant'
    ? (document.getElementById('cmd-loc').options[document.getElementById('cmd-loc').selectedIndex].text)
    : (CURRENT_USER.localiteNom||'');
  const clientNom = (document.getElementById('cmd-cli-nom')||{}).value || '';
  const clientTel = (document.getElementById('cmd-cli-tel')||{}).value || '';
  try{
    // C'est le SERVEUR qui vérifie le stock et réserve : deux vendeurs en même
    // temps ne peuvent pas réserver le même article deux fois.
    const res = await fetch('/api/tx/commande', {
      method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
      body: JSON.stringify({ localiteId:locId, localiteNom:locNom, lignes:commandeDraft.map(l=>({...l})), besoins, total,
        clientNom: clientNom.trim(), clientTel: clientTel.trim() })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      if(res.status===409 && data.refs){
        const noms = data.refs.map(r=>{ const it=parseItemRef(r); return it?it.nom:r; });
        showToast('Stock boutique insuffisant : ' + noms.slice(0,2).join(' · '));
      } else showToast(data.error || 'Enregistrement impossible');
      await loadData();
      renderCommande(main);
      return;
    }
    const cmd = data.commande;
    await loadData(); // on récupère l'état officiel du serveur
    commandeDraft = [];
    renderCommande(main);
    const box = document.getElementById('cmd-codebox');
    if(box){
      box.innerHTML = `
        <div class="card" style="border:2px solid var(--ok); text-align:center;">
          <h3 style="justify-content:center;">Commande enregistrée ✅</h3>
          <p style="margin:6px 0; color:var(--muted);">Donne ce code et ce montant au parent. Il paie à la Caisse.</p>
          <div style="font-size:40px; font-weight:800; letter-spacing:4px; color:var(--navy-dark); margin:10px 0;">${cmd.code}</div>
          <div style="font-size:20px; font-weight:700;">Total : ${fmt(cmd.total)} F</div>
        </div>`;
      box.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }catch(e){
    showToast('Impossible de contacter le serveur');
    if(btn){ btn.disabled=false; btn.textContent='Terminer la commande & donner le code'; }
  }
}

function refreshCmdView(main){
  const c = document.getElementById('cmd-count'); if(c) c.textContent = commandeDraft.length;
  const box = document.getElementById('cmd-lines');
  if(box){ if(commandeDraft.length===0){ box.innerHTML='<div class="empty">Panier vide. Ajoute des kits.</div>'; document.getElementById('cmd-total').innerHTML=''; } }
  drawAttente(main);
}

function drawAttente(main){
  const locId = pageLocaliteId('cmd-loc');
  const box = document.getElementById('cmd-attente');
  if(!box) return;
  const list = (DATA.commandesVente||[]).filter(c=>c.statut==='en_attente' && c.localiteId===locId);
  const cnt = document.getElementById('cmd-attente-count'); if(cnt) cnt.textContent = list.length;
  if(list.length===0){ box.innerHTML='<div class="empty">Aucune commande en attente.</div>'; return; }
  box.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Code</th><th>Client</th><th>Heure</th><th style="text-align:right;">Total</th><th></th></tr></thead><tbody>
    ${list.map(c=>`<tr><td><b>${c.code}</b></td><td>${c.clientNom||'<span class="muted">—</span>'}${c.clientTel?'<br><span class="muted" style="font-size:11px;">'+c.clientTel+'</span>':''}</td><td>${c.heure}</td><td style="text-align:right;">${fmt(c.total)} F</td>
      <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-annul="${c.id}">Annuler</button></td></tr>`).join('')}
  </tbody></table></div>`;
  box.querySelectorAll('[data-annul]').forEach(b=> b.onclick = async ()=>{
    const ok = await askConfirm({ title:'Annuler cette commande ?', message:'La marchandise réservée sera remise dans le stock de la boutique.', okLabel:'Oui, annuler' });
    if(!ok) return;
    await annulerCommande(b.dataset.annul);
    renderCommande(main);
  });
}

async function annulerCommande(cmdId){
  try{
    const res = await fetch('/api/tx/annuler', {
      method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
      body: JSON.stringify({ cmdId })
    });
    const data = await res.json();
    await loadData();
    if(!res.ok || !data.ok){ showToast(data.error || 'Annulation impossible'); return; }
    showToast('Commande annulée, stock restitué');
  }catch(e){ showToast('Impossible de contacter le serveur'); }
}

// ---------- PAGE CAISSE : encaissement par code + calcul de la monnaie ----------
async function renderCaisse(main){
  let localites = [];
  if(CURRENT_USER.role==='gerant'){
    try{ const rl=await fetch('/api/localites',{headers:authHeaders()}); if(rl.ok) localites=(await rl.json()).filter(l=>l.active); }catch(_){}
  }
  main.innerHTML = `
    <h2 class="page-title">Caisse</h2>
    <p class="page-sub">Tape le code que le parent te donne, vérifie la commande, saisis le montant reçu — le système calcule la monnaie à rendre.</p>
    <div class="card">
      ${CURRENT_USER.role==='gerant' ? `
      <div class="toolbar"><div class="field" style="margin-bottom:0;"><label>Boutique</label>
        <select id="cai-loc" style="min-width:170px;">${localites.map(l=>`<option value="${l.id}">${l.nom}</option>`).join('')}</select></div></div>` :
      `<div class="muted" style="margin-bottom:10px;">Boutique : <b>${CURRENT_USER.localiteNom||'ta boutique'}</b></div>`}
      <div class="toolbar" style="align-items:flex-end;">
        <div class="field" style="margin-bottom:0;"><label>Code de la commande</label>
          <input type="tel" id="cai-code" placeholder="Ex : 4821" style="width:150px; font-size:20px; letter-spacing:2px;">
        </div>
        <button class="btn" id="cai-find">Rechercher</button>
      </div>
    </div>
    <div id="cai-detail"></div>
  `;
  document.getElementById('cai-find').onclick = ()=> chercherCommande(main);
  document.getElementById('cai-code').onkeydown = (e)=>{ if(e.key==='Enter') chercherCommande(main); };
}

function chercherCommande(main){
  const code = (document.getElementById('cai-code').value||'').trim();
  const locId = pageLocaliteId('cai-loc');
  const detail = document.getElementById('cai-detail');
  if(!code){ showToast('Entre un code'); return; }
  const c = (DATA.commandesVente||[]).find(x=>x.code===code && x.statut==='en_attente' && x.localiteId===locId);
  if(!c){
    caisseOrder = null;
    detail.innerHTML = '<div class="card"><div class="empty">Aucune commande en attente avec ce code dans cette boutique. Vérifie le code.</div></div>';
    return;
  }
  caisseOrder = c;
  detail.innerHTML = `
    <div class="card">
      <h3>Commande ${c.code} <span class="muted">— ${c.heure}, par ${c.agent||''}</span></h3>
      ${(c.clientNom||c.clientTel) ? `<div class="muted" style="margin-bottom:10px;">Client : <b>${c.clientNom||'—'}</b>${c.clientTel?' · &#128222; '+c.clientTel:''}</div>` : ''}
      <div class="table-scroll"><table><thead><tr><th>Article</th><th style="text-align:right;">Qté</th><th style="text-align:right;">Prix</th><th style="text-align:right;">Sous-total</th></tr></thead><tbody>
        ${c.lignes.map(l=>`<tr><td>${l.nom}</td><td style="text-align:right;">${fmt(l.qte)}</td><td style="text-align:right;">${fmt(l.prixUnit)} F</td><td style="text-align:right;">${fmt(l.qte*l.prixUnit)} F</td></tr>`).join('')}
      </tbody></table></div>
      <div style="font-size:20px; font-weight:700; margin-top:12px; text-align:right;">Total à payer : ${fmt(c.total)} F</div>
      <div class="toolbar" style="align-items:flex-end; margin-top:14px;">
        <div class="field" style="margin-bottom:0;"><label>Montant reçu du parent</label>
          <input type="number" id="cai-recu" min="0" step="5" placeholder="0" style="width:160px; font-size:20px;">
        </div>
        <div style="flex:1;"></div>
      </div>
      <div id="cai-monnaie" style="font-size:26px; font-weight:800; margin-top:8px;"></div>
      <div style="margin-top:14px; text-align:right;">
        <button class="btn" id="cai-pay">Encaisser &amp; imprimer le reçu</button>
      </div>
    </div>`;
  const recu = document.getElementById('cai-recu');
  const monn = document.getElementById('cai-monnaie');
  const calc = ()=>{
    const r = parseInt(recu.value,10)||0;
    const m = r - c.total;
    if(recu.value===''){ monn.innerHTML=''; return; }
    if(m < 0){ monn.style.color='var(--warn)'; monn.textContent = `Manque ${fmt(-m)} F`; }
    else { monn.style.color='var(--ok)'; monn.textContent = `Monnaie à rendre : ${fmt(m)} F`; }
  };
  recu.oninput = calc;
  recu.focus();
  document.getElementById('cai-pay').onclick = ()=> encaisser(main);
}

async function encaisser(main){
  const c = caisseOrder;
  if(!c || c.statut!=='en_attente'){ showToast('Aucune commande sélectionnée'); return; }
  const recu = parseInt(document.getElementById('cai-recu').value,10);
  if(isNaN(recu) || recu < c.total){ showToast('Le montant reçu est inférieur au total'); return; }
  const btn = document.getElementById('cai-pay');
  if(btn){ btn.disabled = true; btn.textContent = 'Encaissement...'; } // anti double-clic
  // Les ventes à enregistrer (le serveur les ajoutera lui-même, sans rien perdre)
  const ventes = c.lignes.filter(l=>l.type==='kit').map(l=>{
    const niveau = DATA.niveaux.find(n=>n.id===l.niveauId);
    return { niveauId:l.niveauId, qty:l.qte, prixVente: niveau? niveau.montant : l.prixUnit, prixAchat: niveau? kitCost(niveau) : 0 };
  });
  const ventesLivres = c.lignes.filter(l=>l.type==='detail').map(l=>({
    kind: l.kind, livreId: l.kind==='livre'? l.id : undefined, articleId: l.kind!=='livre'? l.id : undefined,
    livreNom: l.nom, niveauId: l.niveauId||null, qty: l.qte, prixVente: l.prixUnit, prixAchat: l.prixAchat||0
  }));
  try{
    const res = await fetch('/api/tx/payer', {
      method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
      body: JSON.stringify({ code:c.code, localiteId:c.localiteId, montantRecu:recu, ventes, ventesLivres })
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      // 409 = une autre caisse vient d'encaisser cette commande : on prévient clairement
      showToast(data.error || 'Encaissement impossible');
      await loadData();
      caisseOrder = null;
      renderCaisse(main);
      return;
    }
    await loadData(); // état officiel du serveur
    const paye = data.commande;
    showToast(`Encaissé ${fmt(paye.montantRecu)} F — monnaie ${fmt(paye.monnaie)} F`);
    caisseOrder = null;
    renderCaisse(main);
    printCaisseRecu(paye.id);
  }catch(e){
    showToast('Impossible de contacter le serveur');
    if(btn){ btn.disabled=false; btn.textContent='Encaisser & imprimer le reçu'; }
  }
}

function renderTransactions(main){

  main.innerHTML = `
    <h2 class="page-title">Transactions</h2>
    <p class="page-sub">Toutes les commandes et paiements sont enregistrés ici : le code, la boutique, le vendeur qui a pris la commande, le caissier qui a encaissé, le montant reçu et la monnaie rendue.</p>
