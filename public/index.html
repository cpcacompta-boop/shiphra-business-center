              ${DATA.fournisseurs.map(f=>`<option value="${f.id}" ${f.id===l.fournisseurId?'selected':''}>${f.nom}</option>`).join('')}
            </select>
          </td>
          <td>${low?'<span class="tag tag-warn">A commander</span>':'<span class="tag tag-ok">OK</span>'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
    <div class="muted" style="margin-top:10px; font-size:12px;">Prix d'achat = prix de vente − remise. Ex : vente 3000 avec 20% → achat 2400. Le fournisseur peut aussi faire une remise en F (montant fixe).</div>
    <div style="margin-top:16px; text-align:right;">
      <button class="btn" id="lv-save-all">Enregistrer</button>
    </div>
  `;

  // Recalcul en direct du prix d'achat + bénéfice pendant la saisie
  function recalc(id){
    const vente = body.querySelector(`[data-lvente="${id}"]`).value;
    const rem = body.querySelector(`[data-lrem="${id}"]`).value;
    const typ = body.querySelector(`[data-ltype="${id}"]`).value;
    const achat = calcAchat(vente, rem, typ);
    const marge = (+vente||0) - achat;
    body.querySelector(`[data-lachatcell="${id}"]`).textContent = fmt(achat) + ' F';
    const mcell = body.querySelector(`[data-lmargecell="${id}"]`);
    mcell.textContent = fmt(marge) + ' F';
    mcell.style.color = marge>=0 ? 'var(--ok)' : 'var(--warn)';
  }
  livres.forEach(l=>{
    ['lvente','lrem'].forEach(k=>{
      const el = body.querySelector(`[data-${k}="${l.id}"]`);
      if(el) el.oninput = ()=>recalc(l.id);
    });
    const ts = body.querySelector(`[data-ltype="${l.id}"]`);
    if(ts) ts.onchange = ()=>recalc(l.id);
  });

  document.getElementById('lv-save-all').onclick = async ()=>{
    livres.forEach(l=>{
      l.nom = body.querySelector(`[data-lnom="${l.id}"]`).value.trim() || 'Sans nom';
      l.matiere = body.querySelector(`[data-lmat="${l.id}"]`).value.trim();
      l.prixVente = parseFloat(body.querySelector(`[data-lvente="${l.id}"]`).value)||0;
      l.remise = parseFloat(body.querySelector(`[data-lrem="${l.id}"]`).value)||0;
      l.remiseType = body.querySelector(`[data-ltype="${l.id}"]`).value;
      l.prixAchat = livreAchat(l);
      l.stock = parseInt(body.querySelector(`[data-lstock="${l.id}"]`).value)||0;
      l.seuil = parseInt(body.querySelector(`[data-lseuil="${l.id}"]`).value)||0;
      l.fournisseurId = body.querySelector(`[data-lfourn="${l.id}"]`).value || null;
    });
    await saveData();
    showToast('Livres mis à jour');
    drawStockLivres();
  };
  if(isSuperviseurReadonly()) disableInputs(document.getElementById('lv-body'));
}


// ---------- VENTE AU DÉTAIL (livres + Arts plastiques & Musique) ----------
// Les fournitures Arts/Musique vivent dans le STOCK CAHIER : leur vente déduit ce stock-là.
const ARTS_NOMS = ["Canson","Gouache","Feutre","Crayon 2B","Pinceau","Petit TP 100 P"];
const MUSIQUE_NOMS = ["Flûte"];
function artsArticles(){ return DATA.articles.filter(a=>ARTS_NOMS.includes(a.nom)); }
function musiqueArticles(){ return DATA.articles.filter(a=>MUSIQUE_NOMS.includes(a.nom)); }
// Pack Arts Plastiques : vendu en un clic, déduit tous ses composants du stock cahier.
const PACK_ARTS = { id:'arts', nom:'Pack Arts Plastiques (complet)', components:[
  {nom:'Canson', q:1}, {nom:'Gouache', q:1}, {nom:'Feutre', q:1},
  {nom:'Crayon 2B', q:2}, {nom:'Pinceau', q:2}, {nom:'Petit TP 100 P', q:1}
]};
function packInfo(){
  let vente=0, achat=0, missing=[], minStock=Infinity;
  PACK_ARTS.components.forEach(c=>{
    const a = DATA.articles.find(x=>x.nom===c.nom);
    if(!a){ missing.push(c.nom); return; }
    vente += (a.prixVente||0)*c.q;
    achat += (a.prixAchat||0)*c.q;
    minStock = Math.min(minStock, Math.floor((a.stock||0)/c.q));
  });
  return {vente, achat, missing, dispo: (minStock===Infinity?0:minStock)};
}

function renderVentesLivres(main){
  const todayStr = new Date().toISOString().slice(0,10);
  if(!livreNiveauFilter || !DATA.niveaux.some(n=>n.id===livreNiveauFilter)){
    livreNiveauFilter = DATA.niveaux.length ? DATA.niveaux[0].id : null;
  }
  const totalVendus = DATA.ventesLivres.reduce((s,v)=>s+v.qty,0);
  const vendusJour = DATA.ventesLivres.filter(v=>v.date===todayStr).reduce((s,v)=>s+v.qty,0);
  main.innerHTML = `
    <div class="card">
      <h3>Nouvelle vente — Livre / Art &amp; Musique</h3>
      <div class="toolbar">
        <div class="field" style="margin-bottom:0;">
          <label>Classe (pour les livres)</label>
          <select id="vl-niveau">${DATA.niveaux.map(n=>`<option value="${n.id}" ${n.id===livreNiveauFilter?'selected':''}>${n.nom}</option>`).join('')}</select>
        </div>
        <div class="field" style="margin-bottom:0; flex:1; min-width:240px;">
          <label>Article à vendre</label>
          <select id="vl-livre" style="width:100%;"></select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Quantité</label>
          <input type="number" id="vl-qty" min="1" value="1" style="width:90px;">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Date</label>
          <input type="date" id="vl-date" value="${todayStr}">
        </div>
        <button class="btn" id="vl-submit">Enregistrer la vente</button>
      </div>
      <div id="vl-info" class="muted" style="font-size:12px; margin-top:4px;"></div>
    </div>
    <div class="grid grid-2" style="margin-bottom:20px;">
      <div class="kpi"><p class="lbl">Total vendu au détail (depuis le début)</p><p class="val">${fmt(totalVendus)}</p></div>
      <div class="kpi"><p class="lbl">Vendu aujourd'hui</p><p class="val">${fmt(vendusJour)}</p></div>
    </div>
    <div class="card">
      <h3>Totaux par jour (tous niveaux confondus)</h3>
      <div id="vl-parjour"></div>
    </div>
    <div class="card">
      <h3>Historique des ventes au détail <span class="badge-count">${DATA.ventesLivres.length}</span></h3>
      <div id="vl-hist"></div>
    </div>
  `;

  const nivSel = document.getElementById('vl-niveau');
  const itemSel = document.getElementById('vl-livre');
  const info = document.getElementById('vl-info');

  function currentItem(){
    const val = itemSel.value || '';
    if(val==='pack:arts') return {kind:'pack', ref:PACK_ARTS};
    if(val.startsWith('livre:')) return {kind:'livre', ref:DATA.livres.find(x=>x.id===val.slice(6))};
    if(val.startsWith('art:'))   return {kind:'fourniture', ref:DATA.articles.find(x=>x.id===val.slice(4))};
    return {kind:null, ref:null};
  }
  function fillItems(){
    const livres = DATA.livres.filter(l=>l.niveauId===livreNiveauFilter);
    const arts = artsArticles();
    const musique = musiqueArticles();
    let html = '';
    if(livres.length){
      html += `<optgroup label="Livres — ${(DATA.niveaux.find(n=>n.id===livreNiveauFilter)||{}).nom||''}">`
        + livres.map(l=>`<option value="livre:${l.id}">${l.nom} — ${fmt(l.prixVente)} F (stock ${fmt(l.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(arts.length){
      const pk = packInfo();
      html += `<optgroup label="Arts Plastiques (stock cahiers)">`;
      if(pk.missing.length===0){
        html += `<option value="pack:arts">&#127912; Pack Arts Plastiques (complet) — ${fmt(pk.vente)} F (dispo ${fmt(pk.dispo)})</option>`;
      }
      html += arts.map(a=>`<option value="art:${a.id}">${a.nom} — ${fmt(a.prixVente)} F (stock ${fmt(a.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(musique.length){
      html += `<optgroup label="Musique (stock cahiers)">`
        + musique.map(a=>`<option value="art:${a.id}">${a.nom} — ${fmt(a.prixVente)} F (stock ${fmt(a.stock)})</option>`).join('')
        + `</optgroup>`;
    }
    if(!html) html = '<option value="">Aucun article disponible</option>';
    itemSel.innerHTML = html;
    updateInfo();
  }
  function updateInfo(){
    const {kind, ref} = currentItem();
    if(!ref){ info.textContent=''; return; }
    if(kind==='pack'){
      const pk = packInfo();
      const compo = PACK_ARTS.components.map(c=>`${c.q}× ${c.nom}`).join(', ');
      info.textContent = `Pack (déduit du stock cahiers) · Vente ${fmt(pk.vente)} F · Bénéfice ${fmt(pk.vente-pk.achat)} F · Packs possibles avec le stock actuel : ${fmt(pk.dispo)} · Contenu : ${compo}`;
    } else if(kind==='livre'){
      info.textContent = `Livre · Vente ${fmt(ref.prixVente)} F · Bénéfice ${fmt(ref.prixVente-livreAchat(ref))} F · Stock restant ${fmt(ref.stock)}`;
    } else {
      info.textContent = `Fourniture (stock cahiers) · Vente ${fmt(ref.prixVente)} F · Bénéfice ${fmt(ref.prixVente-ref.prixAchat)} F · Stock restant ${fmt(ref.stock)}`;
    }
  }
  nivSel.onchange = ()=>{ livreNiveauFilter = nivSel.value; fillItems(); };
  itemSel.onchange = updateInfo;
  fillItems();

  document.getElementById('vl-submit').onclick = async ()=>{
    const {kind, ref} = currentItem();
    const qty = parseInt(document.getElementById('vl-qty').value)||0;
    const date = document.getElementById('vl-date').value;
    if(!ref){ showToast('Choisis un article'); return; }
    if(qty<=0){ showToast('Vérifie la quantité'); return; }
    const heure = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

    if(kind==='pack'){
      const pk = packInfo();
      // a) Un composant n'existe carrément pas dans le stock
      if(pk.missing.length){ showToast('Article manquant : '+pk.missing.join(', ')); return; }
      // b) On vérifie qu'il y a assez de stock pour CHAQUE composant du pack
      const manquants = [];
      PACK_ARTS.components.forEach(c=>{
        const a = DATA.articles.find(x=>x.nom===c.nom);
        const besoin = c.q*qty;
        if(a && a.stock < besoin){
          manquants.push(`${a.nom} (besoin ${fmt(besoin)}, en stock ${fmt(a.stock)})`);
        }
      });
      if(manquants.length){
        const apercu = manquants.slice(0,3).join(' · ');
        const reste = manquants.length>3 ? ` (+${manquants.length-3} autre(s))` : '';
        showToast('Stock insuffisant : ' + apercu + reste);
        return; // on n'enregistre rien
      }
      // c) Tout est bon : on retire réellement du stock
      PACK_ARTS.components.forEach(c=>{
        const a = DATA.articles.find(x=>x.nom===c.nom);
        if(a) a.stock -= c.q*qty;
      });
      DATA.ventesLivres.push({id:uid(), kind:'pack', livreNom:PACK_ARTS.nom, niveauId:livreNiveauFilter, qty, prixVente:pk.vente, prixAchat:pk.achat, components:PACK_ARTS.components, date, heure});

    } else if(kind==='livre'){
      if(ref.stock < qty){
        showToast(`Stock insuffisant : ${ref.nom} (en stock ${fmt(ref.stock)})`);
        return;
      }
      ref.stock -= qty;
      DATA.ventesLivres.push({id:uid(), kind:'livre', livreId:ref.id, livreNom:ref.nom, niveauId:ref.niveauId, qty, prixVente:ref.prixVente, prixAchat:livreAchat(ref), date, heure});

    } else {
      if(ref.stock < qty){
        showToast(`Stock insuffisant : ${ref.nom} (en stock ${fmt(ref.stock)})`);
        return;
      }
      ref.stock -= qty;
      DATA.ventesLivres.push({id:uid(), kind:'fourniture', articleId:ref.id, livreNom:ref.nom, niveauId:livreNiveauFilter, qty, prixVente:ref.prixVente, prixAchat:ref.prixAchat, date, heure});
    }

    await saveData();
    showToast(`Vente enregistrée : ${qty} × ${ref.nom}`);
    renderVentesLivres(main);
  };

  const parJour = document.getElementById('vl-parjour');
  if(DATA.ventesLivres.length===0){
    parJour.innerHTML = '<div class="empty">Aucune vente au détail pour l\'instant.</div>';
  } else {
    const g = {};
    DATA.ventesLivres.forEach(v=>{
      if(!g[v.date]) g[v.date] = {qty:0, recette:0, marge:0};
      g[v.date].qty += v.qty;
      g[v.date].recette += v.prixVente*v.qty;
      g[v.date].marge += (v.prixVente - v.prixAchat)*v.qty;
    });
    const dates = Object.keys(g).sort((a,b)=> b.localeCompare(a));
    const tQty = dates.reduce((s,d)=>s+g[d].qty,0);
    const tRec = dates.reduce((s,d)=>s+g[d].recette,0);
    const tMar = dates.reduce((s,d)=>s+g[d].marge,0);
    parJour.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th class="num">Articles vendus</th><th class="num">Recette</th><th class="num">Bénéfice</th></tr></thead><tbody>
      ${dates.map(d=>`<tr><td>${d}${d===todayStr?' <span class="tag tag-gold">Aujourd’hui</span>':''}</td><td class="num"><b>${fmt(g[d].qty)}</b></td><td class="num">${fmt(g[d].recette)} F</td><td class="num">${fmt(g[d].marge)} F</td></tr>`).join('')}
      <tr style="border-top:2px solid var(--navy);"><td><b>Total général</b></td><td class="num"><b>${fmt(tQty)}</b></td><td class="num"><b>${fmt(tRec)} F</b></td><td class="num"><b>${fmt(tMar)} F</b></td></tr>
    </tbody></table></div>`;
  }

  const hist = document.getElementById('vl-hist');
  if(DATA.ventesLivres.length===0){ hist.innerHTML = '<div class="empty">Aucune vente au détail pour l\'instant.</div>'; return; }
  const sorted = [...DATA.ventesLivres].sort(byRecent);
  hist.innerHTML = `<div class="table-scroll"><table><thead><tr><th>Date</th><th>Heure</th><th>Type</th><th>Article</th><th class="num">Qté</th><th class="num">Recette</th><th class="num">Bénéfice</th><th></th></tr></thead><tbody>
    ${sorted.map(v=>{
      const recette = v.prixVente*v.qty;
      const marge = (v.prixVente-v.prixAchat)*v.qty;
      const typeLbl = v.kind==='pack' ? 'Pack Arts' : (v.kind==='fourniture' ? 'Arts/Musique' : 'Livre');
      const niv = DATA.niveaux.find(n=>n.id===v.niveauId);
      const article = v.kind==='fourniture' ? (v.livreNom||'?') : `${v.livreNom||'?'}${niv?' ('+niv.nom+')':''}`;
      return `<tr><td>${v.date}</td><td>${v.heure||'—'}</td><td>${typeLbl}</td><td>${article}</td><td class="num">${fmt(v.qty)}</td><td class="num">${fmt(recette)} F</td><td class="num">${fmt(marge)} F</td>
      <td style="text-align:right;"><button class="btn btn-ghost btn-sm" data-vldel="${v.id}">Annuler</button></td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  hist.querySelectorAll('[data-vldel]').forEach(b=>{
    b.onclick = async ()=>{
      const v = DATA.ventesLivres.find(x=>x.id===b.dataset.vldel);
      const ok = await askConfirm({
        title:'Annuler cette vente ?',
        message:`Tu vas annuler la vente de <b>${v?v.qty:''} × ${v?(v.livreNom||'article'):''}</b> du ${v?v.date:''}. Le stock sera remis. Cette action est définitive.`,
        okLabel:'Oui, annuler la vente'
      });
      if(!ok) return;
      if(v){
        if(v.kind==='pack'){
          (v.components||PACK_ARTS.components).forEach(c=>{
            const a = DATA.articles.find(x=>x.nom===c.nom);
            if(a) a.stock += c.q*v.qty; // on remet chaque composant
          });
        } else if(v.kind==='fourniture'){
          const a = DATA.articles.find(x=>x.id===v.articleId);
          if(a) a.stock += v.qty; // on remet le stock cahier
        } else {
          const l = DATA.livres.find(x=>x.id===v.livreId);
          if(l) l.stock += v.qty; // on remet le stock livre
        }
      }
      DATA.ventesLivres = DATA.ventesLivres.filter(x=>x.id!==b.dataset.vldel);
      await saveData();
      showToast('Vente annulée, stock restauré');
      renderVentesLivres(main);
    };
  });
}


// ---------- TEMPS RÉEL (synchro automatique + application immédiate des actions) ----------
// Deux petites vérifications régulières, très légères :
//  1) Le compte est-il toujours valide ? (désactivé / supprimé / rôle changé par le Gérant)
//     -> si le compte a été coupé, la personne est renvoyée à la connexion sans attendre.
//     -> si son rôle/localité a changé, ses droits sont mis à jour en direct.
//  2) Les données ont-elles changé ailleurs (autre vendeur, autre appareil) ?
//     -> si oui, on recharge et on réaffiche automatiquement, sans toucher à ce que
//        la personne est en train de taper.
let realtimeBusy = false;
function isTyping(){
  const el = document.activeElement;
  return el && ['INPUT','SELECT','TEXTAREA'].includes(el.tagName);
}

// ================= VERROUILLAGE AUTOMATIQUE (sécurité) =================
// Si la page reste 4 minutes sans aucune manipulation, elle se verrouille.
// Il faut retaper le mot de passe pour reprendre : personne ne peut utiliser
// le compte de quelqu'un d'autre sur une page laissée ouverte.
const LOCK_DELAI_MS = 4 * 60 * 1000; // 4 minutes
let derniereActivite = Date.now();
let ecranVerrouille = false;

function marquerActivite(){
  if(!ecranVerrouille) derniereActivite = Date.now();
}

function verrouillerEcran(){
  if(ecranVerrouille) return;
  ecranVerrouille = true;
  const nom = CURRENT_USER ? (CURRENT_USER.nomComplet || CURRENT_USER.username) : '';
  const bg = document.createElement('div');
  bg.id = 'lock-screen';
  bg.style.cssText = 'position:fixed; inset:0; z-index:99999; background:linear-gradient(160deg,#0B1F3A,#123A63); display:flex; align-items:center; justify-content:center; padding:20px;';
  bg.innerHTML = `
    <div style="background:#fff; border-radius:18px; padding:28px 24px; max-width:380px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.4);">
      <div style="font-size:44px; line-height:1; margin-bottom:8px;">&#128274;</div>
      <h2 style="margin:0 0 6px; font-size:19px; color:#0B1F3A;">Page verrouillée</h2>
      <p style="margin:0 0 4px; font-size:13px; color:#6B7A90;">Inactivité de plus de 4 minutes.</p>
      <p style="margin:0 0 18px; font-size:14px; font-weight:700; color:#0B1F3A;">${nom}</p>
      <input type="password" id="lock-pass" placeholder="Ton mot de passe" autocomplete="current-password"
        style="width:100%; padding:12px 14px; border:1.5px solid #DDE3EC; border-radius:11px; font-size:15px; margin-bottom:10px; box-sizing:border-box;">
      <div id="lock-err" style="display:none; color:#C0392B; font-size:12.5px; margin-bottom:10px;"></div>
      <button id="lock-ok" style="width:100%; padding:12px; border:0; border-radius:11px; background:#0B1F3A; color:#fff; font-size:15px; font-weight:700; cursor:pointer;">Déverrouiller</button>
      <button id="lock-out" style="width:100%; padding:10px; margin-top:8px; border:0; border-radius:11px; background:transparent; color:#6B7A90; font-size:13px; cursor:pointer;">Se déconnecter</button>
    </div>`;
  document.body.appendChild(bg);
  const pass = document.getElementById('lock-pass');
  const err = document.getElementById('lock-err');
  const btn = document.getElementById('lock-ok');
  setTimeout(()=> pass.focus(), 50);

  const tenter = async ()=>{
    const v = pass.value;
    if(!v){ err.textContent='Entre ton mot de passe.'; err.style.display='block'; return; }
    btn.disabled = true; btn.textContent = 'Vérification...';
    try{
      const res = await fetch('/api/auth/verify-password', {
        method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() },
        body: JSON.stringify({ password: v })
      });
      const data = await res.json();
      if(res.status===401 && data.error && data.error.indexOf('désactivé')>=0){ logout(data.error); return; }
      if(!res.ok || !data.ok){
        err.textContent = data.error || 'Mot de passe incorrect.';
        err.style.display = 'block';
        pass.value=''; pass.focus();
        btn.disabled=false; btn.textContent='Déverrouiller';
        return;
      }
      deverrouillerEcran();
    }catch(e){
      err.textContent = 'Impossible de contacter le serveur.';
      err.style.display='block';
      btn.disabled=false; btn.textContent='Déverrouiller';
    }
  };
  btn.onclick = tenter;
  pass.onkeydown = (e)=>{ if(e.key==='Enter') tenter(); };
  document.getElementById('lock-out').onclick = ()=> logout();
}

function deverrouillerEcran(){
  const el = document.getElementById('lock-screen');
  if(el) el.remove();
  ecranVerrouille = false;
  derniereActivite = Date.now();
  showToast('Bon retour !');
}

function demarrerVerrouillageAuto(){
  ['mousemove','mousedown','keydown','touchstart','scroll','click','input'].forEach(evt=>{
    document.addEventListener(evt, marquerActivite, { passive:true });
  });
  setInterval(()=>{
    if(!CURRENT_USER || ecranVerrouille) return;
    if(Date.now() - derniereActivite >= LOCK_DELAI_MS) verrouillerEcran();
  }, 1000);
}


async function realtimeCheckAccount(){
  try{
    const res = await fetch('/api/sync', { headers: authHeaders() });
    if(res.status===401 || res.status===403){
      let raison = null;
      try{ const d = await res.json(); raison = d.raison || d.error || null; }catch(_){}
      logout(raison);
      return;
    }
    if(!res.ok) return;
    const me = await res.json();
    const roleChanged = me.role !== CURRENT_USER.role;
    const locChanged  = (me.localiteId||null) !== (CURRENT_USER.localiteId||null);
    CURRENT_USER.role = me.role;
    CURRENT_USER.nomComplet = me.nomComplet;
    CURRENT_USER.localiteId = me.localiteId || null;
    if(roleChanged || locChanged){
      // Ses droits ont changé : on met à jour le menu et l'affichage tout de suite
      if((CURRENT_USER.role==='vente'||CURRENT_USER.role==='caisse') && CURRENT_USER.localiteId){
        try{
          const rl = await fetch('/api/localites', { headers: authHeaders() });
          if(rl.ok){ const locs = await rl.json(); const mine = locs.find(l=>l.id===CURRENT_USER.localiteId); CURRENT_USER.localiteNom = mine?mine.nom:null; }
        }catch(_){}
      }
      showToast('Tes accès ont été mis à jour par le Gérant');
      render();
    }
  }catch(_){}
}

async function realtimeCheckData(){
  // On ne dérange jamais une saisie en cours : frappe clavier, fenêtre ouverte,
  // ou une réception en cours de préparation (pour ne pas effacer le brouillon).
  const modalOuverte = !!document.querySelector('.modal-bg');
  const receptionEnCours = (typeof receptionDraft !== 'undefined') && receptionDraft.length > 0;
  if(realtimeBusy || isTyping() || modalOuverte || receptionEnCours || ecranVerrouille) return;
  try{
    const res = await fetch('/api/data/meta', { headers: authHeaders() });
    if(res.status===401 || res.status===403){ logout(); return; }
    if(!res.ok) return;
    const j = await res.json();
    const remote = j.updatedAt || null;
    if(remote && remote !== lastDataAt){
      realtimeBusy = true;
      await loadData();     // recharge les vraies données (met aussi à jour lastDataAt)
      render();             // réaffiche la page courante avec les nouvelles données
      realtimeBusy = false;
    }
  }catch(_){ realtimeBusy = false; }
}

function startRealtime(){
  // Compte : toutes les 5 s -> désactivation / suppression / changement de rôle
  // ou connexion depuis un autre appareil : appliqués en moins de 5 secondes.
  realtimeCheckAccount();
  setInterval(realtimeCheckAccount, 5*1000);
  // Données : toutes les 6 s -> nouvelle réception / vente visible partout.
  setInterval(realtimeCheckData, 6*1000);
  // Verrouillage de la page après 4 minutes sans manipulation.
  demarrerVerrouillageAuto();
}

(async function init(){
  initMobileNav();
  // 0) Vérifie que la session est toujours valide côté serveur (sinon -> login.html)
  await verifySession();
  // 1) Affiche l'appli TOUT DE SUITE (menu + tableau de bord), même si le serveur dort encore
  DATA = defaultData();
  try{ render(); }catch(e){ console.error('Init: échec 1er affichage', e); }
  // 2) Récupère les vraies données depuis la base (peut prendre du temps si le serveur se réveille)
  try{
    await loadData();
  }catch(e){
    console.error('Init: échec chargement', e);
    if(!DATA) DATA = defaultData();
  }
  // 3) Ré-affiche avec les vraies données
  try{
    render();
  }catch(e){
    console.error('Init: échec affichage', e);
    const mainEl = document.getElementById('main');
    if(mainEl) mainEl.innerHTML = '<div style="padding:40px 20px; text-align:center; color:var(--warn);">Une erreur est survenue. Rechargez la page (Ctrl+F5).</div>';
  }
  // 4) Démarre la synchro temps réel (données + comptes)
  startRealtime();
})();
</script>
